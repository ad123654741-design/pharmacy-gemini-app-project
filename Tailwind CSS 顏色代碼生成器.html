<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS 顏色代碼生成器</title>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 引入 Babel 用於解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 設定 Tailwind 以支援深色模式切換預覽 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                        'bounce-soft': 'bounceSoft 2s infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        bounceSoft: {
                            '0%, 100%': { transform: 'translateY(-5%)' },
                            '50%': { transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #f8fafc;
            /* 加入微漸層背景，增添現代感 */
            background-image: radial-gradient(at 0% 0%, hsla(210,100%,97%,1) 0, transparent 50%), radial-gradient(at 100% 100%, hsla(210,100%,95%,1) 0, transparent 50%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 自定義滑順捲軸 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* Range Input 現代化樣式 */
        input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #3b82f6;
            cursor: pointer;
            margin-top: -8px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.15);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #e2e8f0;
            border-radius: 3px;
        }
        input[type=range]:focus::-webkit-slider-runnable-track {
            background: #cbd5e1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 加入 useRef 鉤子
        const { useState, useEffect, useMemo, useRef } = React;

        const COLOR_NAMES = [
            'white', 'black', 
            'slate', 'gray', 'zinc', 'neutral', 'stone', 
            'red', 'orange', 'amber', 'yellow', 'lime', 
            'green', 'emerald', 'teal', 'cyan', 'sky', 
            'blue', 'indigo', 'violet', 'purple', 'fuchsia', 
            'pink', 'rose'
        ];

        const SHADES = ['50', '100', '200', '300', '400', '500', '600', '700', '800', '900', '950'];

        // --- 共用 Modal 元件 (加上動畫效果) ---
        const Modal = ({ onClose, title, icon, children }) => (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                <div className="bg-white/95 backdrop-blur-xl rounded-[2rem] shadow-2xl border border-white max-w-3xl w-full p-6 md:p-8 relative flex flex-col max-h-[90vh] animate-slide-up" onClick={e => e.stopPropagation()}>
                    <button onClick={onClose} className="absolute top-6 right-6 text-slate-400 hover:text-slate-700 hover:rotate-90 transition-all duration-300 bg-slate-100 hover:bg-slate-200 rounded-full p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    
                    <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-3 flex-shrink-0">
                        {icon}
                        {title}
                    </h2>

                    <div className="overflow-y-auto pr-4 custom-scrollbar flex-grow">
                        {children}
                    </div>
                    
                    <div className="mt-8 text-center flex-shrink-0 pt-4 border-t border-slate-100">
                        <button onClick={onClose} className="px-8 py-3 bg-slate-800 text-white font-medium rounded-xl hover:bg-slate-700 active:scale-95 transition-all shadow-lg shadow-slate-300">
                            我學會了，關閉視窗
                        </button>
                    </div>
                </div>
            </div>
        );

        // --- 色彩建議與教學內容 (維持不變) ---
        const ColorGuideContent = () => (
            <div className="space-y-6">
                <div className="bg-blue-50/80 backdrop-blur-sm p-6 rounded-2xl border border-blue-100/50 shadow-sm">
                    <h3 className="font-bold text-blue-800 mb-2 flex items-center gap-2">
                        <span className="text-xl">👑</span> 文字清晰度的黃金法則
                    </h3>
                    <p className="text-blue-900/80 text-sm leading-relaxed">
                        設計最重要的一點是「讓使用者看得清楚」。背景與文字的對比度必須足夠：
                        <br/><br/>
                        ✅ <strong>最佳組合：</strong>
                        <br/>• <strong>淺色背景 (White, 50-100)</strong> + <strong>深色文字 (Black, 700-900)</strong>
                        <br/>• <strong>深色背景 (Black, 600-900)</strong> + <strong>白色文字</strong> 或極淺色 (50)
                    </p>
                </div>
                <div className="grid md:grid-cols-2 gap-4">
                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 shadow-sm transition-transform hover:-translate-y-1 duration-300">
                        <h3 className="font-bold text-slate-700 mb-2">🎨 60-30-10 配色比例</h3>
                        <p className="text-slate-600 text-sm leading-relaxed">
                            這是一個經典的室內設計與網頁設計法則：
                            <br/><br/>
                            • <strong>60% 主色</strong>：大面積的背景色。<br/>
                            • <strong>30% 輔助色</strong>：品牌色或區塊底色。<br/>
                            • <strong>10% 強調色</strong>：按鈕、連結或重要提示。
                        </p>
                    </div>
                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 shadow-sm transition-transform hover:-translate-y-1 duration-300">
                        <h3 className="font-bold text-slate-700 mb-2">🎭 情緒與顏色心理學</h3>
                        <p className="text-slate-600 text-sm leading-relaxed">
                            • <strong>信任/專業</strong>：藍色 (Blue) - 科技業最愛。<br/>
                            • <strong>活力/急迫</strong>：紅色 (Red) - 促銷或錯誤。<br/>
                            • <strong>自然/健康</strong>：綠色 (Green) - 食品或理財。<br/>
                            • <strong>高雅/神秘</strong>：紫色 (Purple) - 高級服務。
                        </p>
                    </div>
                </div>
            </div>
        );

        const CodeTutorialContent = () => (
            <div className="space-y-8">
                <section>
                    <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-3 border-b border-slate-100 pb-3">
                        <span className="bg-slate-800 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shadow-md">1</span>
                        Tailwind 顏色語法解密
                    </h3>
                    <p className="text-slate-600 mb-4">
                        Tailwind CSS 的寫法就像是在說英文句子，由三個單字組合而成，邏輯非常直觀：
                    </p>
                    <div className="bg-slate-50/50 p-6 rounded-2xl border border-slate-100 shadow-sm">
                        <div className="flex flex-wrap items-center justify-center gap-2 font-mono text-lg md:text-xl mb-6 bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                            <span className="text-purple-600 font-bold bg-purple-50 px-3 py-1.5 rounded-lg border border-purple-100" title="屬性">bg</span>
                            <span className="text-slate-300 font-bold">-</span>
                            <span className="text-blue-600 font-bold bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100" title="顏色">blue</span>
                            <span className="text-slate-300 font-bold">-</span>
                            <span className="text-green-600 font-bold bg-green-50 px-3 py-1.5 rounded-lg border border-green-100" title="深淺">500</span>
                        </div>
                        
                        <div className="grid md:grid-cols-3 gap-6">
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-50">
                                <h4 className="font-bold text-purple-700 mb-2 border-b border-purple-50 pb-2">1. 屬性</h4>
                                <ul className="text-sm text-slate-600 space-y-2">
                                    <li><code>bg-</code> : 背景</li>
                                    <li><code>text-</code> : 文字</li>
                                    <li><code>border-</code> : 邊框</li>
                                </ul>
                            </div>
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-50">
                                <h4 className="font-bold text-blue-700 mb-2 border-b border-blue-50 pb-2">2. 顏色</h4>
                                <ul className="text-sm text-slate-600 space-y-2">
                                    <li><code>slate/gray</code> : 灰色系</li>
                                    <li><code>blue/sky</code> : 藍色系</li>
                                    <li><code>red/rose</code> : 紅色系</li>
                                </ul>
                            </div>
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-50">
                                <h4 className="font-bold text-green-700 mb-2 border-b border-green-50 pb-2">3. 深淺</h4>
                                <ul className="text-sm text-slate-600 space-y-2">
                                    <li><code>50-100</code> : 極淺背景</li>
                                    <li><code>400-500</code> : 中等圖示</li>
                                    <li><code>700-900</code> : 深色文字</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </section>

                <section>
                    <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-3 border-b border-slate-100 pb-3">
                        <span className="bg-slate-800 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shadow-md">2</span>
                        空間的魔法：內距 (Padding)
                    </h3>
                    <div className="grid md:grid-cols-2 gap-6 items-center">
                        <div>
                            <p className="text-slate-600 mb-4 text-sm leading-relaxed">
                                <strong>Padding (內距)</strong> 指的是「內容」到「邊框」之間的距離。適當的留白能大幅提升視覺質感與易讀性。
                            </p>
                            <div className="bg-orange-50/80 p-5 rounded-2xl border border-orange-100 text-sm shadow-sm">
                                <h4 className="font-bold text-orange-800 mb-2">數字代表什麼？</h4>
                                <p className="text-orange-900/80">
                                    Tailwind 的數字通常乘以 4 等於像素 (px)。
                                    <br/>• <code>p-4</code> = 16px (舒適)
                                    <br/>• <code>p-6</code> = 24px (寬敞)
                                    <br/>• <code>p-8</code> = 32px (大氣)
                                </p>
                            </div>
                        </div>
                        
                        <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 shadow-sm flex justify-center">
                            <div className="relative bg-blue-100/50 border-4 border-blue-300 border-dashed p-8 sm:p-10 rounded-xl text-center w-full max-w-[280px] mx-auto box-border transition-all hover:p-12 duration-500">
                                <span className="absolute top-2 left-3 text-[10px] sm:text-xs text-blue-500 font-bold uppercase tracking-wider">Border</span>
                                <div className="bg-white p-3 sm:p-4 rounded-lg text-blue-900 font-bold shadow-md relative z-10 transition-transform hover:scale-105 duration-300">
                                    <span className="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] sm:text-xs text-blue-500 font-medium whitespace-nowrap bg-blue-50 px-2 py-0.5 rounded-full border border-blue-100">
                                        Padding (內距)
                                    </span>
                                    我是內容
                                    <div className="text-[10px] text-slate-400 font-normal mt-1">(Content)</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        );

        const App = () => {
            const [componentType, setComponentType] = useState('capsule');
            
            // 防抖動處理 (Debounce) Padding
            const [paddingInput, setPaddingInput] = useState('4'); 
            const [padding, setPadding] = useState('4'); 
            useEffect(() => {
                const timer = setTimeout(() => setPadding(paddingInput), 150); // 縮短延遲讓手感更順
                return () => clearTimeout(timer);
            }, [paddingInput]);

            const [borderWidth, setBorderWidth] = useState('0'); 
            const [borderStyle, setBorderStyle] = useState('solid'); 
            
            const [bgState, setBgState] = useState({ color: 'rose', shade: '100', opacity: '100' }); 
            const [textState, setTextState] = useState({ color: 'slate', shade: '600', opacity: '100' });
            const [borderState, setBorderState] = useState({ color: 'slate', shade: '200', opacity: '100' });
            
            const [bgMode, setBgMode] = useState('solid'); 
            const [gradientToState, setGradientToState] = useState({ color: 'rose', shade: '500', opacity: '100' });
            const [gradientDir, setGradientDir] = useState('to-r');
            const [gradientTab, setGradientTab] = useState('from');

            const [activeTab, setActiveTab] = useState('bg');
            const [copied, setCopied] = useState(false);
            const [toastMsg, setToastMsg] = useState(null);
            const [previewBg, setPreviewBg] = useState('light');
            
            const [showGuide, setShowGuide] = useState(false);
            const [showTutorial, setShowTutorial] = useState(false);

            const isSpecialColor = (color) => color === 'white' || color === 'black';
            
            const getColorClass = (type, state) => {
                const op = state.opacity !== '100' ? `/${state.opacity}` : '';
                if (isSpecialColor(state.color)) return `${type}-${state.color}${op}`;
                return `${type}-${state.color}-${state.shade}${op}`;
            };

            const getBorderWidthClass = (width) => {
                if (width === '0') return 'border-0';
                if (width === '1') return 'border';
                return `border-${width}`;
            }

            const getLuminance = (color, shade) => {
                if (color === 'white') return 1.0;
                if (color === 'black') return 0.0;
                const lMap = { '50': 0.95, '100': 0.9, '200': 0.8, '300': 0.6, '400': 0.4, '500': 0.22, '600': 0.13, '700': 0.08, '800': 0.04, '900': 0.02, '950': 0.01 };
                return lMap[shade] || 0.5;
            };

            const contrastData = useMemo(() => {
                if (componentType === 'capsule') return { warning: false, text: '' };
                const bgL = getLuminance(bgState.color, bgState.shade);
                const textL = getLuminance(textState.color, textState.shade);
                
                const bgOp = parseInt(bgState.opacity) / 100;
                const textOp = parseInt(textState.opacity) / 100;
                const effBgL = bgL * bgOp + 1.0 * (1 - bgOp);
                const effTextL = textL * textOp + effBgL * (1 - textOp);

                const l1 = Math.max(effBgL, effTextL);
                const l2 = Math.min(effBgL, effTextL);
                const ratio = (l1 + 0.05) / (l2 + 0.05);
                
                let rating = 'Fail';
                if (ratio >= 7) rating = 'AAA';
                else if (ratio >= 4.5) rating = 'AA';
                else if (ratio >= 3.0) rating = 'AA (大字)';

                return {
                    ratio: ratio.toFixed(1),
                    rating,
                    warning: ratio < 4.5
                };
            }, [bgState, textState, componentType]);

            const classString = useMemo(() => {
                const hue = isSpecialColor(bgState.color) ? 'slate' : bgState.color;
                
                let bgColors = '';
                if (bgMode === 'gradient') {
                    bgColors = `bg-gradient-${gradientDir} ${getColorClass('from', bgState)} ${getColorClass('to', gradientToState)}`;
                } else {
                    bgColors = getColorClass('bg', bgState);
                }

                const colors = `${bgColors} ${getColorClass('text', textState)} ${getColorClass('border', borderState)}`;
                const borders = `${getBorderWidthClass(borderWidth)} ${borderWidth !== '0' ? `border-${borderStyle}` : ''}`.trim();
                const spacing = `p-${padding}`;
                
                let base = `${colors} ${borders} ${spacing}`.replace(/\s+/g, ' ').trim();

                switch(componentType) {
                    case 'capsule':
                        return `bg-${hue}-100 text-${hue}-600 dark:bg-${hue}-900/40 dark:text-${hue}-400`;
                    case 'button':
                        return `${base} rounded-xl font-medium transition-all duration-200 hover:shadow-md hover:-translate-y-0.5 active:scale-95 active:shadow-sm inline-block`;
                    case 'badge':
                        return `${base} rounded-full text-xs font-semibold inline-block tracking-wide`;
                    case 'card':
                    default:
                        return `${base} rounded-3xl max-w-sm w-full transition-all duration-300 hover:shadow-xl`;
                }
            }, [bgState, textState, borderState, borderWidth, borderStyle, padding, componentType, bgMode, gradientToState, gradientDir]);

            const previewClassString = useMemo(() => {
                if (componentType === 'capsule') {
                    return `${classString} w-28 h-28 sm:w-32 sm:h-32 rounded-[2rem] sm:rounded-[2.5rem] inline-flex items-center justify-center transition-all duration-300 shadow-sm hover:shadow-md hover:scale-105`;
                }
                return classString;
            }, [classString, componentType]);

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(null), 3000);
            };

            const handleCopy = () => {
                const textArea = document.createElement("textarea");
                textArea.value = classString;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    showToast('✅ 程式碼已成功複製');
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error('複製失敗', err);
                }
                document.body.removeChild(textArea);
            };

            // 新增功能：還原設定功能
            const handleReset = () => {
                setComponentType('capsule');
                setPaddingInput('4');
                setPadding('4');
                setBorderWidth('0');
                setBorderStyle('solid');
                setBgState({ color: 'rose', shade: '100', opacity: '100' });
                setTextState({ color: 'slate', shade: '600', opacity: '100' });
                setBorderState({ color: 'slate', shade: '200', opacity: '100' });
                setBgMode('solid');
                setGradientToState({ color: 'rose', shade: '500', opacity: '100' });
                setGradientDir('to-r');
                setGradientTab('from');
                setActiveTab('bg');
                setPreviewBg('light');
                showToast('🔄 已還原為預設值');
            };

            // 新增功能：智慧對比度修復
            const autoFixContrast = () => {
                const bgL = getLuminance(bgState.color, bgState.shade);
                const bgOp = parseInt(bgState.opacity) / 100;
                const textOp = parseInt(textState.opacity) / 100;
                const effBgL = bgL * bgOp + 1.0 * (1 - bgOp); 

                // 若為特殊色 (黑白)，直接依據背景反轉
                if (isSpecialColor(textState.color)) {
                    setTextState({ ...textState, color: effBgL > 0.5 ? 'black' : 'white' });
                    showToast('✨ 對比度已自動修正');
                    return;
                }

                let targetShades = [...SHADES];
                if (effBgL > 0.5) targetShades.reverse(); // 亮色背景優先找深色文字
                
                // 尋找最近的及格色階
                for (let shade of targetShades) {
                    const textL = getLuminance(textState.color, shade);
                    const effTextL = textL * textOp + effBgL * (1 - textOp);
                    const ratio = (Math.max(effBgL, effTextL) + 0.05) / (Math.min(effBgL, effTextL) + 0.05);

                    if (ratio >= 4.5) {
                        setTextState({ ...textState, shade: shade });
                        showToast('✨ 對比度已自動修正');
                        return;
                    }
                }
                
                // 若同色系皆無法及格，則採用高對比極致色
                setTextState({ ...textState, color: effBgL > 0.5 ? 'black' : 'white' });
                showToast('✨ 已替換為高對比極致色');
            };

            const getCurrentState = () => {
                if (activeTab === 'text') return { state: textState, setter: setTextState };
                if (activeTab === 'border') return { state: borderState, setter: setBorderState };
                if (activeTab === 'bg' && bgMode === 'gradient' && gradientTab === 'to') return { state: gradientToState, setter: setGradientToState };
                return { state: bgState, setter: setBgState };
            };

            const { state: currentConfig, setter: currentSetter } = getCurrentState();

            // 修復效能：使用 useRef 緩存最新函式，避免 useEffect 頻繁重新綁定監聽器
            const handleCopyRef = useRef();
            const getCurrentStateRef = useRef();
            
            // 每次渲染更新 ref 指向最新的函式
            useEffect(() => {
                handleCopyRef.current = handleCopy;
                getCurrentStateRef.current = getCurrentState;
            });

            // 快捷鍵支援 (只綁定一次，徹底解決重繪導致的效能問題)
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    
                    if (e.key === 'c' || e.key === 'C') {
                        if (handleCopyRef.current) handleCopyRef.current();
                    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                        if (!getCurrentStateRef.current) return;
                        const { state, setter } = getCurrentStateRef.current();
                        if (isSpecialColor(state.color)) return;
                        const idx = SHADES.indexOf(state.shade);
                        if (e.key === 'ArrowLeft' && idx > 0) {
                            setter({ ...state, shade: SHADES[idx - 1] });
                        } else if (e.key === 'ArrowRight' && idx < SHADES.length - 1) {
                            setter({ ...state, shade: SHADES[idx + 1] });
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []); // 加入空依賴陣列

            const getSwatchClass = (colorName) => {
                if (colorName === 'white') return 'bg-white border-slate-200';
                if (colorName === 'black') return 'bg-black border-transparent';
                return `bg-${colorName}-500 border-transparent`;
            }

            const getPreviewContainerStyle = () => {
                switch(previewBg) {
                    case 'dark': return 'dark bg-slate-900 border-slate-800 shadow-inner'; 
                    case 'gray': return 'bg-slate-100 border-slate-200 shadow-inner';
                    default: return 'bg-white border-slate-100 shadow-sm'; 
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-8 relative animate-fade-in">
                    
                    {/* SVG 圖示元件化與共用 */}
                    <svg className="hidden">
                        <defs>
                            <symbol id="icon-capsule" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><g transform="rotate(-45 12 12)"><rect x="3" y="7.5" width="18" height="9" rx="4.5"></rect><line x1="12" y1="7.5" x2="12" y2="16.5"></line></g></symbol>
                            <symbol id="icon-card" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></symbol>
                            <symbol id="icon-button" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"></rect></symbol>
                            <symbol id="icon-badge" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></symbol>
                        </defs>
                    </svg>

                    <div className="absolute top-4 right-4 text-right">
                        <p className="text-sm font-bold text-slate-700">製作者 : 蝦仁藥師</p>
                        <p className="text-xs text-slate-400">更新日期 : 2026/01/11</p>
                    </div>

                    {showGuide && (
                        <Modal onClose={() => setShowGuide(false)} title="色彩搭配小教室" icon={<span className="text-3xl">🎨</span>}>
                            <ColorGuideContent />
                        </Modal>
                    )}
                    
                    {showTutorial && (
                        <Modal onClose={() => setShowTutorial(false)} title="程式碼教學" icon={<span className="text-3xl">🎓</span>}>
                            <CodeTutorialContent />
                        </Modal>
                    )}

                    {/* 版面邏輯優化：加寬容器至 max-w-[1600px]，提升橫向空間利用率 */}
                    <div className="w-full max-w-[1600px] grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-10 mt-8 items-start">
                        
                        {/* 左側控制面板 (佔 7~8 欄) */}
                        <div className="lg:col-span-7 xl:col-span-8 bg-white/90 backdrop-blur-xl rounded-[2rem] shadow-2xl shadow-slate-200/50 p-6 md:p-8 border border-white flex flex-col gap-8 transition-all">
                            
                            {/* 標題與按鈕區 */}
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                <h1 className="text-2xl lg:text-3xl font-extrabold text-slate-800 flex items-center gap-3 tracking-tight">
                                    <div className="p-2 bg-blue-50 text-blue-600 rounded-2xl shadow-sm border border-blue-100">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.087 0-.875.75-1.5 1.5-1.5H17c2.75 0 5-2.25 5-5 0-3.875-3.375-7-10-7z"/></svg>
                                    </div>
                                    Tailwind 顏色工具
                                </h1>
                                <div className="flex flex-wrap gap-3 w-full sm:w-auto">
                                    <button onClick={handleReset} className="flex-1 sm:flex-none items-center justify-center gap-1.5 text-sm bg-slate-50 text-slate-600 px-5 py-2.5 rounded-full hover:bg-slate-100 hover:shadow-md hover:-translate-y-0.5 active:scale-95 transition-all border border-slate-200 font-bold whitespace-nowrap">
                                        🔄 還原預設
                                    </button>
                                    <button onClick={() => setShowTutorial(true)} className="flex-1 sm:flex-none items-center justify-center gap-1.5 text-sm bg-teal-50 text-teal-700 px-5 py-2.5 rounded-full hover:bg-teal-100 hover:shadow-md hover:-translate-y-0.5 active:scale-95 transition-all border border-teal-200 font-bold whitespace-nowrap">
                                        程式碼教學
                                    </button>
                                    <button onClick={() => setShowGuide(true)} className="flex-1 sm:flex-none items-center justify-center gap-1.5 text-sm bg-rose-50 text-rose-700 px-5 py-2.5 rounded-full hover:bg-rose-100 hover:shadow-md hover:-translate-y-0.5 active:scale-95 transition-all border border-rose-200 font-bold whitespace-nowrap">
                                        配色建議
                                    </button>
                                </div>
                            </div>

                            {/* 版面邏輯優化：寬度提升與水平雙欄配置，減少向下滾動 */}
                            <div className="flex flex-col xl:flex-row gap-6 xl:gap-8">
                                {/* 色彩與標籤控制主區 (左半) */}
                                <div className="flex-1 flex flex-col gap-6">
                                    {/* 主要設定區域塊 */}
                                    <div className="bg-slate-50/50 p-2 rounded-2xl border border-slate-100">
                                        {/* 標籤切換 */}
                                        <div className="flex gap-1">
                                            {['bg', 'text', 'border'].map((tab) => (
                                                <button
                                                    key={tab}
                                                    onClick={() => setActiveTab(tab)}
                                                    className={`flex-1 py-3 px-2 text-sm font-bold rounded-xl transition-all duration-300 ${
                                                        activeTab === tab 
                                                        ? 'bg-white text-blue-600 shadow-md shadow-slate-200/50 border border-slate-100 scale-100' 
                                                        : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100/50 scale-95'
                                                    }`}
                                                >
                                                    {tab === 'bg' ? '背景顏色' : tab === 'text' ? '文字顏色' : '邊框顏色'}
                                                </button>
                                            ))}
                                        </div>

                                        {/* 漸層控制列 */}
                                        <div className={`overflow-hidden transition-all duration-300 ${activeTab === 'bg' ? 'max-h-40 opacity-100 mt-4 px-2' : 'max-h-0 opacity-0 m-0 p-0'}`}>
                                            <div className="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex flex-col sm:flex-row gap-3 justify-between items-center">
                                                <div className="flex bg-slate-100 p-1.5 rounded-lg gap-1 w-full sm:w-auto">
                                                    <button onClick={() => setBgMode('solid')} className={`flex-1 sm:px-5 py-1.5 text-xs font-bold rounded-md transition-all duration-200 ${bgMode === 'solid' ? 'bg-white text-slate-800 shadow shadow-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>單色模式</button>
                                                    <button onClick={() => setBgMode('gradient')} className={`flex-1 sm:px-5 py-1.5 text-xs font-bold rounded-md transition-all duration-200 ${bgMode === 'gradient' ? 'bg-white text-slate-800 shadow shadow-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>漸層模式</button>
                                                </div>
                                                {bgMode === 'gradient' && (
                                                    <select 
                                                        value={gradientDir} 
                                                        onChange={(e) => setGradientDir(e.target.value)}
                                                        className="text-xs font-bold border border-slate-200 rounded-lg px-3 py-2 bg-slate-50 text-slate-700 w-full sm:w-auto focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow cursor-pointer hover:bg-slate-100"
                                                    >
                                                        <option value="to-r">向右漸層 (to-r)</option>
                                                        <option value="to-l">向左漸層 (to-l)</option>
                                                        <option value="to-t">向上漸層 (to-t)</option>
                                                        <option value="to-b">向下漸層 (to-b)</option>
                                                        <option value="to-br">向右下 (to-br)</option>
                                                        <option value="to-tr">向右上 (to-tr)</option>
                                                    </select>
                                                )}
                                            </div>
                                            
                                            {bgMode === 'gradient' && (
                                                <div className="flex gap-2 mt-3 mx-1">
                                                    <button onClick={() => setGradientTab('from')} className={`flex-1 py-2 text-xs font-bold rounded-t-xl border-b-2 transition-all ${gradientTab === 'from' ? 'border-blue-500 text-blue-700 bg-blue-50/80' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}>🔸 起始色 (From)</button>
                                                    <button onClick={() => setGradientTab('to')} className={`flex-1 py-2 text-xs font-bold rounded-t-xl border-b-2 transition-all ${gradientTab === 'to' ? 'border-purple-500 text-purple-700 bg-purple-50/80' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}>🔹 結束色 (To)</button>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* 顏色選擇區 */}
                                    <div className="px-2">
                                        <label className="block text-sm font-bold text-slate-700 mb-4 flex justify-between items-center">
                                            <span>選擇主色系 ({currentConfig.color})</span>
                                            <span className={`w-5 h-5 rounded-full bg-${currentConfig.color}-500 border-2 border-white shadow-sm ring-1 ring-slate-200`}></span>
                                        </label>
                                        <div className="grid grid-cols-6 sm:grid-cols-8 md:grid-cols-11 gap-3 md:gap-2">
                                            {COLOR_NAMES.map((colorName) => (
                                                <button
                                                    key={colorName}
                                                    onClick={() => currentSetter({ ...currentConfig, color: colorName })}
                                                    title={colorName}
                                                    className={`
                                                        w-10 h-10 sm:w-9 sm:h-9 md:w-8 md:h-8 xl:w-10 xl:h-10 rounded-full border-2 focus:outline-none color-swatch relative shadow-sm hover:shadow-md hover:-translate-y-1 hover:scale-110 active:scale-95 transition-all duration-200
                                                        ${getSwatchClass(colorName)}
                                                        ${currentConfig.color === colorName ? 'border-slate-800 scale-110 ring-4 ring-slate-200/50 z-10' : ''}
                                                    `}
                                                ></button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 深淺選擇區 */}
                                    <div className="px-2">
                                        <label className="block text-sm font-bold text-slate-700 mb-4">
                                            選擇深淺明度 {componentType === 'capsule' ? '' : isSpecialColor(currentConfig.color) ? '(單一色)' : `(${currentConfig.shade})`}
                                        </label>
                                        
                                        {componentType === 'capsule' ? (
                                            <div className="p-4 bg-blue-50/80 rounded-2xl text-blue-700 text-sm flex items-center justify-center gap-3 border border-blue-100 shadow-sm font-medium animate-fade-in">
                                                <span className="text-xl">✨</span>
                                                膠囊模式會自動配對雙模深淺，您只需要切換主色系即可！
                                            </div>
                                        ) : isSpecialColor(currentConfig.color) ? (
                                            <div className="p-4 bg-slate-50 rounded-2xl text-slate-500 text-sm text-center border border-slate-100 animate-fade-in">
                                                黑白模式無需選擇深淺
                                            </div>
                                        ) : (
                                            <div className="grid grid-cols-6 sm:grid-cols-11 gap-2">
                                                {SHADES.map((shade) => (
                                                    <button
                                                        key={shade}
                                                        onClick={() => currentSetter({ ...currentConfig, shade: shade })}
                                                        className={`
                                                            h-10 sm:h-9 xl:h-10 rounded-xl text-xs font-bold transition-all duration-200 hover:shadow-md hover:-translate-y-0.5 active:scale-95
                                                            bg-${currentConfig.color}-${shade}
                                                            ${parseInt(shade) > 400 ? 'text-white' : 'text-slate-800'}
                                                            ${currentConfig.shade === shade ? 'ring-2 ring-offset-2 ring-slate-400 scale-110 shadow-md' : 'shadow-sm opacity-90 hover:opacity-100'}
                                                        `}
                                                    >
                                                        {shade}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* 透明度選擇區 */}
                                    {componentType !== 'capsule' && (
                                        <div className="px-2 pb-2">
                                            <div className="flex justify-between text-sm font-bold text-slate-700 mb-3">
                                                <span>透明度 (Transparency)</span>
                                                <span className="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-md text-xs">{100 - parseInt(currentConfig.opacity)}%</span>
                                            </div>
                                            <input 
                                                type="range" min="0" max="100" step="5" 
                                                value={100 - parseInt(currentConfig.opacity)} 
                                                onChange={(e) => currentSetter({ ...currentConfig, opacity: (100 - parseInt(e.target.value)).toString() })}
                                                className="w-full"
                                            />
                                        </div>
                                    )}
                                </div>

                                {/* 分隔線 (僅電腦寬螢幕版顯示) */}
                                <div className="hidden xl:block w-px bg-slate-200/50 shrink-0"></div>
                                <hr className="block xl:hidden border-slate-100 my-0" />

                                {/* 外觀細節設定區 (右半) */}
                                <div className="xl:w-[280px] 2xl:w-[320px] shrink-0">
                                    <div className="bg-slate-50/50 p-6 rounded-3xl border border-slate-100 h-full flex flex-col">
                                        <h3 className="text-sm font-bold text-slate-800 mb-6 flex items-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-slate-400"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                                            外觀空間細節 (Padding & Borders)
                                        </h3>
                                        <div className="space-y-6 xl:space-y-8 flex-grow">
                                            <div>
                                                <div className="flex justify-between text-xs font-bold text-slate-500 mb-3 px-1">
                                                    <span>內距: p-{paddingInput}</span>
                                                    <span className="bg-slate-200 text-slate-700 px-2 py-0.5 rounded text-[10px]">{parseInt(paddingInput)*4}px</span>
                                                </div>
                                                <input 
                                                    type="range" min="0" max="12" step="1" 
                                                    value={paddingInput} 
                                                    onChange={(e) => setPaddingInput(e.target.value)}
                                                    className="w-full"
                                                />
                                            </div>

                                            {/* 將寬螢幕時的版面改為垂直排列，充分填補空間 */}
                                            <div className="grid grid-cols-2 xl:grid-cols-1 gap-6 pt-2">
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-500 mb-3">粗細 (Width)</label>
                                                    <div className="flex bg-white rounded-lg p-1.5 gap-1 border border-slate-200 shadow-sm">
                                                        {['0', '1', '2', '4', '8'].map(w => (
                                                            <button 
                                                                key={w}
                                                                onClick={() => setBorderWidth(w)}
                                                                className={`flex-1 text-xs py-2 rounded-md transition-all ${borderWidth === w ? 'bg-slate-800 shadow-md text-white font-bold scale-105' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}`}
                                                            >
                                                                {w}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-500 mb-3">樣式 (Style)</label>
                                                    <div className="flex bg-white rounded-lg p-1.5 gap-1 border border-slate-200 shadow-sm">
                                                        {[
                                                            {val: 'solid', icon: '一'}, 
                                                            {val: 'dashed', icon: '---'}, 
                                                            {val: 'dotted', icon: '...'}, 
                                                            {val: 'double', icon: '='}
                                                        ].map(s => (
                                                            <button 
                                                                key={s.val}
                                                                onClick={() => setBorderStyle(s.val)}
                                                                className={`flex-1 text-xs py-2 rounded-md transition-all ${borderStyle === s.val ? 'bg-slate-800 shadow-md text-white font-bold scale-105' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}`}
                                                                title={s.val}
                                                            >
                                                                {s.icon}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 右側預覽區域 (佔 5~4 欄) - 加上 sticky 避免跟隨左側拉長 */}
                        <div className="lg:col-span-5 xl:col-span-4 flex flex-col gap-6 lg:sticky lg:top-8 self-start w-full">
                            
                            {/* 元件類型與背景切換 */}
                            <div className="flex flex-wrap gap-4 justify-between items-center bg-white/90 backdrop-blur-xl p-3 sm:p-4 rounded-3xl shadow-xl shadow-slate-200/40 border border-white">
                                <div className="flex gap-1 bg-slate-50 p-1.5 rounded-2xl border border-slate-100 w-full sm:w-auto overflow-x-auto custom-scrollbar">
                                    {[
                                        { id: 'capsule', icon: <svg width="16" height="16"><use href="#icon-capsule" /></svg>, label: '膠囊' },
                                        { id: 'card', icon: <svg width="16" height="16"><use href="#icon-card" /></svg>, label: '卡片' },
                                        { id: 'button', icon: <svg width="16" height="16"><use href="#icon-button" /></svg>, label: '按鈕' },
                                        { id: 'badge', icon: <svg width="16" height="16"><use href="#icon-badge" /></svg>, label: '標籤' },
                                    ].map(type => (
                                        <button 
                                            key={type.id}
                                            onClick={() => setComponentType(type.id)}
                                            className={`flex items-center gap-1.5 px-3.5 py-2 rounded-xl text-sm font-bold transition-all duration-300 whitespace-nowrap ${componentType === type.id ? 'bg-slate-800 text-white shadow-md' : 'text-slate-500 hover:bg-white hover:text-slate-800 hover:shadow-sm'}`}
                                        >
                                            {type.icon} {type.label}
                                        </button>
                                    ))}
                                </div>

                                <div className="flex items-center gap-2 text-xs font-bold text-slate-500 w-full sm:w-auto justify-end px-2">
                                    背景:
                                    <div className="flex bg-slate-100 rounded-xl p-1 gap-1">
                                        <button onClick={() => setPreviewBg('light')} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all ${previewBg === 'light' ? 'bg-white shadow-md scale-105' : 'hover:bg-slate-200'}`} title="亮色"><div className="w-4 h-4 bg-white border border-slate-200 rounded-full"></div></button>
                                        <button onClick={() => setPreviewBg('gray')} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all ${previewBg === 'gray' ? 'bg-white shadow-md scale-105' : 'hover:bg-slate-200'}`} title="灰色"><div className="w-4 h-4 bg-slate-200 rounded-full"></div></button>
                                        <button onClick={() => setPreviewBg('dark')} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all ${previewBg === 'dark' ? 'bg-white shadow-md scale-105' : 'hover:bg-slate-200'}`} title="深色"><div className="w-4 h-4 bg-slate-800 rounded-full border border-slate-600 shadow-inner"></div></button>
                                    </div>
                                </div>
                            </div>

                            {/* 預覽展示卡片 */}
                            <div className="bg-white/90 backdrop-blur-xl rounded-[2rem] shadow-2xl shadow-slate-200/50 p-6 border border-white flex flex-col relative overflow-hidden transition-all duration-500">
                                <h2 className="text-lg font-extrabold text-slate-800 mb-5 flex justify-between items-center">
                                    即時預覽
                                    {!contrastData?.warning && componentType !== 'capsule' && contrastData && (
                                        <div className="flex items-center gap-1 text-slate-500 text-xs font-bold bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm transition-all" title="WCAG 對比度">
                                            對比度 {contrastData.ratio}:1 <span className="bg-slate-200 px-1.5 rounded text-[10px] ml-1">{contrastData.rating}</span>
                                        </div>
                                    )}
                                    {contrastData?.warning && (
                                        <div className="flex items-center gap-2">
                                            <div className="flex items-center gap-1.5 text-rose-600 text-xs font-bold bg-rose-50 px-3 py-1.5 rounded-lg border border-rose-200 shadow-sm animate-pulse">
                                                ⚠️ 對比度不足 {contrastData.ratio}:1
                                            </div>
                                            <button onClick={autoFixContrast} className="flex items-center gap-1 text-emerald-700 text-xs font-bold bg-emerald-50 px-3 py-1.5 rounded-lg border border-emerald-200 shadow-sm hover:bg-emerald-100 hover:-translate-y-0.5 transition-all active:scale-95">
                                                ✨ 自動修正
                                            </button>
                                        </div>
                                    )}
                                </h2>
                                
                                {/* 移除了固定高度 h-64，改用 min-h，讓高度自然流動，解決大片留白問題 */}
                                <div className={`flex items-center justify-center p-8 rounded-2xl border-2 border-dashed min-h-[16rem] transition-all duration-500 overflow-hidden ${getPreviewContainerStyle()}`}>
                                    <div className={`${previewClassString} transition-all duration-500 ease-out`}>
                                        {componentType === 'capsule' && (
                                            <svg className="w-14 h-14"><use href="#icon-capsule" /></svg>
                                        )}
                                        {componentType === 'card' && (
                                            <>
                                                <h3 className="text-xl font-bold mb-3">卡片標題</h3>
                                                <p className="opacity-90 text-sm leading-relaxed">這是卡片內容範例。你可以試著調整左側的「外觀空間細節」來改變內距 (Padding) 和邊框 (Border) 的視覺效果。</p>
                                            </>
                                        )}
                                        {componentType === 'button' && (
                                            <span className="flex items-center gap-2 justify-center px-2">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                                                確認送出
                                            </span>
                                        )}
                                        {componentType === 'badge' && (
                                            <span className="flex items-center gap-1.5 px-1">
                                                <span className="w-2 h-2 rounded-full bg-current opacity-80 animate-pulse"></span>
                                                New Feature
                                            </span>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* 程式碼輸出框 */}
                            <div className="bg-slate-900 rounded-[2rem] p-6 shadow-2xl shadow-slate-300/40 border border-slate-800 relative group overflow-hidden transition-all duration-300 hover:shadow-slate-400/40">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 blur-3xl rounded-full -mr-10 -mt-10 pointer-events-none"></div>
                                <div className="flex justify-between items-center mb-4 relative z-10">
                                    <h3 className="text-sm font-bold text-slate-300 flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-400"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                                        生成的程式碼
                                    </h3>
                                    <button 
                                        onClick={handleCopy}
                                        className={`text-xs px-4 py-2 rounded-lg font-bold transition-all flex items-center gap-1.5 shadow-sm active:scale-95 ${copied ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white border border-slate-700'}`}
                                        title="快捷鍵: C"
                                    >
                                        {copied ? '✅ 已複製' : '📋 複製代碼'}
                                    </button>
                                </div>
                                <div className="bg-black/50 p-4 rounded-xl border border-white/5 relative z-10 custom-scrollbar overflow-x-auto">
                                    <code className="block text-sm font-mono whitespace-nowrap text-emerald-400/90 leading-relaxed">
                                        {classString}
                                    </code>
                                </div>
                            </div>

                        </div>
                    </div>
                    
                    {/* 全域精緻 Toast 提示訊息 */}
                    <div className={`fixed bottom-8 left-1/2 transform -translate-x-1/2 transition-all duration-500 z-50 ${toastMsg ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}>
                        <div className="bg-slate-800/95 backdrop-blur shadow-2xl text-white px-6 py-3.5 rounded-2xl flex items-center gap-3 border border-slate-700 animate-bounce-soft font-bold">
                            <span className="bg-emerald-500/20 text-emerald-400 p-1 rounded-full border border-emerald-500/20">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            </span>
                            {toastMsg}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
