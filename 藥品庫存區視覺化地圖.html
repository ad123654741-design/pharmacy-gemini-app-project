<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥品庫存視覺化查詢系統 | Pro UI</title>
    
    <!-- 引入 Tailwind CSS (用於快速且高質感的 UI 排版) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Lucide Icons (高質感開源圖示庫) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 引入 Google Fonts: Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 引入 Three.js 及其控制模組 (3D視覺化主視覺用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- 自訂 Tailwind 設定與 CSS 動畫 -->
    <script>
        tailwind.config = {
            darkMode: 'class', // 支援深色模式切換
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0ea5e9', // 醫療科技感的藍色
                        primaryDark: '#0284c7',
                    }
                }
            }
        }
    </script>
    
    <style>
        /* 隱藏捲軸但保持可捲動 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 搜尋命中時的鐵架發光呼吸燈動畫 */
        @keyframes highlight-pulse {
            0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4); border-color: #0ea5e9; }
            50% { box-shadow: 0 0 25px 10px rgba(14, 165, 233, 0.6); border-color: #38bdf8; transform: translateY(-8px) scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4); border-color: #0ea5e9; }
        }

        /* 深色模式發光呼吸燈 */
        .dark .rack-highlighted {
            animation: highlight-pulse-dark 2s infinite ease-in-out;
            background-color: rgba(14, 165, 233, 0.1);
        }
        @keyframes highlight-pulse-dark {
            0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4); border-color: #0ea5e9; }
            50% { box-shadow: 0 0 25px 10px rgba(14, 165, 233, 0.4); border-color: #38bdf8; transform: translateY(-8px) scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4); border-color: #0ea5e9; }
        }

        /* 鐵架動態高光 Class */
        .rack-highlighted {
            animation: highlight-pulse 2s infinite ease-in-out;
            z-index: 20;
            background-color: #f0f9ff;
        }

        /* 點選鎖定時的樣式 */
        .rack-selected {
            border-color: #10b981 !important; 
            background-color: #ecfdf5 !important;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4) !important;
            transform: translateY(-8px);
            z-index: 15;
        }
        
        .dark .rack-selected {
            background-color: rgba(16, 185, 129, 0.1) !important;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.2) !important;
        }
        
        /* 鐵架基礎過渡動畫 */
        .rack-base {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 h-screen w-full overflow-hidden flex flex-col text-slate-800 dark:text-slate-100 transition-colors duration-300">

    <!-- 頂部導覽列 (Header) -->
    <header class="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 shadow-sm flex items-center px-6 shrink-0 z-30 relative transition-colors duration-300">
        <div class="flex items-center gap-3 text-primary">
            <i data-lucide="cross" class="w-6 h-6"></i>
            <h1 class="text-xl font-bold tracking-wide">藥品庫存區視覺化地圖</h1>
        </div>
        <div class="ml-auto flex items-center gap-4">
            <div class="hidden sm:flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
                <i data-lucide="clock" class="w-4 h-4"></i>
                <span id="lastUpdateTime">最後更新: 載入中...</span>
            </div>
            
            <!-- 登入/登出切換按鈕 -->
            <button onclick="Controllers.toggleAuth()" class="flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 rounded-lg transition-all duration-200 hover:-translate-y-0.5 shadow-sm border border-transparent dark:border-slate-600" title="管理員登入">
                <i data-lucide="log-in" id="authIcon" class="w-4 h-4"></i>
                <span class="text-sm font-medium hidden md:block" id="authText">登入</span>
            </button>

            <!-- 設定按鈕 (齒輪) -->
            <button onclick="Controllers.openSettingsModal()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-all duration-300 hover:rotate-90 shadow-sm bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600" title="系統設定">
                <i data-lucide="settings" class="w-4 h-4"></i>
            </button>

            <!-- 深淺色切換按鈕 -->
            <button onclick="Controllers.toggleDarkMode()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-all duration-200 hover:-translate-y-0.5 shadow-sm bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600" title="切換深淺色模式">
                <i data-lucide="moon" class="w-4 h-4 hidden dark:block"></i>
                <i data-lucide="sun" class="w-4 h-4 block dark:hidden"></i>
            </button>
        </div>
    </header>

    <!-- 主要內容區塊 -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative pb-[70px] md:pb-0">
        
        <!-- 左側面板：搜尋與列表 -->
        <aside class="w-full md:w-[400px] bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col shrink-0 z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)] h-[40vh] md:h-auto transition-colors duration-300">
            
            <!-- 搜尋區塊 -->
            <div class="p-6 border-b border-slate-100 dark:border-slate-700 bg-white dark:bg-slate-800 sticky top-0 shrink-0 transition-colors duration-300">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-slate-800 dark:text-slate-100">尋找藥品</h2>
                    <div class="hidden md:flex items-center gap-2">
                        <button onclick="Controllers.resetAll()" class="flex items-center gap-1 text-xs bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-600 transition-all duration-200 hover:-translate-y-0.5 shadow-sm border border-slate-200 dark:border-slate-600" title="清除搜尋與選取狀態">
                            <i data-lucide="eraser" class="w-3.5 h-3.5"></i> 清除
                        </button>
                        <button onclick="Controllers.openEditModal('', '', 'Rack-A')" class="auth-required hidden flex items-center gap-1 text-xs bg-primary text-white px-3 py-1.5 rounded-lg hover:bg-primaryDark transition-all duration-200 hover:-translate-y-0.5 shadow-sm hover:shadow-primary/30">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> 新增
                        </button>
                    </div>
                </div>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="w-5 h-5 text-slate-400 group-focus-within:text-primary transition-colors"></i>
                    </div>
                    <input type="text" id="searchInput" 
                        class="w-full pl-10 pr-10 py-3 bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl text-slate-700 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300 hover:shadow-sm"
                        placeholder="請輸入英文或中文藥品名稱">
                    <button id="clearSearchBtn" class="absolute inset-y-0 right-0 pr-3 flex items-center hidden text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                        <i data-lucide="x-circle" class="w-5 h-5"></i>
                    </button>
                </div>
                
                <div id="statusMessage" class="mt-4 text-sm text-slate-500 dark:text-slate-400 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-slate-300 dark:bg-slate-600 inline-block" id="statusDot"></span>
                    <span id="statusText">顯示所有藥品清單</span>
                </div>
            </div>

            <!-- 藥品列表區塊 -->
            <div class="flex-1 overflow-y-auto p-4 no-scrollbar bg-slate-50/50 dark:bg-slate-900/20" id="medicineListContainer">
                <!-- JS 動態渲染 -->
            </div>
            
            <div class="p-4 border-t border-slate-100 dark:border-slate-700 bg-white dark:bg-slate-800 text-xs text-center text-slate-400 dark:text-slate-500 shrink-0 transition-colors duration-300">
                系統中共有 <span id="totalItemsCount" class="font-bold text-slate-600 dark:text-slate-300">0</span> 項藥品
            </div>
        </aside>

        <!-- 右側面板：庫存視覺化 -->
        <section class="flex-1 bg-slate-100/50 dark:bg-slate-900/50 relative overflow-hidden flex flex-col transition-colors duration-300">
            
            <!-- 頂部說明區與右上角俯視小圖 -->
            <div class="p-6 pb-0 shrink-0 flex justify-between items-start z-10 relative pointer-events-none">
                <div class="pr-4 pointer-events-auto">
                    <p class="text-slate-500 dark:text-slate-400 text-sm mb-3">搜尋左側藥品，系統將自動為您標示儲位。點擊俯視圖或 3D 模型中的層架可篩選顯示內容。</p>
                    <!-- 鐵架名稱與種類說明區 -->
                    <div id="rackInfoContainer" class="flex flex-wrap gap-2">
                        <!-- JS 動態渲染種類標籤 -->
                    </div>
                </div>
                
                <!-- 恢復並修改右上角俯視圖 (僅保留名稱) -->
                <div class="hidden sm:flex flex-col items-center gap-1 shrink-0 pointer-events-auto z-20">
                    <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 tracking-widest bg-white/80 dark:bg-slate-800/80 px-2 rounded backdrop-blur-sm shadow-sm border border-slate-200 dark:border-slate-700">空間俯視圖</span>
                    <div class="relative w-40 h-[100px] border-[2px] border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 rounded-sm shadow-md p-1 transition-colors duration-300" id="minimapContainer">
                        <!-- JS 動態渲染小俯視圖 -->
                    </div>
                </div>
            </div>

            <!-- 3D 視覺化主容器 -->
            <div class="absolute inset-0 z-0 overflow-hidden outline-none cursor-grab active:cursor-grabbing" id="canvas-container">
                <!-- Three.js Canvas 將渲染於此 -->
            </div>
        </section>
    </main>

    <!-- 手機版底部導覽列 (僅小螢幕顯示) -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 flex justify-around p-2 z-40 transition-colors duration-300 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] pb-safe">
        <button onclick="document.getElementById('searchInput').focus()" class="flex flex-col items-center gap-1 p-2 text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-all duration-200 hover:-translate-y-1">
            <i data-lucide="search" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">搜尋</span>
        </button>
        <button onclick="Controllers.openEditModal('', '', 'Rack-A')" class="auth-required hidden flex flex-col items-center gap-1 p-2 text-primary hover:text-primaryDark transition-all duration-200 hover:-translate-y-1">
            <div class="bg-primary/10 p-1.5 rounded-full">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </div>
            <span class="text-[10px] font-medium">新增</span>
        </button>
        <button onclick="Controllers.resetAll()" class="flex flex-col items-center gap-1 p-2 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-all duration-200 hover:-translate-y-1">
            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">重置</span>
        </button>
    </nav>

    <!-- 新增/編輯藥品 Modal -->
    <div id="editModal" class="fixed inset-0 bg-slate-900/60 dark:bg-slate-950/80 z-50 hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden transform scale-95 transition-all duration-300" id="editModalContent">
            <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                <h3 class="font-bold text-slate-800 dark:text-slate-100 text-lg" id="modalTitle">新增/編輯藥品</h3>
                <button onclick="Controllers.closeEditModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-transform duration-200 hover:rotate-90">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 flex flex-col gap-4">
                <input type="hidden" id="editMedId">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">藥品名稱</label>
                    <input type="text" id="editMedName" class="w-full px-4 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-800 dark:text-slate-100 transition-colors shadow-sm" placeholder="請輸入藥品名稱">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">中文商品名稱 (列印標籤用)</label>
                    <input type="text" id="editMedChName" class="w-full px-4 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-800 dark:text-slate-100 transition-colors shadow-sm" placeholder="請輸入中文商品名稱 (選填)">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">存放儲位 (鐵架)</label>
                    <select id="editMedRack" class="w-full px-4 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-800 dark:text-slate-100 transition-colors shadow-sm">
                        <!-- 選項由 JS 動態產生，以連動層架編輯 -->
                    </select>
                </div>
            </div>
            <div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-700 flex justify-end gap-3">
                <button onclick="Controllers.closeEditModal()" class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 transition-all duration-200 hover:-translate-y-0.5">取消 (Esc)</button>
                <button onclick="Controllers.saveEditForm()" id="saveMedBtn" class="px-4 py-2 text-sm font-medium text-white bg-primary rounded-lg hover:bg-primaryDark transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-primary/30 flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4 hidden" id="saveIcon"></i> 儲存
                </button>
            </div>
        </div>
    </div>

    <!-- 層架類別編輯 Modal -->
    <div id="rackEditModal" class="fixed inset-0 bg-slate-900/60 dark:bg-slate-950/80 z-50 hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden transform scale-95 transition-all duration-300" id="rackEditModalContent">
            <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                <h3 class="font-bold text-slate-800 dark:text-slate-100 text-lg">編輯層架</h3>
                <button onclick="Controllers.closeRackEditModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-transform duration-200 hover:rotate-90">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 flex flex-col gap-3 max-h-[60vh] overflow-y-auto no-scrollbar" id="rackEditListContainer">
                <!-- JS 動態生成層架編輯清單 -->
            </div>
            <div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-700 flex justify-end gap-3">
                <button onclick="Controllers.closeRackEditModal()" class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 transition-all duration-200 hover:-translate-y-0.5">取消 (Esc)</button>
                <button id="saveRackBtn" onclick="Controllers.saveRackEditForm()" class="px-4 py-2 text-sm font-medium text-white bg-primary rounded-lg hover:bg-primaryDark transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-primary/30 flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> 儲存變更
                </button>
            </div>
        </div>
    </div>

    <!-- 系統設定 Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-slate-900/60 dark:bg-slate-950/80 z-50 hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden transform scale-95 transition-all duration-300" id="settingsModalContent">
            <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                <h3 class="font-bold text-slate-800 dark:text-slate-100 text-lg">系統設定</h3>
                <button onclick="Controllers.closeSettingsModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-transform duration-200 hover:rotate-90">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 flex flex-col gap-3">
                <button onclick="Controllers.closeSettingsModal(); Controllers.openRackEditModal()" class="flex items-center gap-4 p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm group text-left">
                    <div class="w-10 h-10 rounded-full bg-primary/10 text-primary flex items-center justify-center group-hover:scale-110 transition-transform">
                        <i data-lucide="layers" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div class="font-bold text-slate-800 dark:text-slate-100">層架編輯</div>
                        <div class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">修改層架顯示名稱與庫存類別標籤</div>
                    </div>
                </button>
                <!-- 匯出層架標籤功能 -->
                <button onclick="Controllers.closeSettingsModal(); Controllers.exportRackLabels()" class="flex items-center gap-4 p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm group text-left">
                    <div class="w-10 h-10 rounded-full bg-emerald-500/10 text-emerald-500 flex items-center justify-center group-hover:scale-110 transition-transform">
                        <i data-lucide="printer" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div class="font-bold text-slate-800 dark:text-slate-100">匯出層架標籤</div>
                        <div class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">產生適合列印的儲位標籤，方便黏貼對照</div>
                    </div>
                </button>
                <!-- 匯出藥品標籤功能 -->
                <button onclick="Controllers.closeSettingsModal(); Controllers.exportMedicineLabels()" class="flex items-center gap-4 p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm group text-left">
                    <div class="w-10 h-10 rounded-full bg-blue-500/10 text-blue-500 flex items-center justify-center group-hover:scale-110 transition-transform">
                        <i data-lucide="tags" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div class="font-bold text-slate-800 dark:text-slate-100">匯出藥品標籤</div>
                        <div class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">依層架分類匯出藥品標籤，橫向雙排方便剪貼</div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- 登入 Modal -->
    <div id="loginModal" class="fixed inset-0 bg-slate-900/60 dark:bg-slate-950/80 z-[60] hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-xs mx-4 overflow-hidden transform scale-95 transition-all duration-300" id="loginModalContent">
            <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                <h3 class="font-bold text-slate-800 dark:text-slate-100 text-lg">管理員登入</h3>
                <button onclick="Controllers.closeLoginModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-transform duration-200 hover:rotate-90">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6">
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">請輸入管理員密碼</label>
                <input type="password" id="loginPwd" class="w-full px-4 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 text-slate-800 dark:text-slate-100 transition-colors shadow-sm" placeholder="Password" onkeypress="if(event.key === 'Enter') Controllers.submitLogin()">
                <!-- 密碼錯誤提示 -->
                <p id="loginErrorMsg" class="text-red-500 dark:text-red-400 text-xs mt-2 hidden flex items-center gap-1">
                    <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> 密碼錯誤，請重新輸入
                </p>
            </div>
            <div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-700 flex justify-end gap-3">
                <button onclick="Controllers.submitLogin()" class="w-full px-4 py-2 text-sm font-medium text-white bg-primary rounded-lg hover:bg-primaryDark transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-primary/30 flex items-center justify-center gap-2">
                    <i data-lucide="log-in" class="w-4 h-4"></i> 登入系統
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScript 應用程式邏輯區塊 -->
    <script>
        /**
         * 1. 資料架構與狀態
         */
        
        // 定義5個鐵架的基礎資料 (新增 category 屬性與底層編號 no)
        let RACKS_CONFIG = [
            { no: 1, id: 'Rack-A', name: '鐵架 A', label: 'A區', theme: 'border-slate-800', category: '', top: '25%', left: '42%', width: '14%', height: '18%' },
            { no: 2, id: 'Rack-B', name: '鐵架 B', label: 'B區', theme: 'border-slate-800', category: '', top: '5%', left: '57%', width: '20%', height: '19%' },
            { no: 3, id: 'Rack-C', name: '鐵架 C', label: 'C區', theme: 'border-slate-800', category: '', top: '25%', left: '57%', width: '20%', height: '18%' },
            { no: 4, id: 'Rack-D', name: '鐵架 D', label: 'D區', theme: 'border-slate-800', category: '', top: '5%', left: '78%', width: '9%', height: '38%' },
            { no: 5, id: 'Rack-E', name: '鐵架 E', label: 'E區', theme: 'border-slate-800', category: '', top: '63%', left: '26%', width: '9%', height: '32%' }
        ];

        const AppState = {
            medicines: [],
            searchQuery: '',
            selectedRackId: null, 
            lastUpdate: null, 
            isLoggedIn: false, // 新增登入狀態
            
            SHEET_ID: '1NSoY899Pk9KDaXJwhPxwka3YSsd_2Wt0DKffEU0tXkA', 
            WEB_APP_URL: 'https://script.google.com/macros/s/AKfycbzSdtEPXrU_tbM8aGsfO4V254solwNr9KlOY6rfSVZOUV5qmj8HWcVc4ccOui9uB6eN/exec',
            
            async initData() {
                if(!this.SHEET_ID) {
                    this.medicines = [];
                    this.lastUpdate = new Date().toLocaleString('zh-TW', { hour12: false }) + " (未設定資料庫)";
                    DOM.updateLastUpdateTime();
                    return;
                }

                // 核心 Fetch 函數
                const fetchSheet = async (sheetName = '') => {
                    let url = `https://docs.google.com/spreadsheets/d/${this.SHEET_ID}/gviz/tq?tqx=out:json`;
                    if (sheetName) url += `&sheet=${encodeURIComponent(sheetName)}`;
                    
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('Network response was not ok');
                    const text = await res.text();
                    const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/);
                    if (!match) throw new Error('Invalid response format');
                    const data = JSON.parse(match[1]);
                    if (data.status === 'error') {
                        throw new Error(data.errors?.[0]?.message || 'Google Sheet 讀取錯誤');
                    }
                    return data;
                };

                try {
                    // --- 先嘗試讀取後端的層架設定 (Racks 工作表) ---
                    try {
                        const rackJson = await fetchSheet('Racks');
                        const backendRacks = rackJson.table.rows.map(row => ({
                            id: row.c[0]?.v || '',
                            name: row.c[1]?.v || '',
                            category: row.c[2]?.v || ''
                        }));
                        // 套用後端層架設定
                        backendRacks.forEach(br => {
                            const r = RACKS_CONFIG.find(x => x.id === br.id);
                            if (r) {
                                if (br.name) r.name = br.name;
                                if (br.category) r.category = br.category;
                            }
                        });
                    } catch(e) {
                        console.warn("尚未建立 Racks 工作表或層架讀取失敗，使用預設或本機快取層架。");
                    }
                    DOM.renderRackOptions(); // 同步更新下拉選單

                    // --- 讀取藥品資料 ---
                    const medJson = await fetchSheet();
                    
                    this.medicines = medJson.table.rows.map(row => {
                        let rawRackId = (row.c[2]?.v || '').toString().trim();
                        // 支援在 Google Sheet C欄直接填寫 1, 2, 3, 4, 5，自動對應內部 ID
                        if (rawRackId === '1') rawRackId = 'Rack-A';
                        if (rawRackId === '2') rawRackId = 'Rack-B';
                        if (rawRackId === '3') rawRackId = 'Rack-C';
                        if (rawRackId === '4') rawRackId = 'Rack-D';
                        if (rawRackId === '5') rawRackId = 'Rack-E';
                        
                        return {
                            id: row.c[0]?.v || '',
                            name: row.c[1]?.v || '',
                            rackId: rawRackId,
                            chName: row.c[3]?.v || '' // 新增中文品名對應 Google Sheet D欄
                        };
                    }).filter(m => m.name !== ''); 

                    // 成功讀取後，將真實資料快取到本地端
                    localStorage.setItem('drugSysRealMedicines', JSON.stringify(this.medicines));

                    this.lastUpdate = new Date().toLocaleString('zh-TW', { hour12: false });
                    DOM.updateLastUpdateTime();
                } catch (error) {
                    console.error("讀取 Google Sheet 失敗", error);
                    // 離線或讀取失敗時，載入最後一次成功連線的真實資料
                    const cachedMeds = localStorage.getItem('drugSysRealMedicines');
                    this.medicines = cachedMeds ? JSON.parse(cachedMeds) : [];
                    
                    this.lastUpdate = new Date().toLocaleString('zh-TW', { hour12: false }) + " (連線失敗/離線模式)";
                    DOM.updateLastUpdateTime();
                    
                    // 彈出強烈警告提示權限問題
                    alert("連線失敗 (Failed to fetch)！\n\n如果這是您第一次設定，請務必開啟您的 Google Sheet：\n1. 點擊右上角的「共用」\n2. 將權限設為「知道連結的任何人」皆可「檢視」\n\n否則系統將被瀏覽器阻擋無法讀取資料喔！");
                }
            },

            getFilteredMedicines() {
                return this.medicines.filter(med => {
                    const q = this.searchQuery.toLowerCase();
                    const matchSearch = med.name.toLowerCase().includes(q) || 
                                        (med.chName && med.chName.toLowerCase().includes(q));
                    const matchRack = this.selectedRackId ? (med.rackId === this.selectedRackId) : true;
                    return matchSearch && matchRack;
                });
            },

            getHighlightedRackIds() {
                if (!this.searchQuery) return new Set(); 
                const q = this.searchQuery.toLowerCase();
                const matchedMeds = this.medicines.filter(med => 
                    med.name.toLowerCase().includes(q) || 
                    (med.chName && med.chName.toLowerCase().includes(q))
                );
                return new Set(matchedMeds.map(m => m.rackId));
            },

            async syncRacksToServer(racks) {
                if (!this.WEB_APP_URL) return true;
                try {
                    const payload = { action: 'saveRacks', racks: racks };
                    const response = await fetch(this.WEB_APP_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    return result.status === 'success';
                } catch (error) {
                    console.error("層架同步至後端失敗", error);
                    return false;
                }
            },

            async syncToServer(id, name, rackId, chName) {
                if (!this.WEB_APP_URL) {
                    this._updateLocalState(id, name, rackId, chName);
                    this.lastUpdate = new Date().toLocaleString('zh-TW', { hour12: false });
                    DOM.updateLastUpdateTime();
                    return true;
                }

                try {
                    const payload = { action: 'saveMedicine', id, name, rackId, chName };
                    const response = await fetch(this.WEB_APP_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        this._updateLocalState(result.id, result.name, result.rackId, result.chName);
                        this.lastUpdate = new Date().toLocaleString('zh-TW', { hour12: false });
                        DOM.updateLastUpdateTime();
                        return true;
                    } else {
                        alert("儲存失敗：" + result.message);
                        return false;
                    }
                } catch (error) {
                    alert("網路連線錯誤，無法同步至後端！將暫時更新於本地端預覽。");
                    this._updateLocalState(id, name, rackId, chName);
                    this.lastUpdate = new Date().toLocaleString('zh-TW', { hour12: false }) + " (本地更新)";
                    DOM.updateLastUpdateTime();
                    return true;
                }
            },

            _updateLocalState(id, name, rackId, chName) {
                const existIndex = this.medicines.findIndex(m => m.id === id);
                if (existIndex >= 0) {
                    this.medicines[existIndex] = { id, name, rackId, chName };
                } else {
                    const newId = id || ('m' + Date.now()); 
                    this.medicines.push({ id: newId, name, rackId, chName }); 
                }
                
                // 同步更新本地快取，確保離線作業不遺失
                localStorage.setItem('drugSysRealMedicines', JSON.stringify(this.medicines));
            }
        };

        /**
         * 2. DOM 操作與渲染
         */
        const DOM = {
            searchInput: document.getElementById('searchInput'),
            clearSearchBtn: document.getElementById('clearSearchBtn'),
            medicineListContainer: document.getElementById('medicineListContainer'),
            racksContainer: document.getElementById('racksContainer'),
            statusText: document.getElementById('statusText'),
            statusDot: document.getElementById('statusDot'),
            totalItemsCount: document.getElementById('totalItemsCount'),
            lastUpdateTime: document.getElementById('lastUpdateTime'),
            
            editModal: document.getElementById('editModal'),
            editModalContent: document.getElementById('editModalContent'),
            modalTitle: document.getElementById('modalTitle'),
            editMedId: document.getElementById('editMedId'),
            editMedName: document.getElementById('editMedName'),
            editMedChName: document.getElementById('editMedChName'),
            editMedRack: document.getElementById('editMedRack'),
            saveMedBtn: document.getElementById('saveMedBtn'),
            
            rackEditModal: document.getElementById('rackEditModal'),
            rackEditModalContent: document.getElementById('rackEditModalContent'),
            rackEditListContainer: document.getElementById('rackEditListContainer'),

            settingsModal: document.getElementById('settingsModal'),
            settingsModalContent: document.getElementById('settingsModalContent'),

            loginModal: document.getElementById('loginModal'),
            loginModalContent: document.getElementById('loginModalContent'),

            updateLastUpdateTime() {
                if (this.lastUpdateTime && AppState.lastUpdate) {
                    this.lastUpdateTime.textContent = '最後更新: ' + AppState.lastUpdate;
                }
            },

            renderRackOptions() {
                if (this.editMedRack) {
                    // 動態將當前的層架設定渲染至 <select> 之中，確保名稱一致
                    this.editMedRack.innerHTML = RACKS_CONFIG.map(rack => 
                        `<option value="${rack.id}">${rack.no}號儲位 - ${rack.name}</option>`
                    ).join('');
                }
            },

            renderRacks() {
                // 1. 渲染文字下方的鐵架名稱與種類說明標籤
                const rackInfoContainer = document.getElementById('rackInfoContainer');
                if (rackInfoContainer) {
                    rackInfoContainer.innerHTML = RACKS_CONFIG.map(rack => {
                        const displayName = rack.category ? rack.category : '未分類';
                        return `
                            <div id="rack-tag-${rack.id}" class="flex items-center gap-1.5 bg-white/90 dark:bg-slate-800/90 border border-slate-200 dark:border-slate-700 px-3 py-1.5 rounded-lg shadow-sm backdrop-blur-sm cursor-pointer hover:-translate-y-0.5 transition-all duration-300" onclick="Controllers.handleRackClick('${rack.id}')">
                                <div class="w-2.5 h-2.5 rounded-full bg-slate-300 dark:bg-slate-600 transition-colors" id="legend-dot-${rack.id}"></div>
                                <span class="text-xs font-bold text-slate-700 dark:text-slate-200 transition-colors" id="legend-name-${rack.id}">${rack.name}</span>
                                <span class="text-[10px] text-slate-500 dark:text-slate-400 font-medium transition-colors" id="legend-cat-${rack.id}">(${displayName})</span>
                            </div>
                        `;
                    }).join('');
                }

                // 2. 渲染右上角的純粹版俯視小圖 (移除類別說明，僅保留名稱)
                const minimapContainer = document.getElementById('minimapContainer');
                if (minimapContainer) {
                    minimapContainer.innerHTML = `
                        <!-- 灰色走道區塊 -->
                        <div class="absolute bg-[#c0c0c0] dark:bg-slate-600 pointer-events-none" style="top: 45%; left: 2%; width: 96%; height: 16%;"></div>
                    ` + RACKS_CONFIG.map(rack => `
                        <div id="minimap-rack-${rack.id}" 
                             class="absolute flex items-center justify-center bg-white dark:bg-slate-800 border-[1.5px] border-slate-800 dark:border-slate-400 cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors overflow-hidden"
                             style="top: ${rack.top}; left: ${rack.left}; width: ${rack.width}; height: ${rack.height};"
                             onclick="Controllers.handleRackClick('${rack.id}')">
                            <span class="text-[8px] md:text-[9px] font-bold text-slate-800 dark:text-slate-200 whitespace-nowrap tracking-tighter">${rack.name}</span>
                        </div>
                    `).join('');
                }
            },

            renderList(medicines) {
                if (medicines.length === 0) {
                    this.medicineListContainer.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-slate-400 dark:text-slate-500 py-10">
                            <i data-lucide="package-open" class="w-12 h-12 mb-3 opacity-50"></i>
                            <p class="text-center font-medium">找不到符合條件的藥品</p>
                            <p class="text-xs mt-1">請嘗試其他關鍵字或清除鐵架篩選</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                this.medicineListContainer.innerHTML = medicines.map(med => {
                    const rackName = RACKS_CONFIG.find(r => r.id === med.rackId)?.name || med.rackId;
                    const chNameParam = med.chName ? med.chName.replace(/'/g, "\\'") : '';
                    const editBtnHTML = AppState.isLoggedIn ? `
                                <button class="w-8 h-8 rounded-full bg-slate-50 dark:bg-slate-700/50 text-slate-400 dark:text-slate-400 flex items-center justify-center hover:bg-amber-100 dark:hover:bg-amber-900/50 hover:text-amber-600 dark:hover:text-amber-400 transition-all duration-200 shadow-sm border border-slate-100 dark:border-slate-600 hover:-translate-y-0.5 ml-1" title="編輯資料" onclick="event.stopPropagation(); Controllers.openEditModal('${med.id}', '${med.name}', '${med.rackId}', '${chNameParam}')">
                                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                                </button>
                    ` : '';

                    return `
                        <div class="bg-white dark:bg-slate-800 p-3.5 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 mb-3 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-md dark:hover:shadow-slate-900/50 transition-all duration-200 hover:-translate-y-1 cursor-pointer group flex justify-between items-center" onclick="Controllers.focusOnRack('${med.rackId}')">
                            <div class="flex-1 pr-3 overflow-hidden">
                                <h3 class="font-bold text-slate-800 dark:text-slate-100 text-[15px] group-hover:text-primary dark:group-hover:text-primary transition-colors leading-tight truncate">${med.name}</h3>
                                ${med.chName ? `<p class="text-xs text-slate-500 dark:text-slate-400 truncate mt-0.5">${med.chName}</p>` : ''}
                            </div>
                            <div class="flex items-center gap-2 shrink-0">
                                <span class="bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-[11px] px-2.5 py-1 rounded-md font-medium border border-slate-200 dark:border-slate-600 transition-colors">
                                    ${rackName}
                                </span>
                                ${editBtnHTML}
                            </div>
                        </div>
                    `;
                }).join('');
                lucide.createIcons();
            },

            updateRacksVisuals(highlightedIds, selectedId) {
                RACKS_CONFIG.forEach(rack => {
                    const mapEl = document.getElementById(`minimap-rack-${rack.id}`);
                    const legendDot = document.getElementById(`legend-dot-${rack.id}`);
                    const tagEl = document.getElementById(`rack-tag-${rack.id}`);
                    const nameEl = document.getElementById(`legend-name-${rack.id}`);
                    const catEl = document.getElementById(`legend-cat-${rack.id}`);
                    
                    if (mapEl) {
                        // 狀態重置
                        mapEl.classList.remove('border-primary', 'dark:border-primaryDark', 'border-emerald-500', 'opacity-40');
                        mapEl.classList.add('border-slate-800', 'dark:border-slate-400');
                        
                        if (legendDot) {
                            legendDot.className = "w-2.5 h-2.5 rounded-full bg-slate-300 dark:bg-slate-600 transition-colors";
                        }
                        if (tagEl) {
                            tagEl.className = "flex items-center gap-1.5 bg-white/90 dark:bg-slate-800/90 border border-slate-200 dark:border-slate-700 px-3 py-1.5 rounded-lg shadow-sm backdrop-blur-sm cursor-pointer hover:-translate-y-0.5 transition-all duration-300";
                            nameEl.className = "text-xs font-bold text-slate-700 dark:text-slate-200 transition-colors";
                            catEl.className = "text-[10px] text-slate-500 dark:text-slate-400 font-medium transition-colors";
                        }

                        // 處理高亮邏輯
                        if (highlightedIds.has(rack.id) && !selectedId) {
                            mapEl.classList.add('border-primary', 'dark:border-primaryDark');
                            mapEl.classList.remove('border-slate-800', 'dark:border-slate-400');
                            if(legendDot) legendDot.classList.replace('bg-slate-300', 'bg-primary');
                            if(legendDot) legendDot.classList.replace('dark:bg-slate-600', 'dark:bg-primaryDark');
                            if(tagEl) tagEl.classList.replace('border-slate-200', 'border-primary/50');
                            if(tagEl) tagEl.classList.replace('dark:border-slate-700', 'dark:border-primary/50');
                        }

                        // 處理選中邏輯
                        if (selectedId === rack.id) {
                            mapEl.classList.add('border-emerald-500');
                            mapEl.classList.remove('border-slate-800', 'dark:border-slate-400');
                            if(legendDot) legendDot.classList.replace('bg-slate-300', 'bg-emerald-500');
                            if(legendDot) legendDot.classList.replace('dark:bg-slate-600', 'dark:bg-emerald-600');
                            
                            // 高度辨識的標籤樣式
                            if(tagEl) {
                                tagEl.className = "flex items-center gap-1.5 bg-emerald-50 dark:bg-emerald-900/30 border-2 border-emerald-500 px-3 py-1.5 rounded-lg shadow-md backdrop-blur-sm cursor-pointer transform -translate-y-1 transition-all duration-300";
                                nameEl.className = "text-xs font-bold text-emerald-700 dark:text-emerald-300 transition-colors";
                                catEl.className = "text-[10px] text-emerald-600 dark:text-emerald-400 font-medium transition-colors";
                            }
                        } else if (selectedId) {
                            mapEl.classList.add('opacity-40');
                            // 未選中的標籤稍微淡化與縮小
                            if(tagEl) tagEl.classList.add('opacity-50', 'scale-95');
                        }
                    }
                });

                // 連動更新 3D 視覺化
                if (typeof ThreeApp !== 'undefined') {
                    ThreeApp.updateVisuals(highlightedIds, selectedId);
                }
            },

            updateStatusText() {
                let text = "顯示所有藥品";
                let dotColor = "bg-slate-300 dark:bg-slate-600";

                if (AppState.selectedRackId) {
                    const rackName = RACKS_CONFIG.find(r => r.id === AppState.selectedRackId)?.name;
                    text = `篩選條件: ${rackName}`;
                    dotColor = "bg-emerald-500";
                    if (AppState.searchQuery) text += ` + 關鍵字 "${AppState.searchQuery}"`;
                } else if (AppState.searchQuery) {
                    text = `正在搜尋: "${AppState.searchQuery}"`;
                    dotColor = "bg-primary";
                }

                this.statusText.textContent = text;
                this.statusDot.className = `w-2 h-2 rounded-full inline-block ${dotColor}`;
                
                if (AppState.searchQuery) {
                    this.clearSearchBtn.classList.remove('hidden');
                } else {
                    this.clearSearchBtn.classList.add('hidden');
                }
            }
        };

        /**
         * 3. 互動邏輯控制器
         */
        let searchDebounceTimer; // 搜尋防抖計時器

        const Controllers = {
            // 防抖搜尋：延遲 300 毫秒
            handleInput(e) {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => {
                    const query = e.target.value.trim();
                    AppState.searchQuery = query;
                    if (query.length > 0 && AppState.selectedRackId) {
                        AppState.selectedRackId = null; 
                    }
                    this.refreshUI();
                }, 300);
            },

            clearSearch() {
                DOM.searchInput.value = '';
                AppState.searchQuery = '';
                DOM.searchInput.focus();
                this.refreshUI();
            },

            resetAll() {
                DOM.searchInput.value = '';
                AppState.searchQuery = '';
                AppState.selectedRackId = null;
                this.refreshUI();
            },

            handleRackClick(rackId) {
                if (AppState.selectedRackId === rackId) {
                    AppState.selectedRackId = null;
                } else {
                    AppState.selectedRackId = rackId;
                    AppState.searchQuery = '';
                    DOM.searchInput.value = '';
                }
                this.refreshUI();
            },

            focusOnRack(rackId) {
                AppState.selectedRackId = rackId;
                AppState.searchQuery = '';

            // --- 深淺色模式切換 ---
            toggleDarkMode() {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('drugSysDarkMode', isDark ? 'dark' : 'light');

                // 觸發 3D 背景色與格線更新
                if (typeof ThreeApp !== 'undefined' && ThreeApp.scene) {
                    ThreeApp.scene.background = new THREE.Color(isDark ? 0x0f172a : 0xf1f5f9);
                    if(ThreeApp.grid) ThreeApp.grid.material.color.setHex(isDark ? 0x334155 : 0xe2e8f0);
                }
            }
        };

        /**
         * 4. 3D 模擬視覺化模組 (Three.js)
         */
        const ThreeApp = {
            scene: null, camera: null, renderer: null, controls: null, grid: null,
            rackMeshes: {}, raycaster: new THREE.Raycaster(), mouse: new THREE.Vector2(),
            
            init(containerId) {
                const container = document.getElementById(containerId);
                if (!container || typeof THREE === 'undefined') return;

                const isDark = document.documentElement.classList.contains('dark');

                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(isDark ? 0x0f172a : 0xf1f5f9);

                // 攝影機設定 (模擬您提供的高質感俯視視角)
                this.camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
                this.camera.position.set(0, 18, 14); 

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(container.clientWidth, container.clientHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                container.appendChild(this.renderer.domElement);

                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.maxPolarAngle = Math.PI / 2 - 0.1; // 避免穿透地板看到地下
                this.controls.minDistance = 5;
                this.controls.maxDistance = 40;

                // 燈光設定 (打出素描質感陰影)
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
                this.scene.add(ambientLight);
                
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
                dirLight.position.set(10, 20, 10);
                dirLight.castShadow = true;
                dirLight.shadow.mapSize.width = 2048;
                dirLight.shadow.mapSize.height = 2048;
                dirLight.shadow.camera.left = -15;
                dirLight.shadow.camera.right = 15;
                dirLight.shadow.camera.top = 15;
                dirLight.shadow.camera.bottom = -15;
                this.scene.add(dirLight);

                // 地板設計 (素描/簡約白材質)
                const floorGeo = new THREE.PlaneGeometry(28, 20);
                const floorMat = new THREE.MeshStandardMaterial({ 
                    color: 0xffffff, 
                    roughness: 0.8,
                    metalness: 0.1
                });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                this.scene.add(floor);

                // 網格線 (增加科技感對齊)
                this.grid = new THREE.GridHelper(28, 28, isDark ? 0x334155 : 0xe2e8f0, isDark ? 0x334155 : 0xe2e8f0);
                this.grid.position.y = 0.01;
                this.scene.add(this.grid);

                // 灰色主走道
                const aisleGeo = new THREE.PlaneGeometry(28, 3.2);
                const aisleMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, roughness: 0.9 });
                const aisle = new THREE.Mesh(aisleGeo, aisleMat);
                aisle.rotation.x = -Math.PI / 2;
                aisle.position.y = 0.02;
                this.scene.add(aisle);

                // 建立鐵架與紙箱模型
                this.buildRacks();

                // 事件綁定
                window.addEventListener('resize', () => this.onResize(container));
                this.renderer.domElement.addEventListener('pointerdown', (e) => this.onClick(e, container));

                this.animate();
            },

            buildRacks() {
                const roomW = 28;
                const roomD = 20;

                RACKS_CONFIG.forEach(rack => {
                    // 自動將設定好的百分比座標系統無縫轉換為 3D 世界座標
                    const top = parseFloat(rack.top) / 100;
                    const left = parseFloat(rack.left) / 100;
                    const width = parseFloat(rack.width) / 100;
                    const height = parseFloat(rack.height) / 100;

                    const w = width * roomW;
                    const d = height * roomD;
                    const x = (left * roomW) - (roomW / 2) + (w / 2);
                    const z = (top * roomD) - (roomD / 2) + (d / 2);

                    const group = new THREE.Group();
                    // 為了容納三層，將鐵架整體抬高
                    group.position.set(x, 2.25, z); 

                    // 1. 鐵架外框 (銀灰色 Wireframe 線條) - 高度改為 4.5
                    const shelfGeo = new THREE.BoxGeometry(w, 4.5, d);
                    const edges = new THREE.EdgesGeometry(shelfGeo);
                    const lineMat = new THREE.LineBasicMaterial({ color: 0x64748b, linewidth: 2 });
                    const wireframe = new THREE.LineSegments(edges, lineMat);
                    group.add(wireframe);

                    // 2. 內部白色紙箱 (模擬庫存箱體) - 三層
                    const boxGeo = new THREE.BoxGeometry(w * 0.8, 0.8, d * 0.8);
                    const boxMat = new THREE.MeshStandardMaterial({ 
                        color: 0xffffff,
                        roughness: 0.5,
                        metalness: 0.1
                    });
                    
                    const box1 = new THREE.Mesh(boxGeo, boxMat);
                    box1.position.y = -1.5; // 底層
                    box1.castShadow = true;
                    box1.receiveShadow = true;
                    
                    const box2 = new THREE.Mesh(boxGeo, boxMat);
                    box2.position.y = 0; // 中層
                    box2.castShadow = true;
                    box2.receiveShadow = true;
                    
                    const box3 = new THREE.Mesh(boxGeo, boxMat);
                    box3.position.y = 1.5; // 頂層
                    box3.castShadow = true;
                    box3.receiveShadow = true;
                    
                    group.add(box1, box2, box3);

                    // 3. 隱形的射線測試命中區塊 (用於精準判斷點擊)
                    const hitMat = new THREE.MeshBasicMaterial({ visible: false });
                    const hitBox = new THREE.Mesh(shelfGeo, hitMat);
                    hitBox.userData = { id: rack.id };
                    group.add(hitBox);

                    this.scene.add(group);
                    this.rackMeshes[rack.id] = { group, wireframe, boxes: [box1, box2, box3], originalY: 2.25 };
                });
            },

            updateVisuals(highlightedIds, selectedId) {
                if(!this.scene) return;
                
                Object.values(this.rackMeshes).forEach(meshObj => {
                    // 重置顏色與發光狀態
                    meshObj.wireframe.material.color.setHex(0x64748b); // 預設銀灰
                    meshObj.boxes.forEach(b => b.material.emissive.setHex(0x000000));
                    // 平滑重置物理位置
                    meshObj.group.position.y = meshObj.originalY;
                });

                // 處理搜尋關鍵字高亮 (發出科技淺藍光)
                highlightedIds.forEach(id => {
                    if (this.rackMeshes[id]) {
                        this.rackMeshes[id].wireframe.material.color.setHex(0x0ea5e9);
                        this.rackMeshes[id].boxes.forEach(b => b.material.emissive.setHex(0x0284c7));
                    }
                });

                // 處理點擊選取鎖定 (發出翡翠綠光並加入浮動感)
                if (selectedId && this.rackMeshes[selectedId]) {
                    this.rackMeshes[selectedId].wireframe.material.color.setHex(0x10b981);
                    this.rackMeshes[selectedId].boxes.forEach(b => b.material.emissive.setHex(0x059669));
                    this.rackMeshes[selectedId].group.position.y = this.rackMeshes[selectedId].originalY + 0.5; // Z軸微升營造選中感
                }
            },

            onClick(event, container) {
                // 將滑鼠螢幕座標轉化為 3D 場景空間的射線
                const rect = container.getBoundingClientRect();
                this.mouse.x = ((event.clientX - rect.left) / container.clientWidth) * 2 - 1;
                this.mouse.y = -((event.clientY - rect.top) / container.clientHeight) * 2 + 1;

                this.raycaster.setFromCamera(this.mouse, this.camera);
                const intersects = this.raycaster.intersectObjects(this.scene.children, true);
                
                for (let i = 0; i < intersects.length; i++) {
                    const obj = intersects[i].object;
                    if (obj.userData && obj.userData.id) {
                        Controllers.handleRackClick(obj.userData.id);
                        break; // 點到即觸發，避免穿透到底下物件
                    }
                }
            },

            onResize(container) {
                if (!this.camera || !this.renderer) return;
                this.camera.aspect = container.clientWidth / container.clientHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(container.clientWidth, container.clientHeight);
            },

            animate() {
                requestAnimationFrame(() => this.animate());
                if (this.controls) this.controls.update();
                if (this.renderer && this.scene && this.camera) {
                    this.renderer.render(this.scene, this.camera);
                }
            }
        };

        /**
         * 5. 系統初始化
         */
        async function initApp() {
            // 讀取深色模式偏好設定
            if (localStorage.getItem('drugSysDarkMode') === 'dark' || (!('drugSysDarkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            // 讀取儲存的層架設定 (LocalStorage)
            const savedRacks = localStorage.getItem('drugSysRacksConfig');
            if (savedRacks) {
                const parsedRacks = JSON.parse(savedRacks);
                RACKS_CONFIG.forEach(rack => {
                    const saved = parsedRacks.find(r => r.id === rack.id);
                    if (saved) {
                        rack.name = saved.name || rack.name; // 還原自訂名稱
                        rack.category = saved.category;
                    }
                });
            }

            // 讀取登入狀態 (SessionStorage)
            if (sessionStorage.getItem('drugSysAuth') === 'true') {
                AppState.isLoggedIn = true;
            }

            // 綁定全域快捷鍵 (Ctrl+F: 搜尋, Esc: 關閉彈窗)
            document.addEventListener('keydown', (e) => {
                // Ctrl + F
                if (e.ctrlKey && e.key.toLowerCase() === 'f') {
                    e.preventDefault(); // 防止瀏覽器原生搜尋框跳出
                    DOM.searchInput.focus();
                }
                // Esc
                if (e.key === 'Escape') {
                    if (!DOM.editModal.classList.contains('hidden')) Controllers.closeEditModal();
                    if (!DOM.rackEditModal.classList.contains('hidden')) Controllers.closeRackEditModal();
                    if (!DOM.settingsModal.classList.contains('hidden')) Controllers.closeSettingsModal();
                    if (!DOM.loginModal.classList.contains('hidden')) Controllers.closeLoginModal();
                }
            });

            // 初始化圖示
            lucide.createIcons();
            
            // 初始化驗證 UI
            Controllers.updateAuthUI();
            
            // 預先產生預設的下拉選單
            DOM.renderRackOptions();

            await AppState.initData();
            DOM.totalItemsCount.textContent = AppState.medicines.length;

            DOM.renderRacks();
            
            // 啟動 3D 環境與模組
            ThreeApp.init('canvas-container');

            DOM.searchInput.addEventListener('input', (e) => Controllers.handleInput(e));
            DOM.clearSearchBtn.addEventListener('click', () => Controllers.clearSearch());

            Controllers.refreshUI();
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
