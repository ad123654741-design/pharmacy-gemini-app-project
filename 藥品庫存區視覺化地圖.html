            toggleDarkMode() {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('drugSysDarkMode', isDark ? 'dark' : 'light');

                if (typeof ThreeApp !== 'undefined' && ThreeApp.scene) {
                    ThreeApp.scene.background = new THREE.Color(isDark ? 0x0f172a : 0xf1f5f9);
                    if(ThreeApp.grid) ThreeApp.grid.material.color.setHex(isDark ? 0x334155 : 0xe2e8f0);
                }
            }
        };

        /**
         * 4. 3D 模擬視覺化模組 (Three.js) - 引入 InstancedMesh 優化效能
         */
        const ThreeApp = {
            scene: null, camera: null, renderer: null, controls: null, grid: null,
            rackMeshes: {}, raycaster: new THREE.Raycaster(), mouse: new THREE.Vector2(),
            isLerpingCam: false, defaultCamPos: new THREE.Vector3(0, 18, 14), defaultTarget: new THREE.Vector3(0, 0, 0),
            targetCamPos: new THREE.Vector3(), targetCamLookAt: new THREE.Vector3(),
            
            init(containerId) {
                const container = document.getElementById(containerId);
                if (!container || typeof THREE === 'undefined') return;

                const isDark = document.documentElement.classList.contains('dark');

                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(isDark ? 0x0f172a : 0xf1f5f9);

                this.camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
                this.camera.position.copy(this.defaultCamPos);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(container.clientWidth, container.clientHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                container.appendChild(this.renderer.domElement);

                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.maxPolarAngle = Math.PI / 2 - 0.1;
                this.controls.minDistance = 5;
                this.controls.maxDistance = 40;
                this.controls.target.copy(this.defaultTarget);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
                this.scene.add(ambientLight);
                
                // 調整頂光強度至 0.4，避免白紙箱看起來過於灰暗，同時維持柔和度
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
                dirLight.position.set(10, 20, 10);
                dirLight.castShadow = true;
                dirLight.shadow.mapSize.width = 2048;
                dirLight.shadow.mapSize.height = 2048;
                dirLight.shadow.camera.left = -15;
                dirLight.shadow.camera.right = 15;
                dirLight.shadow.camera.top = 15;
                dirLight.shadow.camera.bottom = -15;
                this.scene.add(dirLight);

                // 修正：為地板加入 emissive 自發光補償，讓地板維持原本 0.6 頂光時的白淨度
                this.floorMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8, metalness: 0.1, emissive: 0x333333 });
                const floorGeo = new THREE.PlaneGeometry(28, 20);
                const floor = new THREE.Mesh(floorGeo, this.floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                this.scene.add(floor);

                this.grid = new THREE.GridHelper(28, 28, isDark ? 0x334155 : 0xe2e8f0, isDark ? 0x334155 : 0xe2e8f0);
                this.grid.position.y = 0.01;
                this.scene.add(this.grid);

                // 修正：走道顏色套用為圖中的粉藍灰系
                this.aisleMat = new THREE.MeshStandardMaterial({ color: 0xabc2d8, roughness: 0.9 });
                const aisleGeo = new THREE.PlaneGeometry(28, 3.2);
                const aisle = new THREE.Mesh(aisleGeo, this.aisleMat);
                aisle.rotation.x = -Math.PI / 2;
                aisle.position.y = 0.02;
                this.scene.add(aisle);

                this.boxBaseMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.9, metalness: 0.05 });

                this.loadAppearanceConfig();

                this.buildRacks();

                window.addEventListener('resize', () => this.onResize(container));
                this.renderer.domElement.addEventListener('pointerdown', (e) => this.onClick(e, container));
                this.renderer.domElement.addEventListener('pointermove', (e) => this.onMouseMove(e, container)); 
                
                this.controls.addEventListener('start', () => {
                    this.isLerpingCam = false; 
                });

                this.animate();
            },

            loadAppearanceConfig() {
                const saved = localStorage.getItem('drugSysAppearance');
                if (saved) {
                    try {
                        const config = JSON.parse(saved);
                        window.AppearanceConfig = { ...window.AppearanceConfig, ...config };
                    } catch(e){}
                }
                
                const config = window.AppearanceConfig;
                
                const selFloor = document.getElementById('settingFloorColor');
                const selAisle = document.getElementById('settingAisleColor');
                const inpSearch = document.getElementById('settingSearchColor');
                const inpSelect = document.getElementById('settingSelectColor');
                const inpGlow = document.getElementById('settingGlowIntensity');
                
                if(selFloor) selFloor.value = config.floorColor;
                if(selAisle) selAisle.value = config.aisleColor;
                if(inpSearch) inpSearch.value = config.searchColor;
                if(inpSelect) inpSelect.value = config.selectColor;
                if(inpGlow) {
                    inpGlow.value = config.glowIntensity;
                    const valEl = document.getElementById('glowIntensityVal');
                    if (valEl) valEl.textContent = config.glowIntensity;
                }
                
                this.applyAppearance(config);
            },

            applyAppearance(config) {
                let boxHex = 0xf8fafc; let boxRough = 0.9;
                if (config.boxColor === 'brown') { boxHex = 0x9c7a54; boxRough = 1.0; } 
                else if (config.boxColor === 'blue') { boxHex = 0x3b82f6; boxRough = 0.7; }
                
                this.boxBaseMat.color.setHex(boxHex);
                this.boxBaseMat.roughness = boxRough;
                
                let floorHex = 0xffffff;
                let floorEmissive = 0x333333; // 補償頂光調弱後的地板亮度
                if (config.floorColor === 'dark') {
                    floorHex = 0x334155;
                    floorEmissive = 0x000000; // 深色地板不需要亮度補償
                }
                this.floorMat.color.setHex(floorHex);
                this.floorMat.emissive.setHex(floorEmissive);

                // 修正：預設走道顏色套用粉藍灰系
                let aisleHex = 0xabc2d8; let aisleRough = 0.9;
                if (config.aisleColor === 'red') { aisleHex = 0xb91c1c; aisleRough = 0.95; }
                else if (config.aisleColor === 'green') { aisleHex = 0x10b981; aisleRough = 0.85; }
                
                this.aisleMat.color.setHex(aisleHex);
                this.aisleMat.roughness = aisleRough;
                
                if (config.aisleColor === 'red') {
                    if (!this.carpetBorders) {
                        const borderGeo = new THREE.BoxGeometry(28, 0.1, 0.2);
                        const borderMat = new THREE.MeshStandardMaterial({color: 0xffd700, metalness: 0.8, roughness: 0.2});
                        const border1 = new THREE.Mesh(borderGeo, borderMat);
                        border1.position.set(0, 0.05, 1.5); 
                        const border2 = new THREE.Mesh(borderGeo, borderMat);
                        border2.position.set(0, 0.05, -1.5);
                        this.carpetBorders = new THREE.Group();
                        this.carpetBorders.add(border1, border2);
                        this.scene.add(this.carpetBorders);
                    }
                    this.carpetBorders.visible = true;
                } else {
                    if (this.carpetBorders) this.carpetBorders.visible = false;
                }
                
                Object.values(this.rackMeshes).forEach(rm => {
                    if (rm.boxInstanced) {
                        rm.boxInstanced.material.needsUpdate = true;
                    }
                });
            },

            moveToCamera(pos, target) {
                this.isLerpingCam = true;
                this.targetCamPos.copy(pos);
                this.targetCamLookAt.copy(target);
            },

            resetCamera() {
                this.moveToCamera(this.defaultCamPos, this.defaultTarget);
            },

            focusOnRack(rackId) {
                const rack = this.rackMeshes[rackId];
                if (rack) {
                    const targetPos = rack.group.position.clone().add(new THREE.Vector3(0, 8, 8));
                    this.moveToCamera(targetPos, rack.group.position);
                }
            },

            rebuildAllRacks() {
                Object.values(this.rackMeshes).forEach(rm => {
                    this.scene.remove(rm.group);
                });
                if(this.easterEggBoxes) {
                    this.easterEggBoxes.forEach(box => this.scene.remove(box));
                }
                this.rackMeshes = {};
                this.easterEggBoxes = [];
                this.buildRacks();
            },

            buildRacks() {
                const roomW = 28;
                const roomD = 20;
                const rackHeight = 4.5; 

                const postMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.9, roughness: 0.2 });
                const clipMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
                const shelfMat = new THREE.MeshStandardMaterial({ color: 0xcbd5e1, metalness: 0.7, roughness: 0.4, transparent: true, opacity: 0.8 });

                const postRadius = 0.05;
                const postGeo = new THREE.CylinderGeometry(postRadius, postRadius, rackHeight, 8);
                const clipGeo = new THREE.CylinderGeometry(postRadius * 1.3, postRadius * 1.3, 0.12, 8);
                const unitBoxGeo = new THREE.BoxGeometry(1, 1, 1); 

                this.easterEggBoxes = []; 

                RACKS_CONFIG.forEach((rack, index) => {
                    const top = parseFloat(rack.top) / 100;
                    const left = parseFloat(rack.left) / 100;
                    const width = parseFloat(rack.width) / 100;
                    const height = parseFloat(rack.height) / 100;

                    const w = width * roomW;
                    const d = height * roomD;
                    const x = (left * roomW) - (roomW / 2) + (w / 2);
                    const z = (top * roomD) - (roomD / 2) + (d / 2);

                    const group = new THREE.Group();
                    group.position.set(x, rackHeight / 2, z); 

                    const postPositions = [
                        [-w/2 + postRadius, -d/2 + postRadius],
                        [w/2 - postRadius, -d/2 + postRadius],
                        [-w/2 + postRadius, d/2 - postRadius],
                        [w/2 - postRadius, d/2 - postRadius]
                    ];
                    
                    const postInstanced = new THREE.InstancedMesh(postGeo, postMat, 4);
                    postInstanced.castShadow = true;
                    const matrix = new THREE.Matrix4();
                    postPositions.forEach((pos, idx) => {
                        matrix.setPosition(pos[0], 0, pos[1]);
                        postInstanced.setMatrixAt(idx, matrix);
                    });
                    group.add(postInstanced);

                    const shelfThickness = 0.02;
                    const shelfGeo = new THREE.BoxGeometry(w, shelfThickness, d);
                    const rimGeo = new THREE.BoxGeometry(w, 0.12, d);
                    const edges = new THREE.EdgesGeometry(rimGeo);
                    const lineMat = new THREE.LineBasicMaterial({ color: 0x64748b, linewidth: 2 }); 

                    const wireframes = []; 
                    const shelfYs = [-1.6, -0.5, 0.6, 1.7]; 

                    const clipTransforms = [];
                    const boxTransforms = [];

                    shelfYs.forEach((sy) => {
                        const shelf = new THREE.Mesh(shelfGeo, shelfMat);
                        shelf.position.y = sy;
                        shelf.receiveShadow = true;
                        group.add(shelf);

                        const wireframe = new THREE.LineSegments(edges, lineMat.clone());
                        wireframe.position.y = sy;
                        group.add(wireframe);
                        wireframes.push(wireframe);

                        postPositions.forEach(pos => {
                            const cMat = new THREE.Matrix4();
                            cMat.setPosition(pos[0], sy, pos[1]);
                            clipTransforms.push(cMat);
                        });

                        let seed = index * 100 + Math.abs(sy * 10); 
                        const pseudoRandom = () => {
                            const val = Math.sin(seed++) * 10000;
                            return val - Math.floor(val);
                        };

                        const depthOptions = [0.8, 1.0, 1.2];
                        const widthOptions = [0.8, 1.1, 1.4];
                        const heightOptions = [0.6, 0.75, 0.9];

                        let currentZ = -d/2 + postRadius * 2.5;
                        while (currentZ < d/2 - postRadius * 2.5) {
                            let rowDepth = depthOptions[Math.floor(pseudoRandom() * depthOptions.length)]; 
                            if (currentZ + rowDepth > d/2 - postRadius * 2.5) {
                                rowDepth = (d/2 - postRadius * 2.5) - currentZ;
                            }
                            if (rowDepth < 0.5) break; 

                            let currentX = -w/2 + postRadius * 2.5;
                            while (currentX < w/2 - postRadius * 2.5) {
                                let boxW = widthOptions[Math.floor(pseudoRandom() * widthOptions.length)]; 
                                if (currentX + boxW > w/2 - postRadius * 2.5) {
                                    boxW = (w/2 - postRadius * 2.5) - currentX;
                                }
                                if (boxW < 0.5) break;

                                let boxH = heightOptions[Math.floor(pseudoRandom() * heightOptions.length)]; 

                                const actualW = boxW - 0.04;
                                const actualD = rowDepth - 0.04;

                                if (actualW > 0.4 && actualD > 0.4) {
                                    const bMat = new THREE.Matrix4();
                                    const posVec = new THREE.Vector3(currentX + boxW/2, sy + shelfThickness/2 + boxH/2, currentZ + rowDepth/2);
                                    const quat = new THREE.Quaternion();
                                    const scaleVec = new THREE.Vector3(actualW, boxH, actualD);
                                    bMat.compose(posVec, quat, scaleVec);
                                    boxTransforms.push(bMat);
                                }
                                
                                currentX += boxW;
                                if (pseudoRandom() > 0.95) currentX += 0.4 + pseudoRandom() * 0.4;
                            }
                            currentZ += rowDepth;
                        }
                    });

                    if (clipTransforms.length > 0) {
                        const clipInstanced = new THREE.InstancedMesh(clipGeo, clipMat, clipTransforms.length);
                        clipTransforms.forEach((mat, idx) => clipInstanced.setMatrixAt(idx, mat));
                        group.add(clipInstanced);
                    }

                    let boxInstanced = null;
                    let rackBoxMat = this.boxBaseMat.clone(); 
                    if (boxTransforms.length > 0) {
                        boxInstanced = new THREE.InstancedMesh(unitBoxGeo, rackBoxMat, boxTransforms.length);
                        boxTransforms.forEach((mat, idx) => boxInstanced.setMatrixAt(idx, mat));
                        boxInstanced.castShadow = true;
                        boxInstanced.receiveShadow = true;
                        group.add(boxInstanced);
                    }

                    const hitGeo = new THREE.BoxGeometry(w, rackHeight, d);
                    const hitMat = new THREE.MeshBasicMaterial({ visible: false });
                    const hitBox = new THREE.Mesh(hitGeo, hitMat);
                    hitBox.userData = { id: rack.id };
                    group.add(hitBox);

                    this.scene.add(group);
                    this.rackMeshes[rack.id] = { hitBox, group, wireframes, boxInstanced, boxMat: rackBoxMat, originalY: rackHeight / 2 };
                });

                const rackA = RACKS_CONFIG.find(r => r.id === 'Rack-A');
                if (rackA) {
                    const ax = (parseFloat(rackA.left) / 100 * roomW) - (roomW / 2) + (parseFloat(rackA.width) / 100 * roomW / 2);
                    const az = (parseFloat(rackA.top) / 100 * roomD) - (roomD / 2) + (parseFloat(rackA.height) / 100 * roomD / 2);
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = 1024;
                    canvas.height = 128;
                    const ctx = canvas.getContext('2d');
                    ctx.font = 'bold 44px "Caveat", "Comic Sans MS", "Bradley Hand", cursive, "Noto Sans TC", sans-serif';
                    ctx.fillStyle = '#0f172a';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('製作者 : 其仁藥師 2026.05.08', 512, 64);
                    
                    const tex = new THREE.CanvasTexture(canvas);
                    const signMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.85, depthWrite: false });
                    const signMesh = new THREE.Mesh(new THREE.PlaneGeometry(6, 0.75), signMat);
                    
                    signMesh.rotation.x = -Math.PI / 2;
                    signMesh.rotation.z = -Math.PI / 6;
                    signMesh.position.set(ax + 0.8, 0.03, az + 0.8);
                    
                    const signHitBox = new THREE.Mesh(new THREE.BoxGeometry(6, 1, 1), new THREE.MeshBasicMaterial({ visible: false }));
                    signHitBox.position.copy(signMesh.position);
                    signHitBox.rotation.copy(signMesh.rotation);
                    signHitBox.userData = { isEasterEgg: true, message: '居然被你發現了!' };

                    this.scene.add(signMesh);
                    this.scene.add(signHitBox);
                    this.easterEggBoxes.push(signHitBox);
                }

                const rackD = RACKS_CONFIG.find(r => r.id === 'Rack-D');
                if (rackD) {
                    const dx = (parseFloat(rackD.left) / 100 * roomW) - (roomW / 2) + (parseFloat(rackD.width) / 100 * roomW / 2);
                    const dz = (parseFloat(rackD.top) / 100 * roomD) - (roomD / 2) + (parseFloat(rackD.height) / 100 * roomD / 2);
                    
                    const capsuleGroup = new THREE.Group();
                    const capRadius = 0.06;
                    const capHeight = 0.15;
                    
                    const redMat = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.4 });
                    const redGeo = new THREE.CylinderGeometry(capRadius, capRadius, capHeight, 16);
                    const redPart = new THREE.Mesh(redGeo, redMat);
                    redPart.position.y = capHeight / 2;
                    const redCap = new THREE.Mesh(new THREE.SphereGeometry(capRadius, 16, 16), redMat);
                    redCap.position.y = capHeight;
                    
                    const yellowMat = new THREE.MeshStandardMaterial({ color: 0xeab308, roughness: 0.4 });
                    const yellowGeo = new THREE.CylinderGeometry(capRadius, capRadius, capHeight, 16);
                    const yellowPart = new THREE.Mesh(yellowGeo, yellowMat);
                    yellowPart.position.y = -capHeight / 2;
                    const yellowCap = new THREE.Mesh(new THREE.SphereGeometry(capRadius, 16, 16), yellowMat);
                    yellowCap.position.y = -capHeight;
                    
                    capsuleGroup.add(redPart, redCap, yellowPart, yellowCap);
                    
                    capsuleGroup.position.set(dx, capRadius, dz);
                    capsuleGroup.rotation.x = Math.PI / 2;
                    capsuleGroup.rotation.z = Math.PI / 3;
                    
                    const capHitBox = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshBasicMaterial({ visible: false }));
                    capHitBox.position.copy(capsuleGroup.position);
                    capHitBox.userData = { isEasterEgg: true, message: '掉地板的藥不要撿起來XD' };
                    
                    this.scene.add(capsuleGroup);
                    this.scene.add(capHitBox);
                    this.easterEggBoxes.push(capHitBox);
                }
            },

            updateVisuals(highlightedIds, selectedId) {
                if(!this.scene) return;
                
                const searchColorHex = parseInt(window.AppearanceConfig.searchColor.replace('#', '0x'));
                const selectColorHex = parseInt(window.AppearanceConfig.selectColor.replace('#', '0x'));
                const glowIntensity = window.AppearanceConfig.glowIntensity;

                Object.values(this.rackMeshes).forEach(meshObj => {
                    meshObj.wireframes.forEach(wf => {
                        wf.material.color.setHex(0x64748b);
                        wf.material.opacity = 0.5;
                        wf.material.transparent = true;
                    });
                    if (meshObj.boxMat) {
                        meshObj.boxMat.emissive.setHex(0x000000);
                        meshObj.boxMat.emissiveIntensity = 1.0;
                    }
                    meshObj.group.position.y = meshObj.originalY;
                });

                highlightedIds.forEach(id => {
                    if (this.rackMeshes[id]) {
                        this.rackMeshes[id].wireframes.forEach(wf => {
                            wf.material.color.setHex(searchColorHex);
                            wf.material.opacity = 0.8;
                        });
                        if (this.rackMeshes[id].boxMat) {
                            this.rackMeshes[id].boxMat.emissive.setHex(searchColorHex);
                            this.rackMeshes[id].boxMat.emissiveIntensity = glowIntensity * 0.8; 
                        }
                    }
                });

                if (selectedId && this.rackMeshes[selectedId]) {
                    this.rackMeshes[selectedId].wireframes.forEach(wf => {
                        wf.material.color.setHex(selectColorHex);
                        wf.material.opacity = 1.0;
                    });
                    if (this.rackMeshes[selectedId].boxMat) {
                        this.rackMeshes[selectedId].boxMat.emissive.setHex(selectColorHex);
                        this.rackMeshes[selectedId].boxMat.emissiveIntensity = glowIntensity; 
                    }
                    this.rackMeshes[selectedId].group.position.y = this.rackMeshes[selectedId].originalY + 0.5;
                }
            },

            onClick(event, container) {
                const rect = container.getBoundingClientRect();
                this.mouse.x = ((event.clientX - rect.left) / container.clientWidth) * 2 - 1;
                this.mouse.y = -((event.clientY - rect.top) / container.clientHeight) * 2 + 1;

                this.raycaster.setFromCamera(this.mouse, this.camera);
                const hitBoxes = Object.values(this.rackMeshes).map(r => r.hitBox);
                if (this.easterEggBoxes) hitBoxes.push(...this.easterEggBoxes); 
                
                const intersects = this.raycaster.intersectObjects(hitBoxes, false);
                
                if (intersects.length > 0) {
                    const obj = intersects[0].object;
                    
                    if (obj.userData && obj.userData.isEasterEgg) {
                        const modal = document.getElementById('easterEggModal');
                        const msgEl = document.getElementById('easterEggMessage');
                        
                        if (msgEl) msgEl.textContent = obj.userData.message;
                        
                        modal.classList.remove('hidden');
                        setTimeout(() => { modal.classList.remove('opacity-0'); }, 10);
                        return;
                    }
                    
                    if (obj.userData && obj.userData.id) {
                        Controllers.handleRackClick(obj.userData.id);
                    }
                }
            },

            onMouseMove(event, container) {
                const rect = container.getBoundingClientRect();
                this.mouse.x = ((event.clientX - rect.left) / container.clientWidth) * 2 - 1;
                this.mouse.y = -((event.clientY - rect.top) / container.clientHeight) * 2 + 1;

                this.raycaster.setFromCamera(this.mouse, this.camera);
                
                const hitBoxes = Object.values(this.rackMeshes).map(r => r.hitBox);
                const intersects = this.raycaster.intersectObjects(hitBoxes, false);
                
                const tooltip = document.getElementById('tooltip3d');

                if (intersects.length > 0) {
                    const rackId = intersects[0].object.userData.id;
                    
                    container.style.cursor = 'pointer';

                    const rackName = RACKS_CONFIG.find(r => r.id === rackId)?.name || '未知層架';
                    const meds = AppState.medicines.filter(m => m.rackId === rackId);
                    
                    const topMeds = meds.slice(0, 3).map(m => `• ${m.name}`).join('<br>');
                    const moreInfo = meds.length > 3 ? `<div class="mt-1 pt-1 border-t border-slate-700/50 text-slate-400">...等共 ${meds.length} 項藥品</div>` : '';

                    tooltip.innerHTML = `
                        <div class="font-bold text-sm text-primary mb-1 pb-1 border-b border-slate-700">${rackName}</div>
                        <div class="text-xs text-slate-200">${topMeds || '<span class="text-slate-500">目前為空</span>'}</div>
                        ${moreInfo}
                    `;
                    
                    tooltip.style.left = `${event.clientX}px`;
                    tooltip.style.top = `${event.clientY - 15}px`;
                    tooltip.classList.remove('hidden', 'opacity-0');
                } else {
                    container.style.cursor = 'grab';
                    tooltip.classList.add('opacity-0');
                    setTimeout(() => { if (tooltip.classList.contains('opacity-0')) tooltip.classList.add('hidden'); }, 200);
                }
            },

            onResize(container) {
                if (!this.camera || !this.renderer) return;
                this.camera.aspect = container.clientWidth / container.clientHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(container.clientWidth, container.clientHeight);
            },

            animate() {
                requestAnimationFrame(() => this.animate());
                
                if (this.isLerpingCam) {
                    this.camera.position.lerp(this.targetCamPos, 0.08);
                    this.controls.target.lerp(this.targetCamLookAt, 0.08);
                    if (this.camera.position.distanceTo(this.targetCamPos) < 0.1) {
                        this.isLerpingCam = false;
                    }
                }

                if (this.controls) this.controls.update();
                if (this.renderer && this.scene && this.camera) {
                    this.renderer.render(this.scene, this.camera);
                }
            }
        };

        /**
         * 5. 系統初始化
         */
        async function initApp() {
            if (localStorage.getItem('drugSysDarkMode') === 'dark' || (!('drugSysDarkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            const savedRacks = localStorage.getItem('drugSysRacksConfig');
            if (savedRacks) {
                const parsedRacks = JSON.parse(savedRacks);
                RACKS_CONFIG.forEach(rack => {
                    const saved = parsedRacks.find(r => r.id === rack.id);
                    if (saved) {
                        rack.name = saved.name || rack.name;
                        rack.category = saved.category;
                    }
                });
            }

            if (sessionStorage.getItem('drugSysAuth') === 'true') {
                AppState.isLoggedIn = true;
            }

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key.toLowerCase() === 'f') {
                    e.preventDefault(); 
                    DOM.searchInput.focus();
                }
                if (e.key === 'Escape') {
                    if (!DOM.editModal.classList.contains('hidden')) Controllers.closeEditModal();
                    if (!DOM.rackEditModal.classList.contains('hidden')) Controllers.closeRackEditModal();
                    if (!DOM.settingsModal.classList.contains('hidden')) Controllers.closeSettingsModal();
                    if (!DOM.appearanceModal.classList.contains('hidden')) Controllers.closeAppearanceModal();
                    if (!DOM.loginModal.classList.contains('hidden')) Controllers.closeLoginModal();
                    if (!DOM.printFilterModal.classList.contains('hidden')) Controllers.closePrintFilterModal();
                }
            });

            // --- 新增：搜尋框的全鍵盤導航支援 ---
            DOM.searchInput.addEventListener('keydown', (e) => {
                // 修正：忽略輸入法 (IME) 的選字與確認 Enter，避免攔截中文輸入導致失效或需連按
                if (e.isComposing || e.keyCode === 229) return;

                if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'Enter') {
                    const currentQuery = e.target.value.trim();
                    if (currentQuery !== AppState.searchQuery) {
                        clearTimeout(searchDebounceTimer);
                        AppState.searchQuery = currentQuery;
                        AppState.focusedRackId = null;
                        AppState.keyboardSelectedIndex = currentQuery.length > 0 ? 0 : -1; // 修正：自動選中第一項
                        DOM.searchLoader.classList.add('hidden');
                        if (currentQuery) DOM.clearSearchBtn.classList.remove('hidden');
                        Controllers.refreshUI();
                    } else {
                        clearTimeout(searchDebounceTimer);
                        DOM.searchLoader.classList.add('hidden');
                    }
                }

                const filteredList = AppState.getFilteredMedicines();
                if (filteredList.length === 0) return;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (AppState.keyboardSelectedIndex < filteredList.length - 1) {
                        AppState.keyboardSelectedIndex++;
                    } else if (AppState.keyboardSelectedIndex === -1) {
                        AppState.keyboardSelectedIndex = 0;
                    }
                    Controllers.updateKeyboardSelection();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (AppState.keyboardSelectedIndex > 0) {
                        AppState.keyboardSelectedIndex--;
                    }
                    Controllers.updateKeyboardSelection();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    // 預設 Enter 至少選取第一項
                    const idx = AppState.keyboardSelectedIndex >= 0 ? AppState.keyboardSelectedIndex : 0;
                    if (filteredList[idx]) {
                        AppState.keyboardSelectedIndex = idx;
                        Controllers.updateKeyboardSelection();
                        Controllers.viewRackIn3D(filteredList[idx].rackId);
                        DOM.searchInput.blur(); // 按下 Enter 後取消輸入框焦點，讓使用者更專注於 3D 畫面
                    }
                }
            });

            lucide.createIcons();
            Controllers.updateAuthUI();
            DOM.renderRackOptions();

            await AppState.initData();
            DOM.totalItemsCount.textContent = AppState.medicines.length;

            DOM.renderRacks();
            ThreeApp.init('canvas-container');

            DOM.searchInput.addEventListener('input', (e) => Controllers.handleInput(e));
            DOM.clearSearchBtn.addEventListener('click', () => Controllers.clearSearch());

            Controllers.refreshUI();
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
