            // 支援自訂篩選的匯出功能
            exportMedicineLabels(mode = 'label', filterRacks = [], applySearch = false) {
                const printWindow = window.open('', '_blank');
                if (!printWindow) {
                    alert('請允許瀏覽器開啟彈出視窗以進行列印！');
                    return;
                }

                const today = new Date().toLocaleDateString('zh-TW');
                const titleText = mode === 'label' ? '藥品標籤列印' : '藥品庫存清單';
                
                let targetMedicines = AppState.medicines;

                // 若套用搜尋條件，則以當前搜尋結果為基底
                if (applySearch && AppState.searchQuery) {
                    const q = AppState.searchQuery.toLowerCase();
                    targetMedicines = targetMedicines.filter(med => 
                        med.name.toLowerCase().includes(q) || 
                        (med.chName && med.chName.toLowerCase().includes(q))
                    );
                }

                let htmlContent = `
                <!DOCTYPE html>
                <html lang="zh-TW">
                <head>
                    <meta charset="UTF-8">
                    <title>${titleText} - ${today}</title>
                    <style>
                        body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; padding: 20px; background: #f8fafc; color: #0f172a; }
                        .rack-section { margin-bottom: 40px; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
                        .rack-title { font-size: 20px; font-weight: bold; border-bottom: 2px solid #cbd5e1; padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;}
                        .rack-title-badge { background: #0ea5e9; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 14px; }
                        
                        /* 標籤模式 CSS */
                        .labels-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
                        .med-label { border: 2px dashed #cbd5e1; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; min-height: 70px; page-break-inside: avoid; background: #fafafa; }
                        .med-name { font-size: 18px; font-weight: bold; color: #1e293b; margin-bottom: 4px; }
                        .med-chName { font-size: 14px; color: #475569; font-weight: 500; }
                        
                        /* 清單模式 CSS */
                        .med-table { w-full; border-collapse: collapse; width: 100%; margin-top: 10px; page-break-inside: auto; }
                        .med-table th, .med-table td { border: 1px solid #cbd5e1; padding: 10px 15px; text-align: left; }
                        .med-table th { background-color: #f1f5f9; font-weight: bold; color: #475569; }
                        .med-table tr:nth-child(even) { background-color: #f8fafc; }
                        .med-table tr { page-break-inside: avoid; page-break-after: auto; }

                        @media print {
                            body { padding: 0; background: #fff; }
                            .rack-section { box-shadow: none; padding: 0; margin-bottom: 30px; }
                            .med-label { border: 1px solid #000; background: #fff; }
                            .rack-title { border-bottom: 2px solid #000; }
                            .rack-title-badge { background: #000; color: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                            .med-table th { background-color: #e2e8f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact;}
                        }
                    </style>
                </head>
                <body>
                    <h1 style="text-align: center; margin-bottom: 30px;">${titleText} (${today})</h1>
                `;

                let totalExported = 0;

                RACKS_CONFIG.forEach(rack => {
                    // 只處理使用者有勾選的層架
                    if (!filterRacks.includes(rack.id)) return;

                    const rackMeds = targetMedicines.filter(m => m.rackId === rack.id);
                    if (rackMeds.length > 0) {
                        totalExported += rackMeds.length;
                        htmlContent += `
                        <div class="rack-section">
                            <div class="rack-title">
                                <span class="rack-title-badge">No.${rack.no}</span>
                                ${rack.name} ${rack.category ? `(${rack.category})` : ''}
                            </div>
                        `;

                        if (mode === 'label') {
                            htmlContent += `<div class="labels-container">`;
                            rackMeds.forEach(med => {
                                htmlContent += `
                                    <div class="med-label">
                                        <div class="med-name">${med.name}</div>
                                        ${med.chName ? `<div class="med-chName">中文品名：${med.chName}</div>` : ''}
                                    </div>
                                `;
                            });
                            htmlContent += `</div>`;
                        } else if (mode === 'list') {
                            htmlContent += `
                            <table class="med-table">
                                <thead>
                                    <tr>
                                        <th style="width: 15%;">內部代碼</th>
                                        <th style="width: 45%;">英文藥品名稱</th>
                                        <th style="width: 40%;">中文商品名稱</th>
                                    </tr>
                                </thead>
                                <tbody>
                            `;
                            rackMeds.forEach(med => {
                                htmlContent += `
                                    <tr>
                                        <td style="color: #64748b; font-size: 14px;">${med.id}</td>
                                        <td style="font-weight: bold; color: #0f172a;">${med.name}</td>
                                        <td style="color: #475569;">${med.chName || '-'}</td>
                                    </tr>
                                `;
                            });
                            htmlContent += `</tbody></table>`;
                        }

                        htmlContent += `
                        </div>
                        `;
                    }
                });

                if (totalExported === 0) {
                    htmlContent += '<h3>符合篩選條件的範圍內，目前沒有任何藥品可供匯出。</h3>';
                }

                htmlContent += `
                </body>
                <script>
                    window.onload = function() {
                        setTimeout(() => { window.print(); }, 500);
                    }
                <\/script>
                </html>
                `;

                printWindow.document.write(htmlContent);
                printWindow.document.close();
            },

            toggleDarkMode() {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('drugSysDarkMode', isDark ? 'dark' : 'light');

                if (typeof ThreeApp !== 'undefined' && ThreeApp.scene) {
                    ThreeApp.scene.background = new THREE.Color(isDark ? 0x0f172a : 0xf1f5f9);
                    if(ThreeApp.grid) ThreeApp.grid.material.color.setHex(isDark ? 0x334155 : 0xe2e8f0);
                }
            }
        };

        /**
         * 4. 3D 模擬視覺化模組 (Three.js) - 引入 InstancedMesh 優化效能
         */
        const ThreeApp = {
            scene: null, camera: null, renderer: null, controls: null, grid: null,
            rackMeshes: {}, raycaster: new THREE.Raycaster(), mouse: new THREE.Vector2(),
            isResetting: false, defaultCamPos: new THREE.Vector3(0, 18, 14), defaultTarget: new THREE.Vector3(0, 0, 0),
            
            init(containerId) {
                const container = document.getElementById(containerId);
                if (!container || typeof THREE === 'undefined') return;

                const isDark = document.documentElement.classList.contains('dark');

                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(isDark ? 0x0f172a : 0xf1f5f9);

                this.camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
                this.camera.position.copy(this.defaultCamPos);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(container.clientWidth, container.clientHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                container.appendChild(this.renderer.domElement);

                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.maxPolarAngle = Math.PI / 2 - 0.1;
                this.controls.minDistance = 5;
                this.controls.maxDistance = 40;
                this.controls.target.copy(this.defaultTarget);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
                this.scene.add(ambientLight);
                
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
                dirLight.position.set(10, 20, 10);
                dirLight.castShadow = true;
                dirLight.shadow.mapSize.width = 2048;
                dirLight.shadow.mapSize.height = 2048;
                dirLight.shadow.camera.left = -15;
                dirLight.shadow.camera.right = 15;
                dirLight.shadow.camera.top = 15;
                dirLight.shadow.camera.bottom = -15;
                this.scene.add(dirLight);

                const floorGeo = new THREE.PlaneGeometry(28, 20);
                const floorMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8, metalness: 0.1 });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                this.scene.add(floor);

                this.grid = new THREE.GridHelper(28, 28, isDark ? 0x334155 : 0xe2e8f0, isDark ? 0x334155 : 0xe2e8f0);
                this.grid.position.y = 0.01;
                this.scene.add(this.grid);

                const aisleGeo = new THREE.PlaneGeometry(28, 3.2);
                const aisleMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, roughness: 0.9 });
                const aisle = new THREE.Mesh(aisleGeo, aisleMat);
                aisle.rotation.x = -Math.PI / 2;
                aisle.position.y = 0.02;
                this.scene.add(aisle);

                // 建構實例化鐵架與紙箱模型 (大幅優化效能)
                this.buildRacks();

                // 綁定事件
                window.addEventListener('resize', () => this.onResize(container));
                this.renderer.domElement.addEventListener('pointerdown', (e) => this.onClick(e, container));
                this.renderer.domElement.addEventListener('pointermove', (e) => this.onMouseMove(e, container)); // Hover Tooltip

                this.animate();
            },

            // 觸發視角平滑重置
            resetCamera() {
                this.isResetting = true;
            },

            buildRacks() {
                const roomW = 28;
                const roomD = 20;
                const rackHeight = 4.5; 

                // 共用材質設定
                const postMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.9, roughness: 0.2 });
                const clipMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
                const shelfMat = new THREE.MeshStandardMaterial({ color: 0xcbd5e1, metalness: 0.7, roughness: 0.4, transparent: true, opacity: 0.8 });
                const boxBaseMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.9, metalness: 0.05 });

                const postRadius = 0.05;
                const postGeo = new THREE.CylinderGeometry(postRadius, postRadius, rackHeight, 8);
                const clipGeo = new THREE.CylinderGeometry(postRadius * 1.3, postRadius * 1.3, 0.12, 8);
                const unitBoxGeo = new THREE.BoxGeometry(1, 1, 1); // 1x1x1 的基準幾何體供 InstancedMesh 縮放

                RACKS_CONFIG.forEach((rack, index) => {
                    const top = parseFloat(rack.top) / 100;
                    const left = parseFloat(rack.left) / 100;
                    const width = parseFloat(rack.width) / 100;
                    const height = parseFloat(rack.height) / 100;

                    const w = width * roomW;
                    const d = height * roomD;
                    const x = (left * roomW) - (roomW / 2) + (w / 2);
                    const z = (top * roomD) - (roomD / 2) + (d / 2);

                    const group = new THREE.Group();
                    group.position.set(x, rackHeight / 2, z); 

                    const postPositions = [
                        [-w/2 + postRadius, -d/2 + postRadius],
                        [w/2 - postRadius, -d/2 + postRadius],
                        [-w/2 + postRadius, d/2 - postRadius],
                        [w/2 - postRadius, d/2 - postRadius]
                    ];
                    
                    // 使用 InstancedMesh 繪製支柱 (4根)
                    const postInstanced = new THREE.InstancedMesh(postGeo, postMat, 4);
                    postInstanced.castShadow = true;
                    const matrix = new THREE.Matrix4();
                    postPositions.forEach((pos, idx) => {
                        matrix.setPosition(pos[0], 0, pos[1]);
                        postInstanced.setMatrixAt(idx, matrix);
                    });
                    group.add(postInstanced);

                    const shelfThickness = 0.02;
                    const shelfGeo = new THREE.BoxGeometry(w, shelfThickness, d);
                    const rimGeo = new THREE.BoxGeometry(w, 0.12, d);
                    const edges = new THREE.EdgesGeometry(rimGeo);
                    const lineMat = new THREE.LineBasicMaterial({ color: 0x64748b, linewidth: 2 }); 

                    const wireframes = []; 
                    const shelfYs = [-1.6, -0.5, 0.6, 1.7]; 

                    // 準備 InstancedMesh 的資料收集
                    const clipTransforms = [];
                    const boxTransforms = [];

                    shelfYs.forEach((sy) => {
                        const shelf = new THREE.Mesh(shelfGeo, shelfMat);
                        shelf.position.y = sy;
                        shelf.receiveShadow = true;
                        group.add(shelf);

                        const wireframe = new THREE.LineSegments(edges, lineMat.clone());
                        wireframe.position.y = sy;
                        group.add(wireframe);
                        wireframes.push(wireframe);

                        // 收集夾片位置矩陣
                        postPositions.forEach(pos => {
                            const cMat = new THREE.Matrix4();
                            cMat.setPosition(pos[0], sy, pos[1]);
                            clipTransforms.push(cMat);
                        });

                        // 產生紙箱大小與位置邏輯 (固定比例放大，盡量塞滿)
                        let seed = index * 100 + Math.abs(sy * 10); 
                        const pseudoRandom = () => {
                            const val = Math.sin(seed++) * 10000;
                            return val - Math.floor(val);
                        };

                        const depthOptions = [0.8, 1.0, 1.2];
                        const widthOptions = [0.8, 1.1, 1.4];
                        const heightOptions = [0.6, 0.75, 0.9];

                        let currentZ = -d/2 + postRadius * 2.5;
                        while (currentZ < d/2 - postRadius * 2.5) {
                            let rowDepth = depthOptions[Math.floor(pseudoRandom() * depthOptions.length)]; 
                            if (currentZ + rowDepth > d/2 - postRadius * 2.5) {
                                rowDepth = (d/2 - postRadius * 2.5) - currentZ;
                            }
                            if (rowDepth < 0.5) break; 

                            let currentX = -w/2 + postRadius * 2.5;
                            while (currentX < w/2 - postRadius * 2.5) {
                                let boxW = widthOptions[Math.floor(pseudoRandom() * widthOptions.length)]; 
                                if (currentX + boxW > w/2 - postRadius * 2.5) {
                                    boxW = (w/2 - postRadius * 2.5) - currentX;
                                }
                                if (boxW < 0.5) break;

                                let boxH = heightOptions[Math.floor(pseudoRandom() * heightOptions.length)]; 

                                const actualW = boxW - 0.04;
                                const actualD = rowDepth - 0.04;

                                if (actualW > 0.4 && actualD > 0.4) {
                                    // 將每個紙箱轉化為矩陣存放 (平移 + 縮放)
                                    const bMat = new THREE.Matrix4();
                                    const posVec = new THREE.Vector3(currentX + boxW/2, sy + shelfThickness/2 + boxH/2, currentZ + rowDepth/2);
                                    const quat = new THREE.Quaternion();
                                    const scaleVec = new THREE.Vector3(actualW, boxH, actualD);
                                    bMat.compose(posVec, quat, scaleVec);
                                    boxTransforms.push(bMat);
                                }
                                
                                currentX += boxW;
                                if (pseudoRandom() > 0.95) currentX += 0.4 + pseudoRandom() * 0.4;
                            }
                            currentZ += rowDepth;
                        }
                    });

                    // 使用 InstancedMesh 繪製黑色夾片
                    if (clipTransforms.length > 0) {
                        const clipInstanced = new THREE.InstancedMesh(clipGeo, clipMat, clipTransforms.length);
                        clipTransforms.forEach((mat, idx) => clipInstanced.setMatrixAt(idx, mat));
                        group.add(clipInstanced);
                    }

                    // 使用 InstancedMesh 繪製所有紙箱 (大幅降低 Draw calls)
                    let boxInstanced = null;
                    if (boxTransforms.length > 0) {
                        boxInstanced = new THREE.InstancedMesh(unitBoxGeo, boxBaseMat.clone(), boxTransforms.length);
                        boxTransforms.forEach((mat, idx) => boxInstanced.setMatrixAt(idx, mat));
                        boxInstanced.castShadow = true;
                        boxInstanced.receiveShadow = true;
                        group.add(boxInstanced);
                    }

                    // 隱形的射線測試命中區塊 (用於精準判斷點擊與 Hover)
                    const hitGeo = new THREE.BoxGeometry(w, rackHeight, d);
                    const hitMat = new THREE.MeshBasicMaterial({ visible: false });
                    const hitBox = new THREE.Mesh(hitGeo, hitMat);
                    hitBox.userData = { id: rack.id };
                    group.add(hitBox);

                    this.scene.add(group);
                    this.rackMeshes[rack.id] = { hitBox, group, wireframes, boxInstanced, originalY: rackHeight / 2 };
                });
            },

            updateVisuals(highlightedIds, selectedId) {
                if(!this.scene) return;
                
                Object.values(this.rackMeshes).forEach(meshObj => {
                    meshObj.wireframes.forEach(wf => {
                        wf.material.color.setHex(0x64748b);
                        wf.material.opacity = 0.5;
                        wf.material.transparent = true;
                    });
                    if (meshObj.boxInstanced) {
                        meshObj.boxInstanced.material.emissive.setHex(0x000000);
                    }
                    meshObj.group.position.y = meshObj.originalY;
                });

                highlightedIds.forEach(id => {
                    if (this.rackMeshes[id]) {
                        this.rackMeshes[id].wireframes.forEach(wf => {
                            wf.material.color.setHex(0x0ea5e9);
                            wf.material.opacity = 1.0;
                        });
                        if (this.rackMeshes[id].boxInstanced) {
                            this.rackMeshes[id].boxInstanced.material.emissive.setHex(0x0284c7);
                        }
                    }
                });

                if (selectedId && this.rackMeshes[selectedId]) {
                    this.rackMeshes[selectedId].wireframes.forEach(wf => {
                        wf.material.color.setHex(0x10b981);
                        wf.material.opacity = 1.0;
                    });
                    if (this.rackMeshes[selectedId].boxInstanced) {
                        this.rackMeshes[selectedId].boxInstanced.material.emissive.setHex(0x059669);
                    }
                    this.rackMeshes[selectedId].group.position.y = this.rackMeshes[selectedId].originalY + 0.5;
                }
            },

            onClick(event, container) {
                const rect = container.getBoundingClientRect();
                this.mouse.x = ((event.clientX - rect.left) / container.clientWidth) * 2 - 1;
                this.mouse.y = -((event.clientY - rect.top) / container.clientHeight) * 2 + 1;

                this.raycaster.setFromCamera(this.mouse, this.camera);
                const hitBoxes = Object.values(this.rackMeshes).map(r => r.hitBox);
                const intersects = this.raycaster.intersectObjects(hitBoxes, false);
                
                if (intersects.length > 0) {
                    const obj = intersects[0].object;
                    if (obj.userData && obj.userData.id) {
                        Controllers.handleRackClick(obj.userData.id);
                    }
                }
            },

            // 滑鼠懸停時觸發 3D 浮動提示框 (Tooltip)
            onMouseMove(event, container) {
                const rect = container.getBoundingClientRect();
                this.mouse.x = ((event.clientX - rect.left) / container.clientWidth) * 2 - 1;
                this.mouse.y = -((event.clientY - rect.top) / container.clientHeight) * 2 + 1;

                this.raycaster.setFromCamera(this.mouse, this.camera);
                
                // 只偵測 hitBox 實體
                const hitBoxes = Object.values(this.rackMeshes).map(r => r.hitBox);
                const intersects = this.raycaster.intersectObjects(hitBoxes, false);
                
                const tooltip = document.getElementById('tooltip3d');

                if (intersects.length > 0) {
                    const rackId = intersects[0].object.userData.id;
                    
                    // 游標指標變化
                    container.style.cursor = 'pointer';

                    const rackName = RACKS_CONFIG.find(r => r.id === rackId)?.name || '未知層架';
                    const meds = AppState.medicines.filter(m => m.rackId === rackId);
                    
                    // 取前 3 個藥品名稱
                    const topMeds = meds.slice(0, 3).map(m => `• ${m.name}`).join('<br>');
                    const moreInfo = meds.length > 3 ? `<div class="mt-1 pt-1 border-t border-slate-700/50 text-slate-400">...等共 ${meds.length} 項藥品</div>` : '';

                    tooltip.innerHTML = `
                        <div class="font-bold text-sm text-primary mb-1 pb-1 border-b border-slate-700">${rackName}</div>
                        <div class="text-xs text-slate-200">${topMeds || '<span class="text-slate-500">目前為空</span>'}</div>
                        ${moreInfo}
                    `;
                    
                    tooltip.style.left = `${event.clientX}px`;
                    tooltip.style.top = `${event.clientY - 15}px`;
                    tooltip.classList.remove('hidden', 'opacity-0');
                } else {
                    container.style.cursor = 'grab';
                    tooltip.classList.add('opacity-0');
                    setTimeout(() => { if (tooltip.classList.contains('opacity-0')) tooltip.classList.add('hidden'); }, 200);
                }
            },

            onResize(container) {
                if (!this.camera || !this.renderer) return;
                this.camera.aspect = container.clientWidth / container.clientHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(container.clientWidth, container.clientHeight);
            },

            animate() {
                requestAnimationFrame(() => this.animate());
                
                // 執行攝影機重置動畫 (Lerp)
                if (this.isResetting) {
                    this.camera.position.lerp(this.defaultCamPos, 0.08);
                    this.controls.target.lerp(this.defaultTarget, 0.08);
                    if (this.camera.position.distanceTo(this.defaultCamPos) < 0.1) {
                        this.isResetting = false;
                    }
                }

                if (this.controls) this.controls.update();
                if (this.renderer && this.scene && this.camera) {
                    this.renderer.render(this.scene, this.camera);
                }
            }
        };

        /**
         * 5. 系統初始化
         */
        async function initApp() {
            if (localStorage.getItem('drugSysDarkMode') === 'dark' || (!('drugSysDarkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            const savedRacks = localStorage.getItem('drugSysRacksConfig');
            if (savedRacks) {
                const parsedRacks = JSON.parse(savedRacks);
                RACKS_CONFIG.forEach(rack => {
                    const saved = parsedRacks.find(r => r.id === rack.id);
                    if (saved) {
                        rack.name = saved.name || rack.name;
                        rack.category = saved.category;
                    }
                });
            }

            if (sessionStorage.getItem('drugSysAuth') === 'true') {
                AppState.isLoggedIn = true;
            }

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key.toLowerCase() === 'f') {
                    e.preventDefault(); 
                    DOM.searchInput.focus();
                }
                if (e.key === 'Escape') {
                    if (!DOM.editModal.classList.contains('hidden')) Controllers.closeEditModal();
                    if (!DOM.rackEditModal.classList.contains('hidden')) Controllers.closeRackEditModal();
                    if (!DOM.settingsModal.classList.contains('hidden')) Controllers.closeSettingsModal();
                    if (!DOM.loginModal.classList.contains('hidden')) Controllers.closeLoginModal();
                    if (!DOM.printFilterModal.classList.contains('hidden')) Controllers.closePrintFilterModal();
                }
            });

            lucide.createIcons();
            Controllers.updateAuthUI();
            DOM.renderRackOptions();

            await AppState.initData();
            DOM.totalItemsCount.textContent = AppState.medicines.length;

            DOM.renderRacks();
            ThreeApp.init('canvas-container');

            DOM.searchInput.addEventListener('input', (e) => Controllers.handleInput(e));
            DOM.clearSearchBtn.addEventListener('click', () => Controllers.clearSearch());

            Controllers.refreshUI();
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
