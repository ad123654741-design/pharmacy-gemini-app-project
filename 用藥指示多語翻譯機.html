<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多國語言用藥指示翻譯機 | 醫療衛教專用</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        * { -webkit-tap-highlight-color: transparent; }
        
        /* 確保音波動畫流暢 */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .playing-audio::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background-color: currentColor;
            animation: pulse-ring 1s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        /* 拖曳與滑動相關樣式 */
        .swiping { transition: none !important; }
        .swipe-item { transition: transform 0.2s ease-out; }
        .drag-over { border: 2px dashed #3b82f6 !important; opacity: 0.7; }
    </style>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 antialiased h-[100dvh] flex flex-col overflow-hidden transition-colors duration-300">

    <header class="bg-blue-700 dark:bg-slate-800 text-white shadow-md z-10 flex-none transition-colors duration-300 border-b border-transparent dark:border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-2.5 sm:py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-pills text-xl sm:text-2xl text-blue-200 dark:text-blue-400"></i>
                <h1 class="text-lg sm:text-xl md:text-2xl font-bold tracking-wide">用藥指示多語翻譯機</h1>
            </div>
            <div class="flex items-center space-x-2 sm:space-x-4">
                <div class="text-sm text-blue-200 dark:text-slate-400 hidden md:block">
                    <i class="fa-solid fa-user-nurse mr-1"></i> 專為醫療人員與衛教設計
                </div>
                <!-- 新增：一鍵收合/展開按鈕 -->
                <button id="toggle-accordions" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-blue-600 dark:bg-slate-700 hover:bg-blue-500 dark:hover:bg-slate-600 transition-colors flex items-center justify-center tooltip" title="全部收合/展開">
                    <i id="toggle-accordions-icon" class="fa-solid fa-compress text-white text-sm sm:text-base transition-transform"></i>
                </button>
                <button id="theme-toggle" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-blue-600 dark:bg-slate-700 hover:bg-blue-500 dark:hover:bg-slate-600 transition-colors flex items-center justify-center tooltip" title="切換深淺色">
                    <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden text-sm sm:text-base"></i>
                    <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden text-yellow-300 text-sm sm:text-base"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full flex flex-col lg:flex-row overflow-hidden">
        
        <!-- 左側：指令選擇區 (加入 overflow-hidden 確保邊界限制) -->
        <section class="w-full lg:w-1/3 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col h-[38%] lg:h-full flex-none z-0 overflow-hidden transition-colors duration-300">
            <div class="p-2 sm:p-3 lg:p-4 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex-none">
                <div class="flex justify-between items-center mb-2 sm:mb-3">
                    <h2 class="text-base sm:text-lg font-semibold text-slate-700 dark:text-slate-200">
                        <i class="fa-solid fa-list-check mr-2 text-blue-500 dark:text-blue-400"></i>構建醫囑
                    </h2>
                    <span class="hidden sm:inline-block text-xs bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200 px-2 py-1 rounded-md">支援複選組合</span>
                </div>
                <div class="flex flex-col gap-2">
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="search-input" placeholder="搜尋關鍵字 (如: 睡前)..." class="w-full pl-9 pr-3 py-1.5 sm:py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors text-sm">
                    </div>
                </div>
            </div>
            
            <div id="instruction-list" class="flex-1 overflow-y-auto p-2 sm:p-3 lg:p-4 space-y-2 sm:space-y-3 pb-10 sm:pb-20 lg:pb-4">
                </div>
        </section>

        <!-- 右側：翻譯結果顯示區 (加入 min-h-0 與 overflow-hidden 解決 flex 撐開導致的捲軸失效問題) -->
        <section class="w-full lg:w-2/3 bg-slate-50 dark:bg-slate-900 flex flex-col flex-1 min-h-0 overflow-hidden lg:h-full transition-colors duration-300">
            
            <div id="result-toolbar" class="hidden flex-none bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 p-2 sm:p-3 lg:p-4 flex flex-wrap gap-2 justify-between items-center transition-colors">
                <span class="hidden sm:block text-sm font-medium text-slate-500 dark:text-slate-400 truncate flex-1">已選取的醫囑組合：</span>
                <div class="flex gap-2 flex-1 sm:flex-none justify-end items-center">
                    <select id="language-filter" class="px-2 py-1.5 border border-slate-300 dark:border-slate-600 rounded-lg text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors flex-1 sm:flex-none min-w-[100px]">
                        <option value="all">🌐 全部語言</option>
                        <option value="id">🇮🇩 印尼文</option>
                        <option value="vi">🇻🇳 越南文</option>
                        <option value="th">🇹🇭 泰文</option>
                        <option value="en">🇺🇸 英文</option>
                    </select>
                    <button id="btn-save-fav" class="px-3 py-1.5 sm:px-4 sm:py-2 bg-amber-50 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 rounded-lg text-sm font-medium hover:bg-amber-100 dark:hover:bg-amber-900/50 transition-colors border border-amber-200 dark:border-amber-800 whitespace-nowrap">
                        <i class="fa-regular fa-star mr-1"></i> 常用
                    </button>
                    <button id="btn-clear-all" class="px-3 py-1.5 sm:px-4 sm:py-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors whitespace-nowrap">
                        <i class="fa-solid fa-eraser mr-1"></i> 清除
                    </button>
                </div>
            </div>

            <div id="translation-result" class="flex-1 overflow-y-auto p-3 sm:p-4 md:p-6 lg:p-8">
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-400 dark:text-slate-500">
                    <div class="w-24 h-24 sm:w-32 sm:h-32 bg-blue-50 dark:bg-slate-800 rounded-full flex items-center justify-center mb-4 transition-colors">
                        <i class="fa-solid fa-language text-4xl sm:text-5xl text-blue-200 dark:text-slate-600"></i>
                    </div>
                    <p class="text-base sm:text-lg font-medium text-slate-500 dark:text-slate-400">請從上方勾選組合您的用藥指示</p>
                </div>

                <div id="result-content" class="hidden space-y-3 sm:space-y-6 max-w-3xl mx-auto pb-10 sm:pb-20 lg:pb-0">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-4 sm:p-6 relative overflow-hidden transition-colors">
                        <div class="absolute top-0 left-0 w-2 h-full bg-blue-500 dark:bg-blue-400"></div>
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] sm:text-xs font-bold uppercase tracking-wider text-blue-500 dark:text-blue-400 mb-1 block">中文 (原始指示)</span>
                            <span class="text-xl sm:text-2xl">🇹🇼</span>
                        </div>
                        <h3 id="result-zh" class="text-xl sm:text-2xl md:text-3xl font-bold text-slate-800 dark:text-slate-100 mt-1 sm:mt-2"></h3>
                    </div>

                    <div id="translations-container" class="space-y-3 sm:space-y-4"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-slate-800 dark:bg-slate-100 text-white dark:text-slate-800 px-6 py-3 rounded-full shadow-lg transition-all duration-300 opacity-0 pointer-events-none translate-y-4 z-[110] flex items-center whitespace-nowrap">
        <div class="flex items-center">
            <i id="toast-icon" class="fa-solid fa-check-circle text-emerald-400 dark:text-emerald-500 mr-2"></i>
            <span id="toast-msg">操作成功</span>
        </div>
        <button id="btn-undo" class="ml-4 pl-4 border-l border-slate-600 dark:border-slate-300 text-blue-300 dark:text-blue-600 hover:text-blue-200 dark:hover:text-blue-700 font-bold text-sm hidden cursor-pointer">復原 <i class="fa-solid fa-rotate-left"></i></button>
    </div>

    <script>
        // --- 1. 資料庫 (Data) ---
        const languageConfig = [
            { code: 'id', name: '印尼文 (Bahasa Indonesia)', flag: '🇮🇩', tts: 'id-ID' },
            { code: 'vi', name: '越南文 (Tiếng Việt)', flag: '🇻🇳', tts: 'vi-VN' },
            { code: 'th', name: '泰文 (ภาษาไทย)', flag: '🇹🇭', tts: 'th-TH' },
            { code: 'en', name: '英文 (English)', flag: '🇺🇸', tts: 'en-US' }
        ];

        const medicalData = [
            {
                category: "常規頻率",
                items: [
                    { uid: 'qd', abbr: 'QD', zh: '一天一次，飯後使用', en: 'Use 1 time a day, after meals', id: 'Gunakan 1 kali sehari, sesudah makan', vi: 'Sử dụng 1 lần một ngày, sau bữa ăn', th: 'ใช้วันละ 1 ครั้ง หลังอาหาร' },
                    { uid: 'bid', abbr: 'BID', zh: '一天兩次，早晚飯後使用', en: 'Use 2 times a day, after breakfast and dinner', id: 'Gunakan 2 kali sehari, sesudah sarapan dan makan malam', vi: 'Sử dụng 2 lần một ngày, sau bữa sáng và bữa tối', th: 'ใช้วันละ 2 ครั้ง หลังอาหารเช้าและเย็น' },
                    { uid: 'tid', abbr: 'TID', zh: '一天三次，三餐飯後使用', en: 'Use 3 times a day, after meals', id: 'Gunakan 3 kali sehari, sesudah makan', vi: 'Sử dụng 3 lần một ngày, sau bữa ăn', th: 'ใช้วันละ 3 ครั้ง หลังอาหาร' },
                    { uid: 'qid', abbr: 'QID', zh: '一天四次，三餐飯後及睡前使用', en: 'Use 4 times a day, after meals and at bedtime', id: 'Gunakan 4 kali sehari, sesudah makan dan sebelum tidur', vi: 'Sử dụng 4 lần một ngày, sau bữa ăn và trước khi đi ngủ', th: 'ใช้วันละ 4 ครั้ง หลังอาหารและก่อนนอน' },
                    { uid: 'hs', abbr: 'HS', zh: '睡前使用', en: 'Use at bedtime', id: 'Gunakan sebelum tidur', vi: 'Sử dụng trước khi đi ngủ', th: 'ใช้ก่อนนอน' },
                    { uid: 'qnoon', abbr: 'QNOON', zh: '中午飯後使用', en: 'Use at noon, after meal', id: 'Gunakan siang hari sesudah makan', vi: 'Sử dụng vào buổi trưa, sau bữa ăn', th: 'ใช้ตอนเที่ยง หลังอาหาร' },
                    { uid: 'q4h', abbr: 'Q4H', zh: '每4小時使用一次', en: 'Use every 4 hours', id: 'Gunakan setiap 4 jam', vi: 'Sử dụng mỗi 4 giờ một lần', th: 'ใช้ทุก 4 ชั่วโมง' },
                    { uid: 'q6h', abbr: 'Q6H', zh: '每6小時使用一次', en: 'Use every 6 hours', id: 'Gunakan setiap 6 jam', vi: 'Sử dụng mỗi 6 giờ một lần', th: 'ใช้ทุก 6 ชั่วโมง' },
                    { uid: 'q8h', abbr: 'Q8H', zh: '每8小時使用一次', en: 'Use every 8 hours', id: 'Gunakan setiap 8 jam', vi: 'Sử dụng mỗi 8 giờ một lần', th: 'ใช้ทุก 8 ชั่วโมง' },
                    { uid: 'q12h', abbr: 'Q12H', zh: '每12小時使用一次', en: 'Use every 12 hours', id: 'Gunakan setiap 12 jam', vi: 'Sử dụng mỗi 12 giờ một lần', th: 'ใช้ทุก 12 ชั่วโมง' },
                    { uid: 'qw', abbr: 'QW', zh: '每週使用一次', en: 'Use 1 time a week', id: 'Gunakan 1 kali seminggu', vi: 'Sử dụng 1 lần một tuần', th: 'ใช้สัปดาห์ละ 1 ครั้ง' },
                    { uid: 'biw', abbr: 'BIW', zh: '每週使用兩次', en: 'Use 2 times a week', id: 'Gunakan 2 kali seminggu', vi: 'Sử dụng 2 lần một tuần', th: 'ใช้สัปดาห์ละ 2 ครั้ง' },
                    { uid: 'tiw', abbr: 'TIW', zh: '每週使用三次', en: 'Use 3 times a week', id: 'Gunakan 3 kali seminggu', vi: 'Sử dụng 3 lần một tuần', th: 'ใช้สัปดาห์ละ 3 ครั้ง' },
                    { uid: 'st', abbr: 'ST', zh: '立刻使用', en: 'Use immediately', id: 'Gunakan segera', vi: 'Sử dụng ngay lập tức', th: 'ใช้ทันที' }
                ]
            },
            {
                category: "特殊時間點",
                items: [
                    { uid: 'ac', abbr: 'AC', zh: '飯前使用 (空腹)', en: 'Use before meals (on an empty stomach)', id: 'Gunakan sebelum makan (saat perut kosong)', vi: 'Sử dụng trước bữa ăn (khi bụng đói)', th: 'ใช้ก่อนอาหาร (ขณะท้องว่าง)' },
                    { uid: 'prn', abbr: 'PRN', zh: '需要時使用', en: 'Use when needed', id: 'Gunakan jika perlu', vi: 'Sử dụng khi cần thiết', th: 'ใช้เมื่อมีอาการ' }
                ]
            },
            {
                category: "特殊給藥方式 / 注意事項",
                items: [
                    { uid: 'ext', zh: '此為外用藥，請勿吞食', en: 'For external use only. Do not swallow.', id: 'Hanya untuk pemakaian luar. Jangan ditelan.', vi: 'Thuốc chỉ dùng ngoài da. Không được nuốt.', th: 'สำหรับใช้ภายนอกเท่านั้น ห้ามรับประทาน' },
                    { uid: 'chew', zh: '請咀嚼碎後吞服', en: 'Chew completely before swallowing', id: 'Kunyah sampai hancur sebelum ditelan', vi: 'Nhai kỹ trước khi nuốt', th: 'เคี้ยวให้ละเอียดก่อนกลืน' },
                    { uid: 'sub', zh: '請含於舌下，勿直接吞下', en: 'Dissolve under the tongue. Do not swallow whole.', id: 'Biarkan larut di bawah lidah. Jangan langsung ditelan.', vi: 'Ngậm dưới lưỡi cho tan. Không nuốt chửng.', th: 'อมใต้ลิ้นให้ละลาย ห้ามกลืน' },
                    { uid: 'vaginal_sup', zh: '此為陰道塞劑，請勿吞食', en: 'Vaginal suppository. Do not swallow.', id: 'Supositoria vagina. Jangan ditelan.', vi: 'Thuốc đặt âm đạo. Không được nuốt.', th: 'ยาเหน็บช่องคลอด ห้ามรับประทาน' },
                    { uid: 'anal_sup', zh: '此為肛門塞劑，請勿吞食', en: 'Rectal suppository. Do not swallow.', id: 'Supositoria rektal. Jangan ditelan.', vi: 'Thuốc đặt hậu môn. Không được nuốt.', th: 'ยาเหน็บทวารหนัก ห้ามรับประทาน' },
                    { uid: 'eye_drop', zh: '此為眼藥水，每次1滴', en: 'Eye drops, 1 drop each time.', id: 'Obat tetes mata, 1 tetes setiap kali.', vi: 'Thuốc nhỏ mắt, mỗi lần 1 giọt.', th: 'ยาหยอดตา ครั้งละ 1 หยด' }
                ]
            }
        ];

        const flatMedicalData = medicalData.flatMap(g => g.items);

        // --- 2. 狀態管理 (State) ---
        let state = {
            selectedIds: [], 
            favorites: JSON.parse(localStorage.getItem('med_favorites') || '[]'),
            searchQuery: '',
            selectedFavId: null, 
            activeLanguage: 'all', 
            undoState: null       
        };

        const DOM = {
            listContainer: document.getElementById('instruction-list'),
            emptyState: document.getElementById('empty-state'),
            resultContent: document.getElementById('result-content'),
            resultToolbar: document.getElementById('result-toolbar'),
            resultZh: document.getElementById('result-zh'),
            translationsContainer: document.getElementById('translations-container'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toast-msg'),
            toastIcon: document.getElementById('toast-icon'),
            btnUndo: document.getElementById('btn-undo'),
            searchInput: document.getElementById('search-input'),
            languageFilter: document.getElementById('language-filter'),
            toggleAccordionsBtn: document.getElementById('toggle-accordions'),
            toggleAccordionsIcon: document.getElementById('toggle-accordions-icon')
        };

        // --- 3. UI 渲染邏輯 (Render) ---
        
        // 渲染左側列表
        function renderInstructionList() {
            let html = '';
            
            // 1. 渲染我的最愛群組
            if (state.favorites.length > 0 && !state.searchQuery) {
                html += renderGroupHTML('⭐ 我的最愛 (點選套用 / 拖曳)', state.favorites, 'fav-group', true, true);
            }

            // 2. 渲染一般資料庫 (套用搜尋過濾)
            medicalData.forEach((group, index) => {
                const filteredItems = group.items.filter(item => 
                    item.zh.includes(state.searchQuery) || 
                    item.en.toLowerCase().includes(state.searchQuery.toLowerCase()) ||
                    (item.abbr && item.abbr.toLowerCase().includes(state.searchQuery.toLowerCase()))
                );
                
                if (filteredItems.length > 0) {
                    html += renderGroupHTML(group.category, filteredItems, `group-${index}`);
                }
            });

            if(html === '') {
                html = `<div class="text-center text-slate-400 py-8">找不到符合「${state.searchQuery}」的結果</div>`;
            }

            DOM.listContainer.innerHTML = html;
            updateActiveButtonUI();
        }

        // 產生單一分類的 HTML (Accordion)
        function renderGroupHTML(categoryName, items, groupId, isFav = false, isDraggable = false) {
            const isOpen = state.searchQuery || isFav ? 'open' : '';
            let html = `
                <details class="group bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden shadow-sm" ${isOpen}>
                    <summary class="flex justify-between items-center font-medium cursor-pointer list-none p-3 bg-slate-50 dark:bg-slate-700/50 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                        <span class="text-sm font-bold ${isFav ? 'text-amber-600 dark:text-amber-400' : 'text-slate-600 dark:text-slate-300'}">${categoryName}</span>
                        <span class="transition group-open:rotate-180">
                            <i class="fa-solid fa-chevron-down text-slate-400"></i>
                        </span>
                    </summary>
                    <div class="p-2 space-y-1 bg-white dark:bg-slate-800">
            `;

            items.forEach(item => {
                const isFavItem = !!item.favId;
                const dataAttr = isFavItem ? `data-fav-id="${item.favId}"` : `data-id="${item.uid}"`;
                
                const label = isFavItem ? item.zh : (item.abbr ? `<span class="font-bold text-blue-700 dark:text-blue-400 w-16 inline-block">${item.abbr}</span><span class="text-slate-500 dark:text-slate-400 text-xs ml-1 border-l border-slate-300 dark:border-slate-600 pl-2">${item.zh.split('，')[0]}</span>` : item.zh);
                
                const dragAttrs = isDraggable ? `draggable="true"` : '';
                const swipeClass = isDraggable ? `swipe-item` : '';
                const grabIcon = isDraggable ? `<i class="fa-solid fa-grip-vertical text-slate-300 mr-2 cursor-grab pointer-events-auto flex-none mt-1"></i>` : '';

                html += `
                    <button ${dataAttr} ${dragAttrs} class="instruction-btn ${swipeClass} w-full text-left px-3 py-2.5 rounded-lg border border-transparent hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-all flex items-start relative overflow-hidden bg-white dark:bg-slate-800 touch-pan-y">
                        ${grabIcon}
                        <div class="w-5 h-5 border-2 rounded flex-none mr-3 mt-0.5 flex items-center justify-center transition-colors checkbox-ui border-slate-300 dark:border-slate-500">
                            <i class="fa-solid fa-check text-xs opacity-0 text-white"></i>
                        </div>
                        <span class="text-slate-700 dark:text-slate-200 text-sm pointer-events-none break-words flex-1">${label}</span>
                        ${isFavItem ? `<i class="fa-solid fa-trash-can text-slate-300 hover:text-red-500 ml-2 mt-1 delete-fav-btn pointer-events-auto" data-delete-id="${item.favId}" title="刪除常用"></i>` : ''}
                    </button>
                `;
            });
            html += `</div></details>`;
            return html;
        }

        // 更新按鈕勾選視覺狀態
        function updateActiveButtonUI() {
            const buttons = document.querySelectorAll('.instruction-btn');
            buttons.forEach(btn => {
                const checkbox = btn.querySelector('.checkbox-ui');
                const checkIcon = btn.querySelector('.fa-check');
                let isSelected = false;

                if (btn.dataset.id) {
                    isSelected = state.selectedIds.includes(btn.dataset.id);
                } else if (btn.dataset.favId) {
                    isSelected = (btn.dataset.favId === state.selectedFavId);
                }
                
                if (isSelected) {
                    btn.classList.add('bg-blue-50', 'dark:bg-blue-900/40', 'border-blue-300', 'dark:border-blue-700');
                    btn.classList.remove('border-transparent');
                    if (checkbox) {
                        checkbox.classList.replace('border-slate-300', 'border-blue-500');
                        checkbox.classList.replace('dark:border-slate-500', 'border-blue-500');
                        checkbox.classList.add('bg-blue-500');
                        checkIcon.classList.replace('opacity-0', 'opacity-100');
                    }
                } else {
                    btn.classList.remove('bg-blue-50', 'dark:bg-blue-900/40', 'border-blue-300', 'dark:border-blue-700');
                    btn.classList.add('border-transparent');
                    if (checkbox) {
                        checkbox.classList.replace('border-blue-500', 'border-slate-300');
                        checkbox.classList.remove('bg-blue-500');
                        checkIcon.classList.replace('opacity-100', 'opacity-0');
                        if(document.documentElement.classList.contains('dark')) {
                            checkbox.classList.replace('border-slate-300', 'border-slate-500');
                        }
                    }
                }
            });
        }

        // 將選取的 ID 陣列合併為單一完整醫囑物件
        function getCombinedInstruction() {
            if (state.selectedIds.length === 0) return null;
            
            let selectedItems = state.selectedIds.map(uid => flatMedicalData.find(i => i.uid === uid)).filter(Boolean);
            selectedItems = JSON.parse(JSON.stringify(selectedItems));
            
            const hasAC = state.selectedIds.includes('ac');
            const hasFreqWithPC = selectedItems.some(i => ['qd', 'bid', 'tid', 'qid', 'qnoon'].includes(i.uid));

            if (hasAC && hasFreqWithPC) {
                selectedItems.forEach(item => {
                    if (['qd', 'bid', 'tid', 'qid', 'qnoon'].includes(item.uid)) {
                        item.zh = item.zh.replace(/飯後/g, '飯前');
                        item.en = item.en.replace(/after meals/g, 'before meals').replace(/after breakfast and dinner/g, 'before breakfast and dinner').replace(/after meal/g, 'before meal');
                        item.id = item.id.replace(/sesudah makan/g, 'sebelum makan').replace(/sesudah sarapan/g, 'sebelum sarapan');
                        item.vi = item.vi.replace(/sau bữa ăn/g, 'trước bữa ăn').replace(/sau bữa sáng/g, 'trước bữa sáng');
                        item.th = item.th.replace(/หลังอาหาร/g, 'ก่อนอาหาร');
                    }
                });
                selectedItems = selectedItems.filter(item => item.uid !== 'ac');
            }

            return {
                zh: selectedItems.map(i => i.zh).join('，'),
                en: selectedItems.map(i => i.en).join('. '),
                id: selectedItems.map(i => i.id).join(', '),
                vi: selectedItems.map(i => i.vi).join(', '),
                th: selectedItems.map(i => i.th).join(' ')
            };
        }

        // 渲染右側翻譯結果
        function renderTranslationResult() {
            const combinedItem = getCombinedInstruction();

            if (!combinedItem) {
                DOM.emptyState.classList.remove('hidden');
                DOM.resultContent.classList.add('hidden');
                DOM.resultToolbar.classList.add('hidden');
                return;
            }

            DOM.emptyState.classList.add('hidden');
            DOM.resultContent.classList.remove('hidden');
            DOM.resultToolbar.classList.remove('hidden');
            DOM.resultZh.textContent = combinedItem.zh;

            let translationsHtml = '';
            languageConfig.forEach(lang => {
                if(state.activeLanguage !== 'all' && state.activeLanguage !== lang.code) return;

                const translatedText = combinedItem[lang.code];
                translationsHtml += `
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-3 sm:p-5 transition-colors">
                        <div class="flex items-center justify-between mb-2 sm:mb-3 border-b border-slate-100 dark:border-slate-700 pb-2">
                            <div class="flex items-center space-x-2">
                                <span class="text-xl sm:text-2xl">${lang.flag}</span>
                                <span class="text-xs sm:text-sm font-bold text-slate-500 dark:text-slate-400">${lang.name}</span>
                            </div>
                            <div class="flex space-x-1 sm:space-x-2 relative">
                                <button onclick="handleSpeak('${translatedText}', '${lang.tts}', this)" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 hover:bg-emerald-100 dark:hover:bg-emerald-900/60 flex items-center justify-center transition-all relative">
                                    <i class="fa-solid fa-volume-high text-sm sm:text-base"></i>
                                </button>
                                <button onclick="handleCopy('${translatedText}')" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/60 flex items-center justify-center transition-colors">
                                    <i class="fa-regular fa-copy text-sm sm:text-base"></i>
                                </button>
                            </div>
                        </div>
                        <p class="text-lg sm:text-2xl md:text-3xl font-medium text-slate-800 dark:text-slate-100 leading-snug break-words">
                            ${translatedText}
                        </p>
                    </div>
                `;
            });

            DOM.translationsContainer.innerHTML = translationsHtml;
        }

        // --- 4. 互動邏輯與事件 (Actions & Events) ---

        // 一鍵收合/展開選單邏輯
        DOM.toggleAccordionsBtn.addEventListener('click', () => {
            const details = document.querySelectorAll('#instruction-list details');
            // 判斷當前是否有任何一個選單是展開的
            const anyOpen = Array.from(details).some(d => d.hasAttribute('open'));

            if (anyOpen) {
                // 如果有展開的，就全部收合，並切換為展開圖示
                details.forEach(d => d.removeAttribute('open'));
                DOM.toggleAccordionsIcon.classList.replace('fa-compress', 'fa-expand');
            } else {
                // 如果全都是收合的，就全部展開，並切換為收合圖示
                details.forEach(d => d.setAttribute('open', ''));
                DOM.toggleAccordionsIcon.classList.replace('fa-expand', 'fa-compress');
            }
        });

        DOM.languageFilter.addEventListener('change', (e) => {
            state.activeLanguage = e.target.value;
            renderTranslationResult();
        });

        function executeDeleteFav(favId) {
            const index = state.favorites.findIndex(f => f.favId === favId);
            if(index === -1) return;
            const deletedItem = state.favorites[index];
            
            state.undoState = {
                type: 'delete_fav',
                index: index,
                item: deletedItem
            };

            state.favorites.splice(index, 1);
            if(state.selectedFavId === favId) state.selectedFavId = null; 
            localStorage.setItem('med_favorites', JSON.stringify(state.favorites));
            renderInstructionList();
            showToast('已移除常用組合', true, true);
        }

        DOM.listContainer.addEventListener('click', (e) => {
            const deleteBtn = e.target.closest('.delete-fav-btn');
            if(deleteBtn) {
                e.stopPropagation();
                executeDeleteFav(deleteBtn.dataset.deleteId);
                return;
            }

            const btn = e.target.closest('.instruction-btn');
            if (!btn) return;

            if (btn.dataset.favId) {
                const favItem = state.favorites.find(f => f.favId === btn.dataset.favId);
                if (favItem) {
                    state.selectedFavId = favItem.favId; 
                    state.selectedIds = [...favItem.sourceIds]; 
                    updateActiveButtonUI();
                    renderTranslationResult();
                    showToast('已套用常用組合');
                }
                return;
            }

            state.selectedFavId = null; 
            const id = btn.dataset.id;
            if (state.selectedIds.includes(id)) {
                state.selectedIds = state.selectedIds.filter(i => i !== id);
            } else {
                const freqCategory = medicalData.find(g => g.category === "常規頻率");
                const freqUids = freqCategory ? freqCategory.items.map(i => i.uid) : [];
                
                if (freqUids.includes(id)) {
                    state.selectedIds = state.selectedIds.filter(i => !freqUids.includes(i));
                }
                state.selectedIds.push(id); 
            }

            updateActiveButtonUI();
            renderTranslationResult();
        });

        DOM.searchInput.addEventListener('input', (e) => {
            state.searchQuery = e.target.value.trim();
            renderInstructionList();
        });

        document.getElementById('btn-save-fav').addEventListener('click', () => {
            const combined = getCombinedInstruction();
            if (!combined) return;
            
            const isExist = state.favorites.some(f => f.zh === combined.zh);
            if(isExist) {
                showToast('此組合已存在於常用清單', false);
                return;
            }

            const newFav = {
                favId: 'fav_' + Date.now(),
                sourceIds: [...state.selectedIds],
                zh: combined.zh,
                en: combined.en,
                id: combined.id,
                vi: combined.vi,
                th: combined.th
            };

            state.favorites.unshift(newFav);
            localStorage.setItem('med_favorites', JSON.stringify(state.favorites));
            renderInstructionList();
            showToast('⭐ 成功加入我的最愛');
        });

        document.getElementById('btn-clear-all').addEventListener('click', () => {
            if (state.selectedIds.length === 0 && !state.selectedFavId) return;
            
            state.undoState = {
                type: 'clear_all',
                selectedIds: [...state.selectedIds],
                selectedFavId: state.selectedFavId
            };

            state.selectedIds = [];
            state.selectedFavId = null;
            updateActiveButtonUI();
            renderTranslationResult();
            showToast('已清除全部內容', true, true);
        });

        DOM.btnUndo.addEventListener('click', () => {
            if(!state.undoState) return;
            
            if(state.undoState.type === 'delete_fav') {
                state.favorites.splice(state.undoState.index, 0, state.undoState.item);
                localStorage.setItem('med_favorites', JSON.stringify(state.favorites));
                renderInstructionList();
                showToast('已復原移除的項目');
            } else if (state.undoState.type === 'clear_all') {
                state.selectedIds = state.undoState.selectedIds;
                state.selectedFavId = state.undoState.selectedFavId;
                updateActiveButtonUI();
                renderTranslationResult();
                showToast('已復原清除的內容');
            }
            
            state.undoState = null;
            DOM.btnUndo.classList.add('hidden');
        });

        // 拖曳排序邏輯 (Drag & Drop)
        let draggedItemFavId = null;
        let dragEl = null;

        DOM.listContainer.addEventListener('dragstart', (e) => {
            const btn = e.target.closest('.instruction-btn[data-fav-id]');
            if(btn) {
                draggedItemFavId = btn.dataset.favId;
                dragEl = btn;
                setTimeout(() => btn.classList.add('opacity-50'), 0);
            }
        });
        
        DOM.listContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            const btn = e.target.closest('.instruction-btn[data-fav-id]');
            if(btn && btn !== dragEl) {
                btn.classList.add('drag-over');
            }
        });

        DOM.listContainer.addEventListener('dragleave', (e) => {
            const btn = e.target.closest('.instruction-btn[data-fav-id]');
            if(btn) btn.classList.remove('drag-over');
        });

        DOM.listContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            const targetBtn = e.target.closest('.instruction-btn[data-fav-id]');
            if(targetBtn) targetBtn.classList.remove('drag-over');
            
            if(targetBtn && draggedItemFavId && draggedItemFavId !== targetBtn.dataset.favId) {
                const fromIdx = state.favorites.findIndex(f => f.favId === draggedItemFavId);
                const toIdx = state.favorites.findIndex(f => f.favId === targetBtn.dataset.favId);
                const [movedItem] = state.favorites.splice(fromIdx, 1);
                state.favorites.splice(toIdx, 0, movedItem);
                localStorage.setItem('med_favorites', JSON.stringify(state.favorites));
                renderInstructionList();
            }
        });

        DOM.listContainer.addEventListener('dragend', (e) => {
            if(dragEl) dragEl.classList.remove('opacity-50');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            draggedItemFavId = null;
            dragEl = null;
        });

        // 滑動刪除邏輯 (Swipe)
        let touchStartX = 0;
        let swipedBtn = null;

        DOM.listContainer.addEventListener('touchstart', (e) => {
            const btn = e.target.closest('.instruction-btn[data-fav-id]');
            if (!btn) return;
            swipedBtn = btn;
            touchStartX = e.touches[0].clientX;
            btn.classList.add('swiping');
        }, {passive: true});

        DOM.listContainer.addEventListener('touchmove', (e) => {
            if (!swipedBtn) return;
            const currentTouchX = e.touches[0].clientX;
            const diffX = currentTouchX - touchStartX;
            if (diffX < 0 && diffX > -150) { 
                swipedBtn.style.transform = `translateX(${diffX}px)`;
            }
        }, {passive: true});

        DOM.listContainer.addEventListener('touchend', (e) => {
            if (!swipedBtn) return;
            swipedBtn.classList.remove('swiping');
            
            const currentTouchX = e.changedTouches[0].clientX;
            const diffX = currentTouchX - touchStartX;
            
            if (diffX < -70) { 
                const favId = swipedBtn.dataset.favId;
                swipedBtn.style.transform = `translateX(-100%)`; 
                setTimeout(() => executeDeleteFav(favId), 200);
            } else {
                swipedBtn.style.transform = ''; 
            }
            swipedBtn = null;
        });

        let currentUtterance = null;
        function handleSpeak(text, langCode, btnElement) {
            if (!('speechSynthesis' in window)) {
                showToast('瀏覽器不支援語音功能', false);
                return;
            }

            window.speechSynthesis.cancel();
            
            document.querySelectorAll('.playing-audio').forEach(el => {
                el.classList.remove('playing-audio', 'text-white', 'bg-emerald-500');
                el.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            });

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode;
            utterance.rate = 0.85;

            utterance.onstart = () => {
                btnElement.classList.add('playing-audio', 'text-white');
                btnElement.classList.replace('bg-emerald-50', 'bg-emerald-500');
                btnElement.classList.replace('dark:bg-emerald-900/30', 'bg-emerald-500');
                btnElement.innerHTML = '<i class="fa-solid fa-volume-high fa-beat-fade"></i>'; 
            };

            utterance.onend = () => {
                btnElement.classList.remove('playing-audio', 'text-white');
                btnElement.classList.replace('bg-emerald-500', 'bg-emerald-50');
                btnElement.classList.replace('bg-emerald-500', 'dark:bg-emerald-900/30');
                btnElement.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            };
            
            utterance.onerror = utterance.onend;
            window.speechSynthesis.speak(utterance);
        }

        function handleCopy(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast('已複製翻譯')).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }
        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            try { document.execCommand('copy'); showToast('已複製翻譯'); } 
            catch (err) { showToast('複製失敗', false); }
            document.body.removeChild(textArea);
        }

        let toastTimeout;
        function showToast(message, isSuccess = true, hasUndo = false) {
            DOM.toastMsg.textContent = message;
            DOM.toastIcon.className = isSuccess ? 'fa-solid fa-check-circle text-emerald-400 dark:text-emerald-500 mr-2' : 'fa-solid fa-circle-exclamation text-red-400 mr-2';
            
            if(hasUndo) {
                DOM.btnUndo.classList.remove('hidden');
                DOM.toast.classList.remove('px-6');
                DOM.toast.classList.add('px-4'); 
            } else {
                DOM.btnUndo.classList.add('hidden');
                DOM.toast.classList.add('px-6');
                DOM.toast.classList.remove('px-4');
                state.undoState = null; 
            }

            DOM.toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            DOM.toast.classList.add('opacity-100', 'translate-y-0');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                DOM.toast.classList.remove('opacity-100', 'translate-y-0');
                DOM.toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            }, hasUndo ? 5000 : 2500); 
        }

        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        function updateThemeIcon() {
            if (document.documentElement.classList.contains('dark')) {
                lightIcon.classList.remove('hidden');
                darkIcon.classList.add('hidden');
            } else {
                darkIcon.classList.remove('hidden');
                lightIcon.classList.add('hidden');
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.setItem('color-theme', 'dark');
            } else {
                localStorage.setItem('color-theme', 'light');
            }
            updateThemeIcon();
            updateActiveButtonUI(); 
        });

        function init() {
            updateThemeIcon();
            renderInstructionList();
        }
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
