<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>慢箋領藥日期計算機 | 蝦仁藥師</title>
    <meta name="description" content="慢性病連續處方箋領藥日期計算工具，支援假日提醒、行事曆下載與法規說明。">
    
    <!-- Tailwind CSS (鎖定 3.4.3) -->
    <script src="https://cdn.tailwindcss.com?version=3.4.3"></script>
    
    <!-- React & ReactDOM (鎖定 18.2.0 umd 版) -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (鎖定 7.23.6) -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <style>
        body {
            background-color: #f8fafc;
            background-image: linear-gradient(#e2e8f0 1px, transparent 1px), linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }
        /* Modal Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.2s ease-out forwards;
        }
        /* Custom Scrollbar for Sidebar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 加上 data-type="module" 防止新版 Babel 解析 ES Module 時出錯 -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        // --- 內嵌 SVG 圖示 ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Calendar = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></IconBase>;
        const Calculator = (props) => <IconBase {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconBase>;
        const FileWarning = (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M12 13v4"/><path d="M12 21h.01"/></IconBase>;
        const Clock = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconBase>;
        const Download = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></IconBase>;
        const RotateCcw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconBase>;
        const Edit3 = (props) => <IconBase {...props}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></IconBase>;
        const AlertCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12" y1="16" y2="16.01"/></IconBase>;
        const Pill = (props) => <IconBase {...props}><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></IconBase>;
        const BookOpen = (props) => <IconBase {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>;
        const Copy = (props) => <IconBase {...props}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></IconBase>;
        const Check = (props) => <IconBase {...props}><polyline points="20 6 9 17 4 12"/></IconBase>;
        const Ban = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/></IconBase>;
        const Settings = (props) => <IconBase {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconBase>;
        const PartyPopper = (props) => <IconBase {...props}><path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 1.96L17.04 7a2.9 2.9 0 0 1-1.96 1.96L12.8 9.75a2.9 2.9 0 0 0-1.96 1.96l-.75 2.25c-.15.45-.63.75-1.1.75a1.1 1.1 0 0 1-1.09-1.39l.75-2.25a2.9 2.9 0 0 0-.75-3.12 2.9 2.9 0 0 0-3.12-.75l-2.25.75"/><path d="M11 11c-1.33 1.33-4 1.33-4 4"/></IconBase>;
        const AlertTriangle = (props) => <IconBase {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></IconBase>;
        const Trash2 = (props) => <IconBase {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconBase>;
        const Info = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></IconBase>;

        // --- 設定春節彈窗組件 ---
        const SpringSettingsModal = ({ 
            isOpen, onClose, 
            springStart, setSpringStart, 
            springEnd, setSpringEnd,
            springAdvanceDays, setSpringAdvanceDays,
            isSpringEnabled, setIsSpringEnabled 
        }) => {
            const [localStart, setLocalStart] = useState(springStart);
            const [localEnd, setLocalEnd] = useState(springEnd);
            const [localAdvanceDays, setLocalAdvanceDays] = useState(springAdvanceDays);
            const [localEnabled, setLocalEnabled] = useState(isSpringEnabled);
            const [errorMsg, setErrorMsg] = useState(""); 

            useEffect(() => {
                if(isOpen) {
                    setLocalStart(springStart);
                    setLocalEnd(springEnd);
                    setLocalAdvanceDays(springAdvanceDays);
                    setLocalEnabled(isSpringEnabled);
                    setErrorMsg(""); 
                }
            }, [isOpen, springStart, springEnd, springAdvanceDays, isSpringEnabled]);

            if (!isOpen) return null;

            const handleSave = () => {
                if (localEnabled && localStart && localEnd && localEnd < localStart) {
                    setErrorMsg("結束日期不能早於開始日期，請修正！");
                    return;
                }
                setSpringStart(localStart);
                setSpringEnd(localEnd);
                setSpringAdvanceDays(Number(localAdvanceDays));
                setIsSpringEnabled(localEnabled);
                onClose();
            };

            const handleClear = () => {
                setLocalStart("");
                setLocalEnd("");
                setLocalAdvanceDays(10);
                setLocalEnabled(true);
                setErrorMsg("");
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 space-y-6 animate-fadeIn">
                        <div className="flex items-center justify-between border-b pb-3">
                            <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                <Settings className="text-teal-600" /> 春節期間提前領藥設定
                            </h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600">✕</button>
                        </div>
                        
                        {/* 開關區域 */}
                        <div className="flex items-center justify-between bg-slate-50 p-3 rounded-lg border border-slate-200">
                            <span className="font-medium text-slate-700">啟用春節提前領藥計算</span>
                            <button 
                                onClick={() => setLocalEnabled(!localEnabled)}
                                className={`w-12 h-6 rounded-full transition-colors relative ${localEnabled ? 'bg-teal-600' : 'bg-slate-300'}`}
                            >
                                <div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${localEnabled ? 'left-7' : 'left-1'}`}></div>
                            </button>
                        </div>

                        <div className={`space-y-4 transition-opacity ${localEnabled ? 'opacity-100' : 'opacity-50 pointer-events-none'}`}>
                            <p className="text-sm text-slate-600 leading-relaxed bg-blue-50 p-3 rounded-lg border border-blue-100">
                                根據健保署規定，若慢箋用藥屆滿日（吃完日期）落在春節期間，可提前領藥。今年度放寬為 <strong>{localAdvanceDays} 天</strong>。
                            </p>
                            <div className="space-y-2">
                                <label className="block text-sm font-medium text-slate-700">提前領藥天數 (預設14天)</label>
                                <div className="flex items-center gap-2">
                                    <input 
                                        type="number" 
                                        value={localAdvanceDays} 
                                        onChange={(e) => setLocalAdvanceDays(e.target.value)} 
                                        className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"
                                        disabled={!localEnabled}
                                    />
                                    <span className="text-slate-500 text-sm whitespace-nowrap">天</span>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-2">
                                    <label className="block text-sm font-medium text-slate-700">春節開始日期</label>
                                    <input 
                                        type="date" 
                                        value={localStart} 
                                        onChange={(e) => setLocalStart(e.target.value)} 
                                        className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"
                                        disabled={!localEnabled}
                                    />
                                </div>
                                <div className="space-y-2">
                                    <label className="block text-sm font-medium text-slate-700">春節結束日期</label>
                                    <input 
                                        type="date" 
                                        value={localEnd} 
                                        onChange={(e) => setLocalEnd(e.target.value)} 
                                        className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"
                                        disabled={!localEnabled}
                                    />
                                </div>
                            </div>
                        </div>
                        
                        <div className="flex items-center justify-between pt-2">
                            <button 
                                onClick={handleClear}
                                className="text-slate-500 hover:text-red-600 hover:bg-slate-50 px-3 py-2 rounded-lg transition-colors flex items-center gap-1 font-medium text-sm"
                            >
                                <Trash2 size={16} /> 清除設定
                            </button>
                            <div className="flex flex-col items-end gap-2">
                                {errorMsg && (
                                    <span className="text-red-600 font-bold text-sm animate-pulse">{errorMsg}</span>
                                )}
                                <button 
                                    onClick={handleSave}
                                    className="bg-teal-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-teal-700 transition-colors shadow-md"
                                >
                                    設定完成
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 說明視窗組件 (Enhanced) ---
        const HelpModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-md transition-all duration-300">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-3xl overflow-hidden transform transition-all animate-fadeIn flex flex-col max-h-[90vh]">
                        {/* Header */}
                        <div className="bg-gradient-to-r from-teal-600 to-teal-500 p-6 flex items-center justify-between shrink-0">
                            <h3 className="text-2xl font-bold text-white flex items-center gap-3">
                                <div className="bg-white/20 p-2 rounded-xl backdrop-blur-sm">
                                    <Info size={24} className="text-white" />
                                </div>
                                程式功能說明與操作指引
                            </h3>
                            <button 
                                onClick={onClose} 
                                className="text-white/80 hover:text-white hover:bg-white/10 p-2 rounded-full transition-colors"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>

                        {/* Content */}
                        <div className="p-6 md:p-8 space-y-8 overflow-y-auto custom-scrollbar flex-1 bg-slate-50">
                            
                            {/* Section 1: Purpose */}
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                                <h4 className="font-bold text-lg text-teal-800 mb-3 flex items-center gap-2 border-b border-slate-100 pb-2">
                                    <span className="text-2xl">💡</span> 設計目的
                                </h4>
                                <p className="text-slate-600 leading-relaxed">
                                    本工具旨在協助慢性病患者與照護者，快速推算連續處方箋的建議領藥日期，並整合健保相關規定（如提前10天領藥、春節放寬機制），避免因錯過領藥時間導致斷藥。
                                </p>
                            </div>

                            {/* Section 2: Operation */}
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                                <h4 className="font-bold text-lg text-teal-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
                                    <span className="text-2xl">🛠️</span> 操作方式
                                </h4>
                                <ul className="space-y-4">
                                    {[
                                        { title: "設定資訊", desc: "請先輸入您的「就診日（第1次領藥日）」、「每次藥量天數（28~30天）」及「總領藥次數」。" },
                                        { title: "查看時程", desc: "右側會自動生成第2、3次的建議領藥區間（起始日至截止日）。" },
                                        { title: "春節設定", desc: "點擊「春節提前領藥設定」可自訂該年度春節區間與提前天數（預設14天），系統會自動判斷是否符合提前資格。" },
                                        { title: "延後領藥", desc: "若您實際去領藥的日期比建議時間晚，請在該次卡片輸入「實際領藥日」，系統會自動順延下一次的日期。" },
                                        { title: "4次領藥", desc: "針對特殊開立（如21天/4次），請選擇「4次」按鈕，系統會自動調整天數限制為22天以內。" }
                                    ].map((item, idx) => (
                                        <li key={idx} className="flex items-start gap-3">
                                            <div className="bg-teal-50 text-teal-700 font-bold text-sm px-2.5 py-1 rounded-md shrink-0 mt-0.5 border border-teal-100">
                                                {item.title}
                                            </div>
                                            <span className="text-slate-600 text-sm md:text-base leading-relaxed">{item.desc}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            {/* Section 3: Logic */}
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                                <h4 className="font-bold text-lg text-teal-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
                                    <span className="text-2xl">🧮</span> 計算邏輯與限制
                                </h4>
                                <ul className="space-y-3 pl-2">
                                    <li className="flex gap-3 text-slate-600 text-sm md:text-base">
                                        <span className="text-teal-500 font-bold">•</span>
                                        <span><strong>一般規則：</strong>建議領藥起始日 = 藥品預計用完日 - 10天。</span>
                                    </li>
                                    <li className="flex gap-3 text-slate-600 text-sm md:text-base">
                                        <span className="text-teal-500 font-bold">•</span>
                                        <span><strong>春節規則：</strong>若藥品用完日落在春節期間，起始日 = 春節開始日 - 設定提前天數。</span>
                                    </li>
                                    <li className="flex gap-3 text-slate-600 text-sm md:text-base">
                                        <span className="text-teal-500 font-bold">•</span>
                                        <span><strong>效期限制：</strong>若計算出的領藥截止日超過處方箋有效期限，系統會自動截斷並提示「受限於效期」。若起始日已過期，則會顯示紅色警示需重新看診。</span>
                                    </li>
                                    <li className="flex gap-3 text-slate-500 text-sm italic bg-slate-50 p-3 rounded-lg border border-slate-200 mt-2">
                                        <span className="text-slate-400 font-bold">ℹ️</span>
                                        <span>本程式僅為輔助工具，實際領藥資格仍以健保卡讀取結果與醫療院所/藥局判定為準。</span>
                                    </li>
                                </ul>
                            </div>

                            {/* Section 4: Export & Calendar */}
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                                <h4 className="font-bold text-lg text-teal-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
                                    <span className="text-2xl">📅</span> 日期匯出與行事曆提醒
                                </h4>
                                <ul className="space-y-4">
                                    <li className="flex items-start gap-3">
                                        <div className="bg-teal-50 text-teal-700 font-bold text-sm px-2.5 py-1 rounded-md shrink-0 mt-0.5 border border-teal-100">
                                            一鍵複製文字
                                        </div>
                                        <span className="text-slate-600 text-sm md:text-base leading-relaxed">
                                            點擊「複製時程表」按鈕，即可將完整的領藥日期資訊複製到剪貼簿，方便直接貼上 Line 或其他通訊軟體分享給家人。
                                        </span>
                                    </li>
                                    <li className="flex items-start gap-3">
                                        <div className="bg-teal-50 text-teal-700 font-bold text-sm px-2.5 py-1 rounded-md shrink-0 mt-0.5 border border-teal-100">
                                            加入行事曆
                                        </div>
                                        <span className="text-slate-600 text-sm md:text-base leading-relaxed">
                                            在建議領藥時程表的每一張卡片右上角，點擊 <Download className="inline w-4 h-4 mx-1 text-slate-500" /> 圖示，即可下載 .ics 檔案。開啟檔案後可直接將領藥提醒加入 Google 日曆或 Apple 行事曆中，避免忘記領藥。
                                        </span>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="p-4 bg-white border-t border-slate-100 flex justify-end shrink-0">
                            <button 
                                onClick={onClose}
                                className="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-700 transition-all shadow-lg hover:shadow-xl active:scale-95"
                            >
                                關閉視窗
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 法規與注意事項組件 ---
        const RegulationsSection = ({ className }) => (
            <section className={`bg-white/80 backdrop-blur-sm rounded-2xl p-6 text-slate-700 space-y-5 text-base leading-relaxed border border-slate-200 shadow-sm ${className}`}>
                <div className="flex items-center gap-2 text-slate-800 font-bold border-b border-slate-300 pb-3 mb-2">
                    <BookOpen size={20} />
                    <h3 className="text-lg">相關法規與注意事項</h3>
                </div>
                <div className="grid grid-cols-1 gap-y-6">
                    <div>
                        <h4 className="font-bold text-slate-800 mb-1 text-base">📅 處方箋有效期限 (全民健康保險醫療辦法 第23條)</h4>
                        <p>慢箋有效期間自醫師開立日起算，至多 <strong>90天</strong>。一般藥品每次給予 <strong>30天</strong> 以下用藥量；但「腹膜透析液」按病情需要，得一次給予 <strong>31天</strong> 以下之用藥量。逾期後處方箋即失效。</p>
                    </div>
                    <div>
                        <h4 className="font-bold text-slate-800 mb-1 text-base">💊 提前領藥規定 (全民健康保險醫療辦法 第24條)</h4>
                        <p>領藥時間為：建議於上次給藥期間屆滿前 <strong>10 天內</strong>，憑原處方箋及健保卡領取下個月藥品。</p>
                    </div>
                    <div>
                        <h4 className="font-bold text-slate-800 mb-1 text-base">✈️ 出國預領藥品 (全民健康保險醫療辦法 第25條)</h4>
                        <p>保險對象如預定出國、返回離島地區或為遠洋漁船船員出海作業，得於領藥時出具切結書及相關證明文件（如機票、船票），<strong>得一次領取該處方箋總用藥量</strong>。</p>
                    </div>
                    <div>
                        <h4 className="font-bold text-slate-800 mb-1 text-base">⚠️ 遺失補發規定</h4>
                        <p>慢箋若遺失或逾期，<strong>醫療機構不得補發</strong>。保險對象需重新掛號就醫，由醫師重新開立新的處方箋。</p>
                    </div>
                </div>
                <div className="bg-white p-4 rounded-lg border border-slate-200 text-sm mt-4">
                    <p className="text-slate-500">※ 以上資訊整理自《全民健康保險醫療辦法》，若有修法或異動，請以衛生福利部中央健康保險署最新公告為準。</p>
                </div>
            </section>
        );

        function App() {
            // ************************************************************
            // 🔧 【站長設定區】春節與預設參數設定
            // 請在此區塊修改數值，即可改變所有使用者進入網站時的預設狀態
            // ************************************************************

            // 1. 預設是否開啟春節功能？ (true: 開啟, false: 關閉)
            //    說明：春節過後可改為 false，明年要用時再改回 true
            const DEFAULT_SPRING_MODE_ENABLED = false;

            // 2. 預設春節開始日期 (格式: YYYY-MM-DD)
            const DEFAULT_SPRING_START_DATE = '2026-02-14';

            // 3. 預設春節結束日期 (格式: YYYY-MM-DD)
            const DEFAULT_SPRING_END_DATE = '2026-02-22';

            // 4. 預設提前領藥天數 (單位: 天)
            //    說明：健保署公告放寬天數，通常為 10 天或 14 天
            const DEFAULT_SPRING_ADVANCE_DAYS = 14;

            // ************************************************************
            //                   設定結束 (下方程式碼請勿更動)
            // ************************************************************

            const getTaiwanToday = () => {
                try {
                    return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' });
                } catch (e) {
                    return new Date().toISOString().slice(0, 10);
                }
            };

            const [startDate, setStartDate] = useState(getTaiwanToday());
            const [daysPerPrescription, setDaysPerPrescription] = useState(28);
            const [totalRefills, setTotalRefills] = useState(3);
            const [results, setResults] = useState([]);
            const [actualPickupDates, setActualPickupDates] = useState({});
            const [expiryDate, setExpiryDate] = useState('');
            const [copySuccess, setCopySuccess] = useState(false);
            
            const [inputErrors, setInputErrors] = useState({});

            // 春節設定狀態 - 使用預設常數
            const [showSpringModal, setShowSpringModal] = useState(false);
            const [springStart, setSpringStart] = useState(DEFAULT_SPRING_START_DATE);
            const [springEnd, setSpringEnd] = useState(DEFAULT_SPRING_END_DATE);
            const [springAdvanceDays, setSpringAdvanceDays] = useState(DEFAULT_SPRING_ADVANCE_DAYS);
            const [isSpringEnabled, setIsSpringEnabled] = useState(DEFAULT_SPRING_MODE_ENABLED);

            // 說明視窗狀態
            const [showHelpModal, setShowHelpModal] = useState(false);

            useEffect(() => {
                setActualPickupDates({});
                setInputErrors({});
            }, [startDate]);

            // 當選擇4次時，若天數超過22天，自動調回21天
            useEffect(() => {
                if (totalRefills === 4 && daysPerPrescription > 22) {
                    setDaysPerPrescription(21);
                }
            }, [totalRefills]);

            const formatDate = (dateString) => {
                if (!dateString) return '';
                try {
                    const d = new Date(dateString);
                    if (isNaN(d.getTime())) return '';
                    const year = d.getUTCFullYear();
                    const month = String(d.getUTCMonth() + 1).padStart(2, '0');
                    const day = String(d.getUTCDate()).padStart(2, '0');
                    return `${year}/${month}/${day}`;
                } catch (e) {
                    return '';
                }
            };

            const getExpiryWarning = (dateString) => {
                if (!dateString) return null;
                try {
                    const d = new Date(dateString);
                    if (isNaN(d.getTime())) return null;
                    const prevDateTimestamp = d.getTime() - 24 * 60 * 60 * 1000;
                    const prevDate = new Date(prevDateTimestamp);
                    return formatDate(prevDate.toISOString().slice(0, 10));
                } catch (e) {
                    return null;
                }
            };

            // 取得「逾...無效」的日期 (YYYY-MM-DD)，即有效期限減1天 (最後有效日)
            const getValidLimitDateStr = (expiryStr) => {
                if (!expiryStr) return null;
                try {
                    const d = new Date(expiryStr);
                    if (isNaN(d.getTime())) return null;
                    // 有效期限日 - 1天 = 最後可領藥日
                    const prevDateTimestamp = d.getTime() - 24 * 60 * 60 * 1000;
                    return new Date(prevDateTimestamp).toISOString().slice(0, 10);
                } catch (e) {
                    return null;
                }
            }

            const isWeekend = (dateString) => {
                if (!dateString) return false;
                try {
                    const day = new Date(dateString).getUTCDay();
                    return day === 0 || day === 6;
                } catch (e) {
                    return false;
                }
            };

            const handleRefillsChange = (count) => {
                setTotalRefills(count);
                if (count === 4) {
                    setDaysPerPrescription(21);
                } else {
                    // 若原本是 4 次切回 2 或 3 次，預設改回 28
                    if (totalRefills === 4) {
                        setDaysPerPrescription(28);
                    }
                }
            };

            const handleActualDateChange = (refillId, newDate, limitDate) => {
                if (!newDate) {
                    setActualPickupDates(prev => ({ ...prev, [refillId]: newDate }));
                    setInputErrors(prev => ({ ...prev, [refillId]: null }));
                    return;
                }

                // 檢查是否超過「有效期限（最後領藥日）」
                const oneDayMs = 24 * 60 * 60 * 1000;
                const startTimestamp = new Date(startDate).getTime();
                const totalDays = daysPerPrescription * totalRefills;
                const expiryTimestamp = startTimestamp + (totalDays * oneDayMs);
                const deadlineTimestamp = expiryTimestamp - oneDayMs;
                const deadlineDateStr = new Date(deadlineTimestamp).toISOString().slice(0, 10);

                if (newDate > deadlineDateStr) {
                    setTimeout(() => {
                        alert(`您輸入的日期 (${formatDate(newDate)}) 已超過處方箋有效期限 (逾 ${formatDate(deadlineDateStr)} 無效)，處方箋可能已失效！`);
                    }, 50);
                    setActualPickupDates(prev => ({ ...prev, [refillId]: '' }));
                    return;
                }

                if (limitDate && newDate <= limitDate) {
                    setInputErrors(prev => ({
                        ...prev,
                        [refillId]: `您輸入的日期 (${formatDate(newDate)}) 未超過建議領藥期限，不需要順延喔！`
                    }));
                    
                    setActualPickupDates(prev => ({ ...prev, [refillId]: '' }));
                    return;
                }

                setInputErrors(prev => ({ ...prev, [refillId]: null }));
                setActualPickupDates(prev => ({ ...prev, [refillId]: newDate }));
            };

            useEffect(() => {
                if (!startDate) return;
                try {
                    const oneDayMs = 24 * 60 * 60 * 1000;
                    const startTimestamp = new Date(startDate).getTime();
                    if (isNaN(startTimestamp)) return;

                    const totalDays = daysPerPrescription * totalRefills;
                    // 有效期限: 開立日 + 總天數
                    const expiryTimestamp = startTimestamp + (totalDays * oneDayMs);
                    const expiryDateStr = new Date(expiryTimestamp).toISOString().slice(0, 10);
                    setExpiryDate(expiryDateStr);
                    
                    // 「逾期無效日」的字串 (處方箋有效期限最後一天)
                    const deadlineTimestamp = expiryTimestamp - oneDayMs;
                    const deadlineDateStr = new Date(deadlineTimestamp).toISOString().slice(0, 10);
                    
                    const validLimitTimestamp = deadlineTimestamp; 

                    const calcResults = [];
                    
                    // --- 第 1 次領藥邏輯 ---
                    const actualDateInput1 = actualPickupDates[1];
                    let effectiveStartTimestamp1 = startTimestamp;
                    
                    if (actualDateInput1) {
                        const actualTs = new Date(actualDateInput1).getTime();
                        if (!isNaN(actualTs)) {
                            effectiveStartTimestamp1 = actualTs;
                        }
                    }
                    
                    const medsEndTimestamp1 = effectiveStartTimestamp1 + (daysPerPrescription * oneDayMs);

                    calcResults.push({
                        id: 1,
                        title: '第 1 次領藥 (就診日)',
                        pickupStart: startDate,
                        pickupEnd: startDate,
                        medsEnd: new Date(medsEndTimestamp1).toISOString().slice(0, 10),
                        canDownload: false,
                        isEditable: true,
                        actualDate: actualDateInput1 || '',
                        isDelayed: !!actualDateInput1,
                        isOverdue: false,
                        isSpringEarly: false,
                        isCapped: false
                    });

                    let currentBaseTimestamp = effectiveStartTimestamp1;

                    // --- 第 2, 3, (4) 次領藥迴圈 ---
                    for (let i = 1; i < totalRefills; i++) {
                        const refillId = i + 1;
                        
                        const idealNextCycleStartTimestamp = currentBaseTimestamp + (daysPerPrescription * oneDayMs);
                        
                        let pickupStartTimestamp = idealNextCycleStartTimestamp - (10 * oneDayMs);
                        const pickupEndTimestamp = idealNextCycleStartTimestamp;
                        
                        const idealMedsEndStr = new Date(idealNextCycleStartTimestamp).toISOString().slice(0, 10);
                        let isSpringEarly = false;

                        if (isSpringEnabled && springStart && springEnd) {
                            if (idealMedsEndStr >= springStart && idealMedsEndStr <= springEnd) {
                                const springStartTs = new Date(springStart).getTime();
                                if (!isNaN(springStartTs)) {
                                    pickupStartTimestamp = springStartTs - (springAdvanceDays * oneDayMs);
                                    isSpringEarly = true;
                                }
                            }
                        }

                        let pickupStartStr = new Date(pickupStartTimestamp).toISOString().slice(0, 10);
                        let pickupEndStr = new Date(pickupEndTimestamp).toISOString().slice(0, 10);

                        const isOverdue = pickupStartTimestamp > deadlineTimestamp;

                        let isCapped = false;
                        if (!isOverdue && pickupEndStr > deadlineDateStr) {
                            pickupEndStr = deadlineDateStr;
                            isCapped = true;
                        }

                        const actualDateInput = actualPickupDates[refillId];
                        let effectiveStartTimestamp = idealNextCycleStartTimestamp;
                        
                        if (actualDateInput) {
                            const actualTs = new Date(actualDateInput).getTime();
                            if (!isNaN(actualTs)) {
                                effectiveStartTimestamp = actualTs;
                            }
                        }

                        const medsEndTimestamp = effectiveStartTimestamp + (daysPerPrescription * oneDayMs);
                        const finalMedsEndStr = new Date(medsEndTimestamp).toISOString().slice(0, 10);

                        calcResults.push({
                            id: refillId,
                            title: `第 ${refillId} 次領藥`,
                            pickupStart: pickupStartStr,
                            pickupEnd: pickupEndStr,
                            medsEnd: finalMedsEndStr,
                            canDownload: !isOverdue,
                            isEditable: true,
                            actualDate: actualDateInput || '',
                            isDelayed: !!actualDateInput,
                            isOverdue: isOverdue,
                            isSpringEarly: isSpringEarly,
                            isCapped: isCapped
                        });
                        
                        currentBaseTimestamp = effectiveStartTimestamp;
                    }
                    setResults(calcResults);
                } catch (e) {
                    console.error("Calc error", e);
                }
            }, [startDate, daysPerPrescription, totalRefills, actualPickupDates, springStart, springEnd, springAdvanceDays, isSpringEnabled]);

            // 計算 input max 日期 (YYYY-MM-DD)
            const getMaxInputDate = () => {
                if(!expiryDate) return "";
                // 最後領藥日 = expiryDate - 1天
                const d = new Date(expiryDate);
                const prevDateTimestamp = d.getTime() - 24 * 60 * 60 * 1000;
                return new Date(prevDateTimestamp).toISOString().slice(0, 10);
            };
            const maxInputDate = getMaxInputDate();

            const downloadICS = (item) => {
                try {
                    const targetDate = item.actualDate || item.pickupStart;
                    if (!targetDate) return;
                    const eventStart = targetDate.replace(/-/g, '');
                    const icsContent = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//MyChronicPrescriptionCalculator//TW\nBEGIN:VEVENT\nUID:${new Date().getTime()}-${item.id}@calculator\nDTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z\nDTSTART;VALUE=DATE:${eventStart}\nDTEND;VALUE=DATE:${eventStart}\nSUMMARY:慢箋領藥 (${item.title})\nDESCRIPTION:領藥區間：${item.pickupStart} 至 ${item.pickupEnd}。\nBEGIN:VALARM\nTRIGGER:-PT15H\nDESCRIPTION:Reminder\nACTION:DISPLAY\nEND:VALARM\nEND:VEVENT\nEND:VCALENDAR`;
                    const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                    const link = document.createElement('a');
                    link.href = window.URL.createObjectURL(blob);
                    link.setAttribute('download', `慢箋領藥_${targetDate}.ics`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (e) {}
            };

            const copyToClipboard = () => {
                try {
                    const lines = [`💊 慢箋領藥時程表`, `就診日: ${formatDate(startDate)}`, `------------------------`];
                    if(isSpringEnabled && springStart && springEnd) {
                        lines.push(`🧧 春節假期: ${formatDate(springStart)}~${formatDate(springEnd)}`);
                    }
                    results.forEach(r => {
                        if (r.id === 1) {
                            if (r.isDelayed) {
                                lines.push(`${r.title}: ${formatDate(r.actualDate)} (已領/延後)`);
                            } else {
                                lines.push(`${r.title}: ${formatDate(r.pickupStart)} (已領)`);
                            }
                        } else {
                            if (r.isOverdue) {
                                lines.push(`${r.title}: ⚠️ 建議領藥時間已超過處方箋效期，需重新看診。`);
                            } else {
                                let note = "";
                                if (r.isSpringEarly) note += "(春節提前)";
                                if (r.isDelayed) note += "(順延)";
                                if (r.isCapped) note += "(受限效期)";
                                
                                lines.push(`${r.title}: ${formatDate(r.pickupStart)} ~ ${formatDate(r.pickupEnd)} ${note}`);
                            }
                        }
                    });
                    lines.push(`------------------------`);
                    const w = getExpiryWarning(expiryDate);
                    if (w) {
                        lines.push(`⚠️ 處方箋有效期限(最後領藥日): 逾 ${w} 無效`);
                    } else {
                        lines.push(`⚠️ 處方箋有效期限: ${formatDate(expiryDate)} 止`);
                    }
                    lines.push(`由「慢箋領藥日期計算機」製作`);
                    
                    const text = lines.join('\n');
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed"; 
                    textArea.style.left = "-9999px";
                    textArea.style.top = "0";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    
                    try {
                        const successful = document.execCommand('copy');
                        if(successful) {
                             setCopySuccess(true);
                             setTimeout(() => setCopySuccess(false), 2000);
                        }
                    } catch (err) {
                        console.error('Unable to copy', err);
                    }
                    document.body.removeChild(textArea);
                } catch (e) {
                    console.error("Copy logic error", e);
                }
            };

            const dayOptions = totalRefills === 4 ? [21, 22] : [28, 29, 30];

            return (
                <div className="min-h-screen text-slate-800 font-sans pb-10">
                    <SpringSettingsModal 
                        isOpen={showSpringModal} 
                        onClose={() => setShowSpringModal(false)}
                        springStart={springStart}
                        setSpringStart={setSpringStart}
                        springEnd={springEnd}
                        setSpringEnd={setSpringEnd}
                        springAdvanceDays={springAdvanceDays}
                        setSpringAdvanceDays={setSpringAdvanceDays}
                        isSpringEnabled={isSpringEnabled}
                        setIsSpringEnabled={setIsSpringEnabled}
                    />
                    
                    <HelpModal 
                        isOpen={showHelpModal}
                        onClose={() => setShowHelpModal(false)}
                    />

                    <header className="bg-teal-600 text-white p-4 shadow-lg sticky top-0 z-20">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-white/20 p-2 rounded-lg">
                                    <Calculator size={28} />
                                </div>
                                <h1 className="text-2xl font-bold tracking-wide">慢箋領藥日期計算機</h1>
                                <button 
                                    onClick={() => setShowHelpModal(true)}
                                    className="ml-2 bg-teal-700 hover:bg-teal-800 text-teal-100 p-2 rounded-full transition-colors flex items-center gap-1 text-sm px-3"
                                >
                                    <Info size={18} /> 說明
                                </button>
                            </div>
                            <div className="text-sm text-teal-50 flex flex-col md:items-end gap-1 font-mono opacity-90">
                                <p>製作者 : 蝦仁藥師</p>
                                <p>更新日期 : 2026/01/20</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-4 lg:p-8 space-y-8">
                        
                        <div className="flex flex-col lg:flex-row gap-8 items-start">
                            {/* 左側欄位 (Sticky) */}
                            <div className="w-full lg:w-1/3 space-y-6 lg:sticky lg:top-24 lg:max-h-[calc(100vh-8rem)] lg:overflow-y-auto custom-scrollbar lg:pr-2">
                                <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-6">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-3 gap-2">
                                        <div className="flex items-center gap-2 text-teal-700 font-semibold">
                                            <Calendar className="w-6 h-6" />
                                            <h2 className="text-xl">設定處方箋資訊</h2>
                                        </div>
                                        <button 
                                            onClick={() => setShowSpringModal(true)}
                                            className="text-slate-500 hover:text-teal-600 hover:bg-slate-50 transition-all flex items-center gap-1 text-xs sm:text-sm px-2 py-1.5 rounded border border-slate-200 bg-white"
                                            title="設定春節假期"
                                        >
                                            <Settings size={14} /> 春節提前領藥設定
                                        </button>
                                    </div>

                                    {isSpringEnabled && springStart && springEnd && (
                                        <div className="bg-red-50 text-red-700 text-sm px-3 py-2 rounded-lg flex items-center gap-2 border border-red-100">
                                            <PartyPopper size={16} />
                                            <span>春節假期：{formatDate(springStart)} ~ {formatDate(springEnd)} (提前{springAdvanceDays}天)</span>
                                        </div>
                                    )}

                                    <div className="space-y-5">
                                        <div className="space-y-2">
                                            <label className="block text-base font-medium text-slate-700">就診日期 (第 1 次領藥)</label>
                                            <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all" />
                                        </div>

                                        <div className="space-y-2">
                                            <label className="block text-base font-medium text-slate-700">
                                                每次藥量天數 {totalRefills === 4 && <span className="text-xs text-red-500">(限22天內)</span>}
                                            </label>
                                            <div className="flex gap-2">
                                                {dayOptions.map(days => (
                                                    <button
                                                        key={days}
                                                        onClick={() => setDaysPerPrescription(days)}
                                                        className={`flex-1 py-3 px-2 rounded-xl text-base font-medium transition-colors ${
                                                            daysPerPrescription === days
                                                                ? 'bg-teal-600 text-white shadow-md'
                                                                : 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                                                        }`}
                                                    >
                                                        {days} 天
                                                    </button>
                                                ))}
                                                <input 
                                                    type="number" 
                                                    value={daysPerPrescription} 
                                                    onChange={(e) => {
                                                        const val = Number(e.target.value);
                                                        if (totalRefills === 4 && val > 22) {
                                                            setDaysPerPrescription(22);
                                                        } else {
                                                            setDaysPerPrescription(val);
                                                        }
                                                    }} 
                                                    className="w-20 p-2 text-center text-lg bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none" 
                                                    placeholder="自訂" 
                                                />
                                            </div>
                                        </div>

                                        <div className="space-y-2">
                                            <label className="block text-base font-medium text-slate-700">處方箋總領藥次數</label>
                                            <div className="flex gap-2">
                                                {[2, 3, 4].map(count => (
                                                    <button 
                                                        key={count} 
                                                        onClick={() => handleRefillsChange(count)} 
                                                        className={`flex-1 py-3 px-4 rounded-xl text-base font-medium transition-colors ${totalRefills === count ? 'bg-teal-600 text-white shadow-md' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}
                                                    >
                                                        {count} 次
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="bg-orange-50 border border-orange-100 rounded-xl p-4 flex flex-col gap-2">
                                            <div className="flex items-center gap-3">
                                                <div className="bg-orange-100 p-2 rounded-full text-orange-600"><FileWarning size={20} /></div>
                                                <p className="text-sm font-bold text-orange-500 uppercase tracking-wide">處方箋有效期限(最後領藥日)</p>
                                            </div>
                                            
                                            {expiryDate && getExpiryWarning(expiryDate) ? (
                                                <p className="text-3xl font-bold text-orange-800 pl-2">
                                                    逾 {getExpiryWarning(expiryDate)} 無效
                                                </p>
                                            ) : (
                                                <p className="text-3xl font-bold text-orange-800 pl-2">
                                                    {formatDate(expiryDate)} 止
                                                </p>
                                            )}
                                            <div className="mt-2 text-right">
                                                <span className="text-xs text-orange-600 bg-white px-2 py-1 rounded border border-orange-200 font-medium">總計 {daysPerPrescription * totalRefills} 天</span>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                <button onClick={copyToClipboard} className={`w-full flex items-center justify-center gap-2 py-4 px-6 rounded-xl font-bold text-lg shadow-sm transition-all ${copySuccess ? 'bg-green-600 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 hover:text-teal-700'}`}>
                                    {copySuccess ? <Check size={24} /> : <Copy size={24} />} {copySuccess ? '已複製文字' : '複製時程表'}
                                </button>

                                {/* 電腦版顯示法規於左側 */}
                                <RegulationsSection className="hidden lg:block" />
                            </div>

                            {/* 右側欄位：結果顯示 */}
                            <div className="w-full lg:w-2/3 space-y-6">
                                <div className="flex items-center gap-2 text-slate-700 font-semibold px-2">
                                    <Clock className="w-6 h-6" />
                                    <h2 className="text-xl">建議領藥時程表</h2>
                                </div>
                                
                                <div className="space-y-5">
                                    {results.map((item, index) => {
                                        const startIsWeekend = isWeekend(item.pickupStart);
                                        const isPast = item.pickupStart < getTaiwanToday();
                                        const isToday = item.pickupStart === getTaiwanToday();
                                        const showActualInput = item.isEditable && item.id < totalRefills;

                                        return (
                                            <div key={item.id} className={`relative overflow-hidden rounded-2xl border transition-all ${
                                                index === 0 && !item.isDelayed ? 'bg-slate-50/80 border-slate-200' : 
                                                item.isOverdue ? 'bg-red-50 border-red-200' : 
                                                item.isCapped ? 'bg-orange-50 border-orange-200' :
                                                item.isSpringEarly ? 'bg-red-50 border-red-200' :
                                                'bg-white border-slate-200 shadow-sm'
                                            }`}>
                                                <div className={`absolute left-0 top-0 bottom-0 w-2 ${
                                                    index === 0 && !item.isDelayed ? 'bg-slate-400' : 
                                                    item.isOverdue ? 'bg-red-500' : 
                                                    item.isCapped ? 'bg-orange-500' :
                                                    item.isSpringEarly ? 'bg-red-500' :
                                                    'bg-teal-500'
                                                }`}></div>
                                                
                                                <div className="p-6 pl-8">
                                                    <div className="flex justify-between items-start mb-5">
                                                        <div className="flex items-center gap-3">
                                                            <span className={`px-3 py-1.5 rounded-lg text-sm font-bold ${
                                                                index === 0 && !item.isDelayed ? 'bg-slate-200 text-slate-700' : 
                                                                item.isOverdue ? 'bg-red-100 text-red-700' : 
                                                                item.isCapped ? 'bg-orange-100 text-orange-700' :
                                                                item.isSpringEarly ? 'bg-red-100 text-red-700' :
                                                                'bg-teal-100 text-teal-900'
                                                            }`}>
                                                                {item.title}
                                                            </span>
                                                            {isToday && <span className="text-sm font-bold text-red-500 animate-pulse">今天！</span>}
                                                            
                                                            {item.isSpringEarly && (
                                                                <span className="text-sm font-medium text-red-700 bg-red-100 px-2 py-1 rounded border border-red-200 flex items-center gap-1">
                                                                    <PartyPopper size={14} /> 春節提前
                                                                </span>
                                                            )}

                                                            {item.isDelayed && !item.isOverdue && !item.isSpringEarly && !item.isCapped && (
                                                                <span className="text-sm font-medium text-amber-700 bg-amber-50 px-2 py-1 rounded border border-amber-100 flex items-center gap-1">
                                                                    <RotateCcw size={14} /> 下次已順延
                                                                </span>
                                                            )}
                                                        </div>
                                                        {item.canDownload && (<button onClick={() => downloadICS(item)} className="text-slate-400 hover:text-teal-600 transition-colors p-1" title="加入行事曆"><Download size={24} /></button>)}
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-y-8 gap-x-10">
                                                        <div className="space-y-3">
                                                            <div className="space-y-2">
                                                                <p className="text-sm font-bold text-slate-500 uppercase tracking-wider">建議領藥期間</p>
                                                                <div className="flex flex-col sm:flex-row sm:items-baseline sm:gap-3 flex-wrap">
                                                                    <span className={`text-3xl font-bold font-mono ${isPast ? 'text-slate-500' : item.isOverdue ? 'text-red-600 line-through' : item.isSpringEarly ? 'text-red-700' : item.isCapped ? 'text-orange-700' : 'text-teal-700'}`}>{formatDate(item.pickupStart)}</span>
                                                                    {index !== 0 && !item.isOverdue && (
                                                                        <div className="flex items-baseline gap-3">
                                                                            <span className="text-xl text-slate-400">至</span>
                                                                            <span className={`text-3xl font-bold font-mono ${item.isSpringEarly ? 'text-red-700' : item.isCapped ? 'text-orange-700' : 'text-teal-700'}`}>
                                                                                {formatDate(item.pickupEnd)}
                                                                            </span>
                                                                            {item.isCapped && <span className="text-xs font-bold text-orange-600 bg-orange-100 px-1.5 py-0.5 rounded">(受限於效期)</span>}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                                {item.isOverdue ? (
                                                                    <p className="text-sm text-red-700 font-bold flex items-center gap-1.5 mt-2 bg-red-100 p-2 rounded">
                                                                        <Ban size={16} /> 建議領藥區間已超過處方箋效期，需重新看診開立處方。
                                                                    </p>
                                                                ) : item.isCapped ? (
                                                                    <p className="text-sm text-orange-700 font-medium flex items-center gap-1.5 bg-orange-50 p-2 rounded border border-orange-100">
                                                                        <AlertTriangle size={16} /> 注意：領藥截止日已受限於處方箋效期，請務必於期限前領取。
                                                                    </p>
                                                                ) : item.isSpringEarly ? (
                                                                    <p className="text-sm text-red-700 font-medium flex items-center gap-1.5 bg-red-50 p-2 rounded border border-red-100">
                                                                        <PartyPopper size={16} /> 因應春節假期 ({formatDate(springStart)}~{formatDate(springEnd)})，可提前 {springAdvanceDays} 天領藥。
                                                                    </p>
                                                                ) : (
                                                                    startIsWeekend && (<p className="text-sm text-red-600 font-medium flex items-center gap-1.5"><AlertCircle size={16} /> 週末或國定假日請確認藥局有營業</p>)
                                                                )}
                                                            </div>

                                                            {showActualInput && !item.isOverdue && (
                                                                <div className="mt-5 pt-4 border-t border-slate-100">
                                                                    <label className="flex items-center gap-2 text-sm font-bold text-indigo-700 mb-2 cursor-pointer group"><Edit3 size={16} /> 晚領了嗎？輸入實際領藥日：</label>
                                                                    <div className="flex flex-col gap-2">
                                                                        <div className="flex items-center gap-2">
                                                                            <input 
                                                                                type="date" 
                                                                                value={item.actualDate} 
                                                                                max={maxInputDate} 
                                                                                onChange={(e) => handleActualDateChange(item.id, e.target.value, item.pickupEnd)} 
                                                                                className="text-base p-2 bg-indigo-50 border border-indigo-200 rounded-lg text-indigo-900 focus:ring-2 focus:ring-indigo-300 outline-none w-full sm:w-auto" 
                                                                            />
                                                                            {item.actualDate && (<button onClick={() => handleActualDateChange(item.id, '')} className="text-sm text-slate-500 hover:text-red-600 underline">重置</button>)}
                                                                        </div>
                                                                        {inputErrors[item.id] && (
                                                                            <p className="text-sm text-red-500 flex items-center gap-1 animate-fadeIn">
                                                                                <AlertCircle size={14} /> {inputErrors[item.id]}
                                                                            </p>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            )}
                                                            {item.isDelayed && (<div className="hidden block text-sm text-slate-500 mt-1">實際領藥日：{formatDate(item.actualDate)}</div>)}
                                                        </div>

                                                        <div className="space-y-3 relative md:pl-8 md:border-l md:border-slate-100">
                                                            <div>
                                                                <p className="text-sm font-bold text-slate-500 uppercase tracking-wider">藥品預計用完日</p>
                                                                <div className="flex items-center gap-2 mt-2">
                                                                    <Pill className={`w-5 h-5 ${item.isOverdue ? 'text-red-300' : 'text-slate-400'}`} />
                                                                    <span className={`text-3xl font-bold font-mono ${item.isOverdue ? 'text-red-400 line-through opacity-60' : 'text-slate-700'}`}>{formatDate(item.medsEnd)}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* 手機版顯示法規於底部 (電腦版隱藏) */}
                        <RegulationsSection className="block lg:hidden mt-8" />

                        <footer className="text-center text-slate-500 text-sm py-6 leading-relaxed">
                            <p>此計算結果僅供參考，實際領藥日期請以處方箋或藥師說明為準。</p>
                        </footer>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
