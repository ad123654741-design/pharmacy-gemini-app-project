                </div>
                
                {/* 卡片分頁載入按鈕 */}
                {activeBag.items.filter(item => activeCompartment === '全部' || (item.compartment || '主空間') === activeCompartment).length > visibleCount && (
                     <div className="flex justify-center mt-4">
                         <button onClick={() => setVisibleCount(v => v + 20)} className="px-4 py-2 bg-slate-800 border border-slate-600 rounded-lg text-slate-300 font-bold hover:bg-slate-700 transition">
                             載入更多...
                         </button>
                     </div>
                )}

                {activeBag.items.length === 0 && authRole !== 'admin' && (
                    <div className="flex flex-col items-center justify-center py-20 text-slate-600 w-full bg-slate-900 rounded-lg border border-slate-800">
                      <Icons.Backpack />
                      <p className="mt-2 text-sm">此位置尚無物資，請切換至「管理設定」以新增</p>
                    </div>
                )}
              </div>
            )}
          </div>

          {/* === 各式 Modal 元件 === */}
          <SystemModal config={modalConfig} onClose={() => setModalConfig(null)} />
          
          {/* 郵件通知設定 Modal */}
          {showMailModal && (
             <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
               <div className="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden flex flex-col">
                  <div className="px-5 py-4 bg-slate-100 border-b border-slate-200 flex justify-between items-center">
                    <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2"><Icons.Mail /> 郵件通知設定</h3>
                    <button onClick={() => setShowMailModal(false)} className="text-gray-400 hover:text-gray-600"><Icons.XCircle /></button>
                  </div>
                  <div className="p-6 space-y-4 text-gray-800">
                     <p className="text-sm text-gray-500"><span className="text-rose-600 font-bold">注意：</span>此設定僅供手動測試使用。若要設定<span className="font-bold">每日自動檢查</span>，請務必在 Google Apps Script 程式碼中設定觸發條件。</p>
                     <div><label className="text-xs font-bold text-gray-500 uppercase block mb-1">收件人 Email</label><input type="email" value={mailConfig.email} onChange={e => setMailConfig({...mailConfig, email: e.target.value})} placeholder="example@hospital.org.tw" className="w-full p-2.5 border border-gray-300 rounded text-gray-900 font-bold focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                     <div><label className="text-xs font-bold text-gray-500 uppercase block mb-1">Google Script 發信程式 URL</label><textarea value={mailConfig.apiUrl} onChange={e => setMailConfig({...mailConfig, apiUrl: e.target.value})} placeholder="請貼上您部署的 Google Apps Script 網址 (https://script.google.com/...)" className="w-full p-2.5 border border-gray-300 rounded text-xs font-mono text-gray-600 h-20 focus:ring-2 focus:ring-blue-500 outline-none resize-none" /></div>
                     <div className="flex gap-2 pt-2">
                       <button onClick={() => sendMail('test')} disabled={isMailTesting || !mailConfig.email || !mailConfig.apiUrl} className={`flex-1 py-2 rounded-lg font-bold border flex items-center justify-center gap-2 ${isMailTesting ? 'bg-gray-100 text-gray-400' : 'border-slate-300 text-slate-700 hover:bg-slate-50'}`}>{isMailTesting ? '發送中...' : <><Icons.Send /> 測試發信</>}</button>
                       <button onClick={saveMailConfig} className="flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 flex items-center justify-center gap-2"><Icons.Save /> 儲存設定</button>
                     </div>
                     <hr className="border-gray-200" />
                     <button onClick={checkAndSendAlert} className="w-full py-3 bg-rose-600 text-white rounded-lg font-bold hover:bg-rose-700 flex items-center justify-center gap-2 shadow-sm"><Icons.AlertTriangle /> 立即檢查並發送異常報告</button>
                  </div>
               </div>
             </div>
          )}

          {/* 通行碼 Modal */}
          {showPasscodeModal && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-sm rounded-xl shadow-2xl overflow-hidden p-6 text-center">
                <div className="mx-auto w-12 h-12 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mb-4"><Icons.Lock /></div>
                <h3 className="text-lg font-bold text-gray-800 mb-2">管理員登入</h3>
                <p className="text-sm text-gray-500 mb-4">請輸入通行碼以取得系統修改權限</p>
                <input type="password" pattern="[0-9]*" inputMode="numeric" autoFocus className="w-full p-3 border border-gray-300 rounded-lg text-center text-2xl font-bold tracking-widest mb-4 focus:ring-2 focus:ring-blue-500 outline-none" value={passcodeInput} onChange={(e) => setPasscodeInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && verifyPasscode()}/>
                <div className="flex gap-2"><button onClick={() => setShowPasscodeModal(false)} className="flex-1 py-2 border border-gray-300 rounded-lg font-bold text-gray-600 hover:bg-gray-100">取消</button><button onClick={verifyPasscode} className="flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">確認</button></div>
              </div>
            </div>
          )}
          
          {/* 位置(防災包)選單 Modal */}
          {bagMenuOpen && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-sm rounded-xl shadow-xl overflow-hidden">
                <div className="px-4 py-3 bg-slate-100 border-b border-slate-200 flex justify-between items-center">
                  <h3 className="font-bold text-gray-800 flex items-center gap-2"><Icons.Settings /> 儲藏位置設定</h3>
                  <button onClick={() => setBagMenuOpen(false)} className="text-gray-400 hover:text-gray-600"><Icons.XCircle /></button>
                </div>
                {isDeleteConfirming ? (
                  <div className="p-6 text-center space-y-4">
                    <div className="mx-auto w-12 h-12 bg-rose-100 rounded-full flex items-center justify-center text-rose-600"><Icons.AlertTriangle className="w-6 h-6" /></div>
                    <div><h4 className="text-lg font-bold text-gray-900">確定刪除此位置？</h4><p className="text-sm text-gray-500 mt-1">「{activeBag.name}」將被永久刪除，且無法復原。</p></div>
                    <div className="flex gap-3 pt-2"><button onClick={() => setIsDeleteConfirming(false)} className="flex-1 py-2 border border-gray-300 text-gray-700 rounded-lg font-bold hover:bg-gray-100">取消</button><button onClick={executeDeleteBag} className="flex-1 py-2 bg-rose-600 text-white rounded-lg font-bold hover:bg-rose-700">確認刪除</button></div>
                  </div>
                ) : (
                  <div className="p-4 space-y-4 text-gray-800">
                    <div><label className="text-xs font-bold text-gray-500 uppercase block mb-1">位置名稱 (如: 隨身防災包、車上備用)</label><input type="text" value={bagEditForm.name} onChange={e => setBagEditForm({...bagEditForm, name: e.target.value})} className="w-full p-2 border rounded text-gray-900 font-bold focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                    <hr className="border-gray-100"/>
                    <div className="space-y-2">
                      <button onClick={renameActiveBag} className="w-full py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 flex items-center justify-center gap-2"><Icons.Save /> 儲存名稱</button>
                      <button onClick={duplicateBagStructure} className="w-full py-2 bg-emerald-600 text-white rounded font-bold hover:bg-emerald-700 flex items-center justify-center gap-2"><Icons.Copy /> 複製結構</button>
                      <button onClick={() => setIsDeleteConfirming(true)} disabled={bags.length <= 1} className={`w-full py-2 border rounded font-bold flex items-center justify-center gap-2 ${bags.length <= 1 ? 'border-gray-200 text-gray-300 cursor-not-allowed' : 'border-rose-200 text-rose-600 hover:bg-rose-50'}`}><Icons.Trash2 /> 刪除</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* 物資編輯 Modal */}
          {selectedItem && editForm && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-lg rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="px-5 py-4 bg-gray-100 border-b border-gray-200 flex justify-between items-center">
                   <h3 className="font-bold text-xl text-gray-800 flex items-center gap-2">{editForm.name || '未命名'}{editForm.isCritical && <span className="text-xs bg-rose-100 text-rose-600 px-2 py-0.5 rounded-full border border-rose-200">重要物資</span>}</h3>
                   <button onClick={() => setSelectedItem(null)} className="p-1.5 hover:bg-gray-200 rounded-full text-gray-500"><Icons.XCircle /></button>
                </div>
                <div className="p-6 overflow-y-auto bg-gray-50 space-y-6 flex-1 text-gray-800">
                  {authRole === 'admin' && ( 
                    <div className="bg-white p-4 rounded-lg border border-gray-200 shadow-sm space-y-4"> 
                        <div className="flex justify-between items-center"><label className="text-xs font-bold text-gray-500 uppercase">基本設定</label></div> 
                        <div className="flex flex-col sm:flex-row gap-4"> 
                            <div className="flex-1"> 
                                <label className="text-xs font-bold text-gray-500 uppercase block mb-1">物資名稱</label> 
                                <AutoCompleteInput placeholder="輸入或選擇物資" value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} options={supplyList} /> 
                            </div> 
                            <div className="flex-1"> 
                                <label className="text-xs font-bold text-gray-500 uppercase block mb-1">存放位置/口袋</label> 
                                <AutoCompleteInput placeholder="如: 主口袋、外側" value={editForm.compartment ?? ''} onChange={e => setEditForm({...editForm, compartment: e.target.value})} options={existingCompartments} /> 
                            </div> 
                            <div className="w-full sm:w-24"> 
                                <label className="text-xs font-bold text-gray-500 uppercase block mb-1">應備數量</label> 
                                <input type="number" placeholder="1" value={editForm.requiredQty || 0} onChange={e => setEditForm({...editForm, requiredQty: parseInt(e.target.value) || 0})} className="w-full p-2.5 border border-gray-300 rounded text-gray-900 font-bold focus:ring-2 focus:ring-blue-500 outline-none text-center" /> 
                            </div> 
                        </div> 
                        <label className="flex items-center gap-2 cursor-pointer select-none mt-2"> 
                            <input type="checkbox" checked={editForm.isCritical} onChange={e => setEditForm({...editForm, isCritical: e.target.checked})} className="w-4 h-4 text-rose-600 rounded focus:ring-rose-500" /> 
                            <span className="text-sm font-medium text-gray-700">標記為重要維生物資 (Critical)</span> 
                        </label> 
                    </div> 
                  )}
                  
                  <div className="space-y-3">
                    <div className="flex justify-between items-end">
                      <label className="text-sm font-bold text-gray-700 flex items-center gap-2"><Icons.List /> 庫存效期清單</label>
                      <button onClick={addBatch} className="text-xs bg-blue-600 text-white px-3 py-1.5 rounded-full font-bold hover:bg-blue-700 flex items-center gap-1 shadow-sm transition-colors"><Icons.PlusCircle /> 新增庫存</button>
                    </div>
                    {(!editForm.batches || editForm.batches.length === 0) ? (
                      <div className="text-center py-8 border-2 border-dashed border-gray-300 rounded-lg text-gray-400 text-sm bg-white"><Icons.Calendar /> 點擊上方按鈕新增第一筆庫存</div>
                    ) : (
                      editForm.batches.map((b) => {
                        const s = getStatus(b.expiry, b.isNoExpiry);
                        return (
                          <div key={b.id} className={`group relative flex flex-wrap md:flex-nowrap items-center gap-3 p-3 rounded-lg border-2 shadow-sm transition-colors bg-white ${s.border}`}>
                            <div className="flex flex-col gap-1">
                                <div className={`flex-none ${b.isNoExpiry ? 'opacity-30 pointer-events-none' : ''}`}>
                                  <label className="text-[10px] font-bold text-gray-400 block mb-2 uppercase">效期 (Year-Month-Day)</label>
                                  <SmartExpiryInput value={b.expiry} onChange={val => updateBatch(b.id, 'expiry', val)} />
                                </div>
                                <label className="flex items-center gap-1 cursor-pointer mt-1 text-gray-600 w-max">
                                  <input type="checkbox" checked={b.isNoExpiry || false} onChange={e => updateBatch(b.id, 'isNoExpiry', e.target.checked)} className="w-3.5 h-3.5 rounded" />
                                  <span className="text-[11px] font-bold">沒有期限限制</span>
                                </label>
                            </div>
                            
                            <div className="w-20 flex-none ml-auto md:ml-0 mt-auto">
                               <label className="text-[10px] font-bold text-gray-400 block mb-2 uppercase">數量</label>
                               <input type="number" value={b.qty} onChange={e => updateBatch(b.id, 'qty', e.target.value)} className="w-full h-9 text-center bg-gray-50 border border-gray-300 rounded font-bold text-gray-800 focus:ring-2 focus:ring-blue-500 outline-none" />
                            </div>
                            <div className="mt-auto">
                              <div className={`px-2 py-1 rounded-full text-[10px] font-bold border-2 tracking-wide ${s.bg} ${s.text} ${s.border} bg-opacity-100 shadow-sm justify-center min-w-[3rem] text-center`}>{s.label}</div>
                            </div>
                            <div className="mt-auto pl-2 flex items-center gap-1">
                                <button onClick={() => handleCopyBatch(b)} className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-colors" title="複製此效期設定"><Icons.Copy /></button>
                                <button onClick={() => toggleBatchMute(b.id)} className={`p-2 rounded-full transition-colors ${b.ignoreAlert ? 'text-slate-400 bg-slate-100' : 'text-blue-400 hover:bg-blue-50'}`} title={b.ignoreAlert ? "開啟通知" : "關閉通知"}>
                                    {b.ignoreAlert ? <Icons.BellOff /> : <Icons.Bell />}
                                </button>
                                <button onClick={() => removeBatch(b.id)} className="p-2 text-gray-400 hover:text-rose-600 hover:bg-rose-50 rounded-full transition-colors" title="刪除此筆"><Icons.Trash2 /></button>
                            </div>
                          </div>
                        )
                      })
                    )}
                  </div>
                </div>
                <div className="p-5 bg-white border-t border-gray-200 flex gap-3">
                  {authRole === 'admin' && <button onClick={deleteCurrentItem} className="px-5 py-2.5 border border-rose-200 text-rose-600 rounded-lg font-bold hover:bg-rose-50 transition-colors"><Icons.Trash2 /></button>}
                  <button onClick={saveForm} className="flex-1 py-2.5 bg-slate-900 text-white font-bold rounded-lg shadow-lg hover:bg-slate-800 flex justify-center items-center gap-2 transition-transform active:scale-[0.98]"><Icons.Save /> {authRole === 'admin' ? '儲存物資設定' : '確認更新'}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
