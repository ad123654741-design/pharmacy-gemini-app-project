<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片轉ICO轉換器 (多重解析度)</title>
    <!-- 載入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 使用 Inter 字體 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7fafc;
        }
        /* 隱藏用於繪圖的 Canvas */
        .hidden-canvas {
            position: absolute;
            left: -9999px;
            top: -9999px;
            visibility: hidden;
        }
        /* 平滑顯示動畫 */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 sm:p-8 min-h-screen flex items-center justify-center transition-colors duration-500">

    <div class="w-full max-w-2xl bg-white shadow-2xl rounded-2xl p-6 sm:p-10 border border-gray-100 transition-all duration-500">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">
            高畫質圖片轉 <span class="text-indigo-600">ICO</span> 工具
        </h1>
        <p class="text-center text-gray-600 mb-8">請選擇 PNG, JPG 或 SVG 圖片。工具會自動產生多重解析度的 `.ico` 檔案。</p>

        <!-- 檔案輸入區域 -->
        <div class="mb-8" id="drop-zone-container">
            <label for="image-input" class="block text-lg font-medium text-gray-700 mb-2">
                選擇圖片檔案 (PNG, JPG, SVG)
            </label>
            <div id="drop-zone" class="border-2 border-dashed border-gray-200 hover:border-indigo-400 rounded-2xl transition-all duration-300 p-6 bg-gray-50/50 hover:bg-indigo-50/30 group">
                <input type="file" id="image-input" accept="image/png, image/jpeg, image/svg+xml" class="block w-full text-sm text-gray-500
                    file:mr-4 file:py-2.5 file:px-5 file:transition-all file:duration-300
                    file:rounded-full file:border-0
                    file:text-sm file:font-semibold file:shadow-sm hover:file:shadow
                    file:bg-indigo-100 file:text-indigo-700
                    hover:file:bg-indigo-200 cursor-pointer"
                    onchange="handleImageSelection()">
                <p class="text-sm text-gray-400 mt-3 font-medium transition-colors group-hover:text-indigo-500">或支援直接拖曳圖片至此區域 (Drag & Drop)</p>
            </div>
        </div>

        <!-- 非正方形警告 (預設隱藏) -->
        <div id="aspect-warning" class="hidden mb-6 p-4 bg-yellow-50 rounded-xl border border-yellow-200 flex items-center shadow-sm">
            <svg class="w-5 h-5 text-yellow-600 mr-3 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
            <p class="text-sm text-yellow-700 font-medium">提醒您：上傳的圖片非正方形，轉換後可能會產生變形</p>
        </div>

        <!-- 預覽與資訊 -->
        <div id="preview-area" class="hidden flex flex-col items-center justify-center p-6 bg-gray-50/80 border border-dashed border-gray-300 rounded-2xl mb-8 shadow-sm">
            <h2 class="text-xl font-semibold text-gray-700 mb-4">預覽圖</h2>
            <div class="flex space-x-6 mb-4">
                <div class="flex flex-col items-center group">
                    <img id="img-preview-16" class="w-8 h-8 rounded-lg shadow-sm bg-white border border-gray-200 p-1 transition-transform duration-300 group-hover:scale-110 group-hover:shadow-md" alt="16x16 預覽" title="16x16 Favicon">
                    <span class="text-xs text-gray-500 mt-2 font-medium">16x16</span>
                </div>
                <div class="flex flex-col items-center group">
                    <img id="img-preview-32" class="w-12 h-12 rounded-lg shadow-sm bg-white border border-gray-200 p-1 transition-transform duration-300 group-hover:scale-110 group-hover:shadow-md" alt="32x32 預覽" title="32x32 任務欄圖示">
                    <span class="text-xs text-gray-500 mt-2 font-medium">32x32</span>
                </div>
                <div class="flex flex-col items-center group">
                    <img id="img-preview-48" class="w-16 h-16 rounded-xl shadow-sm bg-white border border-gray-200 p-1 transition-transform duration-300 group-hover:scale-110 group-hover:shadow-md" alt="48x48 預覽" title="48x48 桌面圖示">
                    <span class="text-xs text-gray-500 mt-2 font-medium">48x48</span>
                </div>
            </div>
            <p id="file-info" class="text-sm text-gray-600 font-medium bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100"></p>
        </div>

        <!-- 自訂選項區域 -->
        <div class="mb-8 bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-sm transition-all duration-300 hover:shadow-md">
            <div class="mb-5">
                <label class="block text-base font-semibold text-gray-700 mb-3">選擇包含的解析度 (多選)</label>
                <div class="flex flex-wrap gap-4" id="size-checkboxes">
                    <label class="inline-flex items-center"><input type="checkbox" value="16" checked class="rounded text-indigo-600 form-checkbox h-5 w-5 transition-colors duration-200"><span class="ml-2 text-sm text-gray-700">16x16</span></label>
                    <label class="inline-flex items-center"><input type="checkbox" value="32" checked class="rounded text-indigo-600 form-checkbox h-5 w-5 transition-colors duration-200"><span class="ml-2 text-sm text-gray-700">32x32</span></label>
                    <label class="inline-flex items-center"><input type="checkbox" value="48" checked class="rounded text-indigo-600 form-checkbox h-5 w-5 transition-colors duration-200"><span class="ml-2 text-sm text-gray-700">48x48</span></label>
                    <label class="inline-flex items-center"><input type="checkbox" value="64" class="rounded text-indigo-600 form-checkbox h-5 w-5 transition-colors duration-200"><span class="ml-2 text-sm text-gray-700">64x64</span></label>
                    <label class="inline-flex items-center"><input type="checkbox" value="128" class="rounded text-indigo-600 form-checkbox h-5 w-5 transition-colors duration-200"><span class="ml-2 text-sm text-gray-700">128x128</span></label>
                    <label class="inline-flex items-center"><input type="checkbox" value="256" class="rounded text-indigo-600 form-checkbox h-5 w-5 transition-colors duration-200"><span class="ml-2 text-sm text-gray-700">256x256</span></label>
                </div>
                <p class="text-xs text-gray-500 mt-2">提示：勾選越多尺寸，生成的 ICO 檔案會越大，但能提供更完美的跨設備體驗。</p>
            </div>
            <div>
                <label for="filename-input" class="block text-base font-semibold text-gray-700 mb-2">自訂匯出檔名</label>
                <div class="flex items-center">
                    <input type="text" id="filename-input" value="favicon" class="flex-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-3 border transition-shadow duration-300" placeholder="輸入檔名">
                    <span class="ml-3 text-gray-600 font-medium">.ico</span>
                </div>
            </div>
        </div>

        <!-- 轉換按鈕與結果區域 -->
        <div class="flex flex-col space-y-4">
            <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4">
                <button id="convert-button" onclick="startConversion()" disabled
                    class="flex-1 py-3 px-6 bg-indigo-500 text-white font-semibold rounded-xl shadow-md hover:bg-indigo-600 transition-all duration-300 hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 active:shadow-sm disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:hover:shadow-md">
                    點擊轉換成 ICO 檔案
                </button>
                <button id="clear-button" onclick="resetState()" class="hidden sm:w-auto w-full py-3 px-6 bg-white text-gray-700 border border-gray-300 font-semibold rounded-xl shadow-sm hover:bg-gray-50 hover:shadow-md hover:-translate-y-0.5 active:translate-y-0 active:shadow-sm transition-all duration-300">
                    清除重設
                </button>
            </div>
            <div id="status-message" class="hidden transition-opacity duration-300">
                <div class="flex flex-row items-center justify-center text-sm text-indigo-600 py-3 bg-indigo-50 rounded-xl border border-indigo-100 shadow-sm">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="status-text" class="font-medium">正在處理中，請稍候...</span>
                </div>
            </div>
            <div id="download-area" class="hidden text-center p-4 bg-green-50 rounded-xl border border-green-200 shadow-sm transition-all duration-500">
                <a id="download-link" href="#" download="favicon.ico"
                    class="text-green-700 font-semibold hover:text-green-800 transition-all duration-300 flex items-center justify-center hover:scale-[1.02]">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    轉換完成！點此下載 favicon.ico
                </a>
            </div>
        </div>

        <!-- 繪圖用的 Canvas (隱藏) -->
        <canvas id="conversion-canvas" class="hidden-canvas"></canvas>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const convertButton = document.getElementById('convert-button');
        const previewArea = document.getElementById('preview-area');
        const downloadArea = document.getElementById('download-area');
        const downloadLink = document.getElementById('download-link');
        const statusMessage = document.getElementById('status-message');
        const canvas = document.getElementById('conversion-canvas');
        const ctx = canvas.getContext('2d');
        let originalImage = null;

        // --- 新增：拖曳上傳 (Drag & Drop) 功能 ---
        const dropZone = document.getElementById('drop-zone');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('border-indigo-500', 'bg-indigo-50'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('border-indigo-500', 'bg-indigo-50'), false);
        });
        dropZone.addEventListener('drop', handleDrop, false);
        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files && files.length > 0) {
                imageInput.files = files;
                handleImageSelection();
            }
        }

        // --- 新增：清除按鈕重設功能 ---
        function resetState() {
            imageInput.value = '';
            originalImage = null;
            
            // 隱藏各個區塊並移除動畫 class
            previewArea.classList.add('hidden');
            previewArea.classList.remove('fade-in');
            document.getElementById('aspect-warning').classList.add('hidden');
            document.getElementById('aspect-warning').classList.remove('fade-in');
            downloadArea.classList.add('hidden');
            downloadArea.classList.remove('fade-in');
            statusMessage.classList.add('hidden');
            document.getElementById('clear-button').classList.add('hidden');
            document.getElementById('clear-button').classList.remove('fade-in');
            
            convertButton.disabled = true;
            document.getElementById('filename-input').value = 'favicon';
            
            // 重置預覽圖片 src
            const ids = ['img-preview-16', 'img-preview-32', 'img-preview-48'];
            ids.forEach(id => document.getElementById(id).src = '');
        }

        // 取得使用者選擇的尺寸清單 (取代原本寫死的 ICO_SIZES)
        function getSelectedSizes() {
            const checkboxes = document.querySelectorAll('#size-checkboxes input[type="checkbox"]:checked');
            return Array.from(checkboxes).map(cb => parseInt(cb.value)).sort((a, b) => a - b);
        }

        /**
         * 將 Base64 資料轉換為 ArrayBuffer
         * @param {string} base64 - Base64 資料字串
         * @returns {ArrayBuffer}
         */
        function base64ToArrayBuffer(base64) {
            const binaryString = atob(base64.split(',')[1]);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        /**
         * 將圖片縮放並繪製到 Canvas，然後取得 PNG ArrayBuffer
         * @param {number} size - 目標邊長 (e.g., 16, 32, 48)
         * @returns {Promise<ArrayBuffer>} 包含 PNG 圖片資料的 ArrayBuffer
         */
        function getPngData(size) {
            return new Promise(resolve => {
                canvas.width = size;
                canvas.height = size;
                ctx.clearRect(0, 0, size, size);

                // 啟用高品質圖片平滑縮放
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';

                // 繪製圖片並縮放
                ctx.drawImage(originalImage, 0, 0, size, size);

                // 取得 PNG 資料 URL
                const dataUrl = canvas.toDataURL('image/png');
                resolve(base64ToArrayBuffer(dataUrl));
            });
        }

        /**
         * 將多個 PNG ArrayBuffer 封裝成一個 ICO 檔案 (核心邏輯)
         * ICO 結構: ICONDIR + N * ICONDIRENTRY + N * PNG Data
         * @param {Array<ArrayBuffer>} pngBuffers - 包含各尺寸 PNG 資料的 ArrayBuffer 陣列
         * @param {Array<number>} sizes - 對應的尺寸陣列
         * @returns {Blob} 最終的 ICO Blob
         */
        function createIcoFile(pngBuffers, sizes) {
            const numImages = sizes.length;
            const imageSizeData = []; // 儲存 (尺寸, 資料長度)
            pngBuffers.forEach((buffer, index) => {
                imageSizeData.push({
                    size: sizes[index],
                    length: buffer.byteLength
                });
            });

            // 1. 計算總檔案大小和偏移量
            // ICONDIR: 6 bytes
            // ICONDIRENTRY: 16 bytes/image * numImages
            let offset = 6 + (numImages * 16);
            const icoHeaderSize = offset;
            let totalLength = offset;

            for (const data of imageSizeData) {
                data.offset = offset;
                totalLength += data.length;
                offset += data.length;
            }

            // 2. 建立總 ArrayBuffer 和 DataView
            const icoBuffer = new ArrayBuffer(totalLength);
            const view = new DataView(icoBuffer);
            let byteOffset = 0;

            // 3. 寫入 ICONDIR (Header) - 6 bytes
            // Reserved (2 bytes)
            view.setUint16(byteOffset, 0, true); byteOffset += 2;
            // Type (2 bytes) - 1 for ICO
            view.setUint16(byteOffset, 1, true); byteOffset += 2;
            // Count (2 bytes) - number of images
            view.setUint16(byteOffset, numImages, true); byteOffset += 2;

            // 4. 寫入 ICONDIRENTRY (Directory Entries) - N * 16 bytes
            for (let i = 0; i < numImages; i++) {
                const data = imageSizeData[i];
                
                // 寬高若為 256，在 ICO 標頭中必須標示為 0
                const dim = data.size === 256 ? 0 : data.size;
                
                // Width (1 byte)
                view.setUint8(byteOffset, dim); byteOffset += 1;
                // Height (1 byte)
                view.setUint8(byteOffset, dim); byteOffset += 1;
                // Color Palette (1 byte) - 0
                view.setUint8(byteOffset, 0); byteOffset += 1;
                // Reserved (1 byte) - 0
                view.setUint8(byteOffset, 0); byteOffset += 1;
                // Color Planes (2 bytes) - 0 (or 1 for PNG)
                view.setUint16(byteOffset, 0, true); byteOffset += 2;
                // Bits per pixel (2 bytes) - 32 (for PNG with alpha channel)
                view.setUint16(byteOffset, 32, true); byteOffset += 2;
                // Size in Bytes (4 bytes) - size of the PNG data
                view.setUint32(byteOffset, data.length, true); byteOffset += 4;
                // Offset (4 bytes) - offset to the image data
                view.setUint32(byteOffset, data.offset, true); byteOffset += 4;
            }

            // 5. 寫入 PNG Data
            const icoBytes = new Uint8Array(icoBuffer);
            for (let i = 0; i < numImages; i++) {
                const data = imageSizeData[i];
                // 取得原始 PNG 資料的 Uint8Array
                const pngBytes = new Uint8Array(pngBuffers[i]);
                // 將 PNG 資料複製到 ICO Buffer 中正確的偏移量位置
                icoBytes.set(pngBytes, data.offset);
            }

            // 6. 建立 Blob
            return new Blob([icoBuffer], { type: 'image/x-icon' });
        }

        /**
         * 處理檔案選擇事件
         */
        function handleImageSelection() {
            downloadArea.classList.add('hidden');
            downloadArea.classList.remove('fade-in');
            convertButton.disabled = true;
            previewArea.classList.add('hidden');
            previewArea.classList.remove('fade-in');
            document.getElementById('aspect-warning').classList.add('hidden');
            originalImage = null;

            const file = imageInput.files[0];
            if (!file) return;

            if (file.type !== 'image/png' && file.type !== 'image/jpeg' && file.type !== 'image/svg+xml') {
                document.getElementById('file-info').textContent = '錯誤：請選擇 PNG, JPG 或 SVG 檔案。';
                previewArea.classList.remove('hidden');
                previewArea.classList.add('fade-in');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    convertButton.disabled = false;
                    displayPreviews(img);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        /**
         * 顯示不同尺寸的預覽圖
         * @param {HTMLImageElement} img - 原始 Image 物件
         */
        function displayPreviews(img) {
            previewArea.classList.remove('hidden');
            previewArea.classList.add('fade-in');
            
            // 顯示清除按鈕
            const clearBtn = document.getElementById('clear-button');
            clearBtn.classList.remove('hidden');
            clearBtn.classList.add('fade-in');
            
            // 檢查是否為正方形，顯示防呆警告
            const aspectWarning = document.getElementById('aspect-warning');
            if (img.width !== img.height) {
                aspectWarning.classList.remove('hidden');
                aspectWarning.classList.add('fade-in');
            } else {
                aspectWarning.classList.add('hidden');
                aspectWarning.classList.remove('fade-in');
            }

            document.getElementById('file-info').textContent = `原始圖片尺寸: ${img.width}x${img.height} 像素`;

            const sizes = [16, 32, 48];
            const ids = ['img-preview-16', 'img-preview-32', 'img-preview-48'];

            sizes.forEach((size, index) => {
                const previewImg = document.getElementById(ids[index]);
                canvas.width = size;
                canvas.height = size;
                ctx.clearRect(0, 0, size, size);
                
                // 啟用高品質圖片平滑縮放
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                
                ctx.drawImage(img, 0, 0, size, size);
                previewImg.src = canvas.toDataURL('image/png');
            });
        }


        /**
         * 開始轉換流程
         */
        async function startConversion() {
            if (!originalImage) return;

            const selectedSizes = getSelectedSizes();
            if (selectedSizes.length === 0) {
                alert('請至少選擇一個解析度！');
                return;
            }

            convertButton.disabled = true;
            downloadArea.classList.add('hidden');
            document.getElementById('status-text').textContent = '正在處理中，請稍候...';
            document.getElementById('status-text').classList.remove('text-red-500');
            statusMessage.classList.remove('hidden');

            try {
                // 1. 取得所有目標尺寸的 PNG 資料 (ArrayBuffer 形式)
                const pngBuffers = [];
                for (const size of selectedSizes) {
                    const buffer = await getPngData(size);
                    pngBuffers.push(buffer);
                }

                // 2. 封裝成 ICO 檔案 Blob
                const icoBlob = createIcoFile(pngBuffers, selectedSizes);

                // 3. 建立下載連結
                const url = URL.createObjectURL(icoBlob);
                
                // 取得自訂檔名
                let filename = document.getElementById('filename-input').value.trim();
                if (!filename) filename = 'favicon';
                
                downloadLink.href = url;
                downloadLink.download = `${filename}.ico`;
                downloadLink.innerHTML = `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    轉換完成！點此下載 ${filename}.ico`;
                
                downloadArea.classList.remove('hidden');
                downloadArea.classList.add('fade-in');

            } catch (error) {
                console.error("ICO 轉換失敗:", error);
                document.getElementById('status-text').textContent = '轉換過程中發生錯誤，請檢查檔案格式。';
                document.getElementById('status-text').classList.add('text-red-500');
            } finally {
                convertButton.disabled = false;
                if (!document.getElementById('status-text').classList.contains('text-red-500')){
                    statusMessage.classList.add('hidden');
                }
            }
        }
    </script>
</body>
</html>
